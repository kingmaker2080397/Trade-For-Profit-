<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TFP | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #181a20; border: 1px solid #2b2f36; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        input { background: #0b0e11 !important; border: 1px solid #2b2f36 !important; color: white !important; padding: 4px; border-radius: 4px; width: 60px; }
    </style>
</head>
<body>
    <h1 class="text-xl font-black text-yellow-500 mb-8 italic uppercase italic border-b border-gray-800 pb-4">Master Admin Control</h1>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div>
            <h2 class="text-xs font-bold text-gray-500 mb-4 uppercase tracking-widest">Traders & Referrals</h2>
            <div id="userList"></div>
        </div>
        <div>
            <h2 class="text-xs font-bold text-green-500 mb-4 uppercase tracking-widest">Pending Requests</h2>
            <div id="reqList"></div>
        </div>
        <div>
            <h2 class="text-xs font-bold text-blue-500 mb-4 uppercase tracking-widest">Market Status</h2>
            <div class="card italic text-center py-10">Server Online <span class="text-green-500">●</span></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com/" }));

        onValue(ref(db, 'users'), (s) => {
            const data = s.val(); const cont = document.getElementById('userList'); cont.innerHTML = '';
            for(let id in data) {
                let rCount = 0; for(let k in data) if(data[k].refBy === data[id].myRef) rCount++;
                cont.innerHTML += `<div class="card">
                    <p class="font-bold text-sm">${data[id].name} <span class="text-green-500">($${data[id].balance.toFixed(2)})</span></p>
                    <p class="text-[10px] text-gray-500 mt-1">Refs: ${rCount} | Pass: ${data[id].password}</p>
                    <div class="mt-3 flex gap-2 border-t border-gray-800 pt-3">
                        <input type="number" id="b_${id}" placeholder="$">
                        <button onclick="setB('${id}')" class="bg-green-600 text-[9px] px-2 py-1 rounded">SET</button>
                        ${rCount >= 10 ? `<button onclick="bonus('${id}')" class="bg-yellow-500 text-black text-[9px] px-2 py-1 rounded">GIVE $5</button>` : ''}
                    </div>
                </div>`;
            }
        });

        onValue(ref(db, 'admin'), (s) => {
            const data = s.val(); const cont = document.getElementById('reqList'); cont.innerHTML = '';
            if(data?.deposits) for(let k in data.deposits) cont.innerHTML += `<div class="card border-l-4 border-green-500 text-[10px]"><p>DEP: ${data.deposits[k].user}</p><p>TxID: ${data.deposits[k].txid}</p><button onclick="del('deposits','${k}')" class="text-green-500 mt-2">[APPROVE]</button></div>`;
            if(data?.withdrawals) for(let k in data.withdrawals) cont.innerHTML += `<div class="card border-l-4 border-red-500 text-[10px]"><p>WITH: ${data.withdrawals[k].user}</p><p>$${data.withdrawals[k].amt} (${data.withdrawals[k].method})</p><p>${data.withdrawals[k].adr}</p><button onclick="del('withdrawals','${k}')" class="text-red-500 mt-2">[PAID]</button></div>`;
        });

        window.setB = (id) => update(ref(db, 'users/'+id), { balance: parseFloat(document.getElementById('b_'+id).value) });
        window.bonus = (id) => get(ref(db, 'users/'+id)).then(s => update(ref(db, 'users/'+id), { balance: s.val().balance + 5 }));
        window.del = (p,k) => remove(ref(db, `admin/${p}/${k}`));
    </script>
</body>
</html>
