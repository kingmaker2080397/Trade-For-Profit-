<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingmaker Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">
    <h1 class="text-2xl font-black mb-8 text-yellow-500 italic uppercase">Admin Master Control</h1>
    
    <div class="bg-gray-900 p-6 rounded-3xl mb-8 border border-gray-800">
        <h2 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">Global Result Control</h2>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="setMode('win')" class="bg-green-600/10 border border-green-600 text-green-500 py-4 rounded-2xl font-black">SET WIN</button>
            <button onclick="setMode('loss')" class="bg-red-600/10 border border-red-600 text-red-500 py-4 rounded-2xl font-black">SET LOSS</button>
        </div>
        <p id="current-mode" class="text-center mt-4 text-[10px] font-bold uppercase"></p>
    </div>

    <div id="user-list" class="space-y-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            storageBucket: "trade-for-profit-8b160.firebasestorage.app",
            messagingSenderId: "1077014018991",
            appId: "1:1077014018991:web:24f051595ac36857fd4d5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.setMode = (m) => {
            update(ref(db, 'liveSettings'), { status: m }).then(() => alert("Mode Set: " + m));
        };

        onValue(ref(db, 'liveSettings/status'), (s) => {
            document.getElementById('current-mode').innerText = "System Mode: " + (s.val() || "loss");
        });

        onValue(ref(db, 'users'), (snap) => {
            const users = snap.val();
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            for(let id in users) {
                list.innerHTML += `
                    <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 flex justify-between items-center">
                        <div><p class="text-xs font-bold text-blue-400">${users[id].email}</p><p class="text-lg font-black text-yellow-500">RS ${users[id].balance || 0}</p></div>
                        <div class="flex gap-2">
                            <button onclick="updateBal('${id}', 1000)" class="bg-green-600 px-3 py-1 rounded text-[10px] font-bold">+1k</button>
                            <button onclick="updateBal('${id}', -1000)" class="bg-red-600 px-3 py-1 rounded text-[10px] font-bold">-1k</button>
                        </div>
                    </div>
                `;
            }
        });

        window.updateBal = (uid, amt) => {
            const userRef = ref(db, 'users/' + uid);
            get(userRef).then(s => update(userRef, { balance: (s.val().balance || 0) + amt }));
        };
    </script>
</body>
</html>
