<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Trade Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-800 text-white p-5">
    <h1 class="text-2xl font-bold mb-5 underline">Admin Control Panel</h1>
    
    <div id="user-list" class="space-y-4">
        <p>Loading users...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            storageBucket: "trade-for-profit-8b160.firebasestorage.app",
            messagingSenderId: "1077014018991",
            appId: "1:1077014018991:web:24f051595ac36857fd4d5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Load All Users
        onValue(ref(db, 'users'), (snapshot) => {
            const users = snapshot.val();
            const listDiv = document.getElementById('user-list');
            listDiv.innerHTML = '';
            
            for(let id in users) {
                const user = users[id];
                listDiv.innerHTML += `
                    <div class="bg-gray-700 p-4 rounded flex justify-between items-center">
                        <div>
                            <p class="font-bold">${user.email}</p>
                            <p class="text-green-400">Balance: ${user.balance} PKR</p>
                        </div>
                        <button onclick="addBalance('${id}', ${user.balance})" class="bg-yellow-600 px-3 py-1 rounded">+ 500 PKR</button>
                    </div>
                `;
            }
        });

        window.addBalance = (uid, oldBalance) => {
            const newBalance = oldBalance + 500;
            update(ref(db, 'users/' + uid), { balance: newBalance });
        };
    </script>
</body>
                                                                         </html>
