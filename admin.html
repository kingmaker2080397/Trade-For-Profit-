<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background: #0b0e11; color: white; padding: 20px; font-family: sans-serif; }
        .box { background: #1e2329; padding: 20px; border-radius: 10px; border: 1px solid #2b3139; margin-bottom: 20px; }
        input { padding: 10px; background: #2b3139; border: 1px solid #474d57; color: white; width: 200px; margin-right: 10px; }
        button { padding: 10px; background: #f0b90b; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Update Payment Numbers</h2>
        <input type="text" id="val" placeholder="Enter Number/Address">
        <select id="meth" style="padding:10px;">
            <option value="easypaisa">EasyPaisa</option>
            <option value="jazzcash">JazzCash</option>
            <option value="trc20">USDT</option>
        </select>
        <button onclick="upd()">Update Now</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            storageBucket: "trade-for-profit-8b160.firebasestorage.app",
            messagingSenderId: "1077014018991",
            appId: "1:1077014018991:web:c41320e2ef10291afd4d5a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function upd() {
            const m = document.getElementById('meth').value;
            const v = document.getElementById('val').value;
            db.ref('admin_settings/payments/' + m).set(v).then(() => alert("Updated!"));
        }
    </script>
</body>
</html>
