<!DOCTYPE html>
<html>
<head><title>Admin Control Panel</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-black text-white p-6">
    <h1 class="text-3xl font-black text-yellow-500 mb-8 uppercase italic tracking-tighter">System Master Admin</h1>
    
    <div class="bg-gray-900 p-6 rounded-3xl border border-gray-800 mb-8">
        <h2 class="text-xs text-gray-500 font-bold mb-4 uppercase tracking-widest">Live Trade Signal</h2>
        <div class="flex gap-4">
            <button onclick="setMode('win')" class="flex-1 bg-green-600 py-5 rounded-2xl font-black text-xl shadow-lg shadow-green-900/30">SET ALL WIN</button>
            <button onclick="setMode('loss')" class="flex-1 bg-red-600 py-5 rounded-2xl font-black text-xl shadow-lg shadow-red-900/30">SET ALL LOSS</button>
        </div>
    </div>

    <div class="bg-gray-900 p-6 rounded-3xl border border-gray-800 mb-8">
        <h2 class="text-xs text-blue-500 font-bold mb-4 uppercase tracking-widest">Recharge Settings</h2>
        <div class="space-y-4">
            <input type="text" id="ep" placeholder="Easypaisa: 03xx-xxxxxxx | Name" class="w-full bg-black p-4 rounded-2xl outline-none border border-gray-700 text-sm">
            <input type="text" id="jc" placeholder="JazzCash: 03xx-xxxxxxx | Name" class="w-full bg-black p-4 rounded-2xl outline-none border border-gray-700 text-sm">
            <input type="text" id="usdt" placeholder="USDT TRC20 Address" class="w-full bg-black p-4 rounded-2xl outline-none border border-gray-700 text-sm">
            <button onclick="savePay()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg shadow-blue-900/40">Update All Addresses</button>
        </div>
    </div>

    <h2 class="text-xs text-gray-500 font-bold mb-4 uppercase tracking-widest">Active Traders</h2>
    <div id="users" class="space-y-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, update, onValue, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            storageBucket: "trade-for-profit-8b160.firebasestorage.app",
            messagingSenderId: "1077014018991",
            appId: "1:1077014018991:web:24f051595ac36857fd4d5a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.setMode = (m) => update(ref(db, 'liveSettings'), { status: m }).then(() => alert("All trades will now: " + m.toUpperCase()));
        
        window.savePay = () => update(ref(db, 'paymentSettings'), {
            easypaisa: document.getElementById('ep').value,
            jazzcash: document.getElementById('jc').value,
            usdt: document.getElementById('usdt').value
        }).then(() => alert("Addresses Updated Successfully!"));

        onValue(ref(db, 'users'), (snap) => {
            const data = snap.val(); const list = document.getElementById('users'); list.innerHTML = '';
            for(let id in data) {
                list.innerHTML += `<div class="bg-gray-900 p-5 rounded-3xl border border-gray-800 flex justify-between items-center">
                    <div><p class="text-xs text-blue-400 font-bold">${data[id].email}</p><p class="text-2xl font-black text-yellow-500 mt-1">RS ${data[id].balance || 0}</p></div>
                    <div class="flex gap-2">
                        <button onclick="addBal('${id}', 1000)" class="bg-white text-black px-4 py-2 rounded-xl font-black text-[10px]">+1000</button>
                        <button onclick="addBal('${id}', -1000)" class="bg-red-600 text-white px-4 py-2 rounded-xl font-black text-[10px]">-1000</button>
                    </div>
                </div>`;
            }
        });

        window.addBal = (uid, amt) => {
            const r = ref(db, 'users/' + uid);
            get(r).then(s => update(r, { balance: (s.val().balance || 0) + amt }));
        };
    </script>
</body>
</html>
