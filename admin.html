<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <h1 class="text-xl font-bold text-yellow-500 mb-6">Trade For Profit - Admin</h1>
    <div class="flex gap-4">
        <button onclick="setMode('win')" class="bg-green-600 p-4 rounded-lg flex-1 font-bold">FORCE PROFIT</button>
        <button onclick="setMode('loss')" class="bg-red-600 p-4 rounded-lg flex-1 font-bold">FORCE LOSS</button>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com/" }));
        window.setMode = (m) => { set(ref(db, 'admin/settings/mode'), m); alert("Mode set to: " + m); };
    </script>
</body>
</html>
