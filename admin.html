<div class="card">
    <h3>Pending KYC Approvals</h3>
    <table id="kycTable" border="1" style="width:100%; text-align:left; border-collapse: collapse;">
        <tr style="background:#2b3139;">
            <th>Name</th>
            <th>CNIC</th>
            <th>Image</th>
            <th>Action</th>
        </tr>
    </table>
</div>

<script>
    // KYC Table Loading
    db.ref('users').orderByChild('kyc_status').equalTo('PENDING').on('value', snap => {
        const table = document.getElementById('kycTable');
        table.innerHTML = '<tr style="background:#2b3139;"><th>Name</th><th>CNIC</th><th>Image</th><th>Action</th></tr>';
        
        snap.forEach(user => {
            const d = user.val();
            const uid = user.key;
            table.innerHTML += `
                <tr>
                    <td>${d.kyc_data.name}</td>
                    <td>${d.kyc_data.cnic}</td>
                    <td><a href="${d.kyc_data.image}" target="_blank" style="color:#f0b90b;">View Image</a></td>
                    <td>
                        <button onclick="approveKYC('${uid}', 'APPROVED')" style="background:#02c076; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">Approve</button>
                        <button onclick="approveKYC('${uid}', 'REJECTED')" style="background:#f6465d; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">Reject</button>
                    </td>
                </tr>`;
        });
    });

    function approveKYC(uid, status) {
        db.ref('users/' + uid).update({ kyc_status: status })
        .then(() => alert("User KYC updated to " + status));
    }
</script>
