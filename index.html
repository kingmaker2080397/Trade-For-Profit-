<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade For Profit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

    <div id="auth-section" class="flex flex-col items-center justify-center h-screen">
        <h2 class="text-2xl font-bold mb-4">Welcome to Trade</h2>
        <input id="email" type="email" placeholder="Email" class="p-2 mb-2 w-64 text-black rounded">
        <input id="password" type="password" placeholder="Password" class="p-2 mb-2 w-64 text-black rounded">
        <div class="flex gap-2">
            <button onclick="handleAuth('login')" class="bg-blue-600 px-4 py-2 rounded">Login</button>
            <button onclick="handleAuth('signup')" class="bg-green-600 px-4 py-2 rounded">Create Account</button>
        </div>
    </div>

    <div id="dashboard" class="hidden p-5">
        <h1 class="text-xl">Balance: <span id="user-balance" class="font-bold text-yellow-400">0</span> PKR</h1>
        <button onclick="logout()" class="mt-4 bg-red-500 px-3 py-1 rounded text-sm">Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // Aapki Firebase ID aur Config
        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            storageBucket: "trade-for-profit-8b160.firebasestorage.app",
            messagingSenderId: "1077014018991",
            appId: "1:1077014018991:web:24f051595ac36857fd4d5a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Login aur Signup Function
        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if(type === 'signup') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, 'users/' + res.user.uid), { email: email, balance: 0 });
                    alert("Account Created!");
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (err) { alert(err.message); }
        };

        // Check Login State
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                onValue(ref(db, 'users/' + user.uid + '/balance'), (snapshot) => {
                    document.getElementById('user-balance').innerText = snapshot.val() || 0;
                });
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        window.logout = () => signOut(auth);
    </script>
</body>
</html>
