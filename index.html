<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingmaker Trade Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-nav { color: #eab308; border-top: 2px solid #eab308; }
        @keyframes slideIn { 0% { transform: translateY(-100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .result-card { animation: slideIn 0.4s ease-out; }
    </style>
</head>
<body class="bg-black text-white pb-24">

    <div id="result-overlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 hidden px-6">
        <div id="result-box" class="result-card w-full max-w-sm p-8 rounded-[2.5rem] text-center border-t-8 shadow-2xl bg-gray-900">
            <div id="result-icon" class="text-6xl mb-4"></div>
            <h2 id="result-title" class="text-4xl font-black italic mb-2 uppercase"></h2>
            <p id="result-amount" class="text-2xl font-bold mb-6"></p>
            <button onclick="closeResult()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-xs">Continue</button>
        </div>
    </div>

    <div class="p-5 glass sticky top-0 z-50 flex justify-between items-center border-b border-gray-800">
        <div>
            <p class="text-[10px] text-gray-500 uppercase font-black">Balance (PKR)</p>
            <h1 class="text-3xl font-black text-yellow-500 italic">RS <span id="user-balance">0.00</span></h1>
        </div>
        <button onclick="showTab('wallet')" class="bg-red-600 text-[10px] px-3 py-1 rounded font-bold">KYC ⚠️</button>
    </div>

    <div class="p-4">
        <div id="trade-tab" class="tab-content active">
            <div class="flex gap-2 mb-4 overflow-x-auto no-scrollbar pb-2">
                <button onclick="updateMarket('Crypto')" class="bg-yellow-600 text-black px-4 py-1.5 rounded-full text-[10px] font-bold">CRYPTO</button>
                <button onclick="updateMarket('Forex')" class="bg-gray-800 px-4 py-1.5 rounded-full text-[10px] font-bold">FOREX</button>
                <button onclick="updateMarket('Commodity')" class="bg-gray-800 px-4 py-1.5 rounded-full text-[10px] font-bold">COMMODITIES</button>
            </div>
            <div id="asset-list" class="flex gap-2 mb-6 overflow-x-auto no-scrollbar"></div>

            <div class="w-full h-40 bg-gray-900 rounded-3xl mb-6 border border-gray-800 flex flex-col items-center justify-center relative">
                <p class="text-gray-700 text-[10px] font-bold">LIVE MARKET STREAMING...</p>
                <div id="entry-marker" class="hidden w-4/5 p-2 rounded-xl text-[10px] font-black text-center border mt-2"></div>
            </div>

            <div id="timer-box" class="hidden bg-yellow-500/10 border border-yellow-500/50 p-4 rounded-2xl mb-6 text-center">
                <h2 id="countdown" class="text-4xl font-mono font-black text-white">00:60</h2>
            </div>

            <div class="bg-gray-900 p-6 rounded-[2rem] mb-6 border border-gray-800">
                <input id="trade-amount" type="number" value="500" class="w-full bg-transparent text-4xl font-black outline-none border-b border-gray-800 pb-3">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="initTrade('Up')" class="bg-green-600 h-44 rounded-[2rem] font-black text-3xl border-b-8 border-green-800 active:scale-95">CALL ↑</button>
                <button onclick="initTrade('Down')" class="bg-red-600 h-44 rounded-[2rem] font-black text-3xl border-b-8 border-red-800 active:scale-95">PUT ↓</button>
            </div>
        </div>

        <div id="deposit-tab" class="tab-content">
            <h2 class="text-xl font-black mb-6 text-yellow-500 uppercase italic">Deposit Center</h2>
            <div class="bg-gray-900 p-6 rounded-[2rem] border border-gray-800 text-center">
                <p class="text-green-500 font-black text-xs mb-4 uppercase">USDT (TRC20) Network</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TS9AMMyNMZygVfD2NAUeYn7N8sq36ivhLJ" class="mx-auto mb-4 rounded-xl border-4 border-white">
                <p class="text-[9px] text-gray-500 mb-4 break-all">TS9AMMyNMZygVfD2NAUeYn7N8sq36ivhLJ</p>
                <button onclick="navigator.clipboard.writeText('TS9AMMyNMZygVfD2NAUeYn7N8sq36ivhLJ'); alert('Copied!')" class="w-full bg-yellow-600 text-black py-3 rounded-2xl font-black text-xs uppercase">Copy Address</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 glass border-t border-gray-800 p-4 flex justify-around text-[9px] text-gray-500 font-black uppercase">
        <button onclick="showTab('trade')" id="nav-trade" class="active-nav"><span>📈</span>Market</button>
        <button onclick="showTab('deposit')" id="nav-deposit"><span>💰</span>Deposit</button>
        <button onclick="showTab('wallet')" id="nav-wallet"><span>💼</span>Wallet</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            storageBucket: "trade-for-profit-8b160.firebasestorage.app",
            messagingSenderId: "1077014018991",
            appId: "1:1077014018991:web:24f051595ac36857fd4d5a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let uBalance = 0, uID = "";

        const markets = {
            Crypto: ['BTC/USDT', 'ETH/USDT', 'SOL/USDT', 'BNB/USDT', 'XRP/USDT', 'ADA/USDT', 'DOGE/USDT', 'TRX/USDT', 'MATIC/USDT', 'DOT/USDT'],
            Forex: ['EUR/USD', 'GBP/USD', 'USD/JPY', 'USD/CHF', 'AUD/USD', 'USD/CAD', 'NZD/USD', 'EUR/GBP', 'EUR/JPY', 'GBP/JPY'],
            Commodity: ['XAU/USD', 'XAG/USD', 'WTI OIL', 'BRENT OIL', 'NGAS', 'PLATINUM', 'COPPER', 'US30', 'NAS100', 'GER40']
        };

        window.updateMarket = (cat) => {
            document.getElementById('asset-list').innerHTML = markets[cat].map(c => `<button class="bg-gray-900 border border-gray-800 px-4 py-2 rounded-xl text-[10px] font-bold whitespace-nowrap">${c}</button>`).join('');
        };
        updateMarket('Crypto');

        window.showTab = (n) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(n + '-tab').classList.add('active');
            document.getElementById('nav-' + n).classList.add('active-nav');
        };

        window.initTrade = async (dir) => {
            const amt = parseInt(document.getElementById('trade-amount').value);
            if(amt > uBalance) return alert("Low Balance!");
            
            const marker = document.getElementById('entry-marker');
            marker.className = `block w-full p-2 rounded-xl text-[10px] font-black text-center border mt-2 ${dir === 'Up' ? 'border-green-500 text-green-500' : 'border-red-500 text-red-500'}`;
            marker.innerText = `ENTRY: ${dir.toUpperCase()} @ RS ${amt}`;
            marker.style.display = "block";

            document.getElementById('timer-box').classList.remove('hidden');
            let t = 60;
            const timer = setInterval(() => {
                t--;
                document.getElementById('countdown').innerText = "00:" + (t < 10 ? "0" : "") + t;
                if(t <= 0) {
                    clearInterval(timer);
                    document.getElementById('timer-box').classList.add('hidden');
                    marker.style.display = "none";
                    execResult(amt);
                }
            }, 1000);
        };

        async function execResult(amt) {
            const snap = await get(ref(db, 'liveSettings'));
            const winMode = snap.val() ? snap.val().status : "loss";
            
            document.getElementById('result-overlay').classList.remove('hidden');
            const box = document.getElementById('result-box');

            if(winMode === "win") {
                const profit = amt * 0.90;
                uBalance += profit;
                box.className = "result-card w-full max-w-sm p-8 rounded-[2.5rem] text-center border-t-8 border-green-500 bg-gray-900 shadow-2xl";
                document.getElementById('result-icon').innerText = "💰";
                document.getElementById('result-title').innerText = "Profit";
                document.getElementById('result-title').className = "text-4xl font-black text-green-500 italic";
                document.getElementById('result-amount').innerText = "+ RS " + profit.toFixed(2);
            } else {
                uBalance -= amt;
                box.className = "result-card w-full max-w-sm p-8 rounded-[2.5rem] text-center border-t-8 border-red-500 bg-gray-900 shadow-2xl";
                document.getElementById('result-icon').innerText = "📉";
                document.getElementById('result-title').innerText = "Loss";
                document.getElementById('result-title').className = "text-4xl font-black text-red-500 italic";
                document.getElementById('result-amount').innerText = "- RS " + amt.toFixed(2);
            }
            update(ref(db, 'users/' + uID), { balance: uBalance });
        }

        window.closeResult = () => document.getElementById('result-overlay').classList.add('hidden');

        onAuthStateChanged(auth, (user) => {
            if(user) {
                uID = user.uid;
                onValue(ref(db, 'users/' + user.uid + '/balance'), (s) => {
                    uBalance = s.val() || 0;
                    document.getElementById('user-balance').innerText = uBalance.toLocaleString();
                });
            }
        });
    </script>
</body>
                    </html>
