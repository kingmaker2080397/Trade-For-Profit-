        .tab-content { display: none; animation: slideUp 0.3s ease; }
        .tab-active { display: block; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #181a20; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #2b2f36; z-index: 1000; }
        .nav-item { color: #848e9c; cursor: pointer; text-align: center; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: #f0b90b; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="app" class="hidden">

            </div>
