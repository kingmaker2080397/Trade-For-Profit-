<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade For Profit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

    <div id="auth-section" class="flex flex-col items-center justify-center h-screen">
        <h2 class="text-3xl font-bold mb-6 text-green-500">Trade For Profit</h2>
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-80">
            <input id="email" type="email" placeholder="Email Address" class="p-3 mb-4 w-full text-black rounded focus:outline-none">
            <input id="password" type="password" placeholder="Password" class="p-3 mb-6 w-full text-black rounded focus:outline-none">
            <div class="flex flex-col gap-3">
                <button onclick="handleAuth('login')" class="bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold transition">Login</button>
                <button onclick="handleAuth('signup')" class="bg-green-600 hover:bg-green-700 p-3 rounded font-bold transition">Create Account</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden p-6">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-semibold">User Dashboard</h2>
            <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded text-sm font-bold">Logout</button>
        </div>
        <div class="bg-gray-800 p-8 rounded-2xl text-center shadow-lg border border-gray-700">
            <p class="text-gray-400 mb-2 uppercase tracking-widest">Available Balance</p>
            <h1 class="text-5xl font-bold text-yellow-400"><span id="user-balance">0</span> <span class="text-2xl">PKR</span></h1>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            storageBucket: "trade-for-profit-8b160.firebasestorage.app",
            messagingSenderId: "1077014018991",
            appId: "1:1077014018991:web:24f051595ac36857fd4d5a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("Please fill all fields");

            try {
                if(type === 'signup') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, 'users/' + res.user.uid), { email: email, balance: 0 });
                    alert("Account Created Successfully!");
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (err) { 
                alert("Error: " + err.message); 
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                onValue(ref(db, 'users/' + user.uid + '/balance'), (snapshot) => {
                    document.getElementById('user-balance').innerText = snapshot.val() || 0;
                });
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        window.logout = () => signOut(auth);
    </script>
</body>
</html>
