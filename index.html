<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Terminal | Home</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #f0b90b; --green: #02c076; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #2b3139; }
        .balance { font-size: 2.2rem; font-weight: bold; color: var(--yellow); margin: 5px 0; }
        .status-badge { font-size: 0.8rem; padding: 4px 8px; border-radius: 4px; background: #333; }
        
        /* Navigation Buttons Grid */
        .nav-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .nav-item { 
            background: var(--card); border: 1px solid var(--yellow); padding: 15px; 
            border-radius: 12px; text-align: center; text-decoration: none; 
            color: white; font-weight: bold; font-size: 0.9rem;
        }

        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; outline: none; }
        #admin-addr { background: #000; padding: 10px; border: 1px dashed var(--yellow); text-align: center; color: var(--yellow); font-family: monospace; }
        .btn-ref { background: var(--yellow); color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <p style="color: #848e9c; margin: 0;">Total Balance (USDT)</p>
        <div class="balance" id="user-balance">$0.00</div>
        <p>KYC Status: <span id="user-kyc" class="status-badge">Checking...</span></p>
    </div>

    <div class="nav-grid">
        <a href="trade.html" class="nav-item">📊 Live Trade</a>
        <a href="kyc.html" class="nav-item">🆔 Verify KYC</a>
        <a href="withdraw.html" class="nav-item">💰 Withdraw</a>
        <a href="admin.html" class="nav-item" style="border-color: #474d57;">⚙️ Admin</a>
    </div>

    <div class="card">
        <h3>Deposit Funds</h3>
        <select id="method-select" onchange="loadAdminData()">
            <option value="easypaisa">EasyPaisa (PKR)</option>
            <option value="jazzcash">JazzCash (PKR)</option>
            <option value="trc20">USDT (TRC20)</option>
        </select>
        <p style="font-size: 0.8rem; color: #848e9c; margin-top: 10px;">Send Amount to:</p>
        <div id="admin-addr">Loading...</div>
        <button class="btn-ref" onclick="copyLink()" style="margin-top: 20px;">Copy Referral Link</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            storageBucket: "trade-for-profit-8b160.firebasestorage.app",
            messagingSenderId: "1077014018991",
            appId: "1:1077014018991:web:c41320e2ef10291afd4d5a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Check Login and Sync Data
        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', (snap) => {
                    const data = snap.val();
                    if (data) {
                        document.getElementById('user-balance').innerText = "$" + parseFloat(data.balance).toFixed(2);
                        document.getElementById('user-kyc').innerText = data.kyc_status;
                        document.getElementById('user-kyc').style.color = (data.kyc_status === "APPROVED") ? "#02c076" : "#f6465d";
                        window.userRefCode = data.referral_code;
                    }
                });
            } else {
                // Agar login nahi hai toh login.html par bhejo
                window.location.href = "login.html";
            }
        });

        // Load Admin Payment Numbers
        function loadAdminData() {
            const method = document.getElementById('method-select').value;
            db.ref('admin_settings/payments/' + method).on('value', (snap) => {
                document.getElementById('admin-addr').innerText = snap.val() || "Not Set";
            });
        }
        loadAdminData(); // Initial load

        function copyLink() {
            const link = window.location.origin + "/Trade-For-Profit-/register.html?ref=" + window.userRefCode;
            navigator.clipboard.writeText(link);
            alert("Referral Link Copied!");
        }
    </script>
</body>
</html>
