<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Terminal | Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .card { background: #1e2329; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2b3139; }
        .accent { color: #f0b90b; }
        button { background: #f0b90b; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Balance: <span class="accent" id="bal">$0.00</span></h2>
        <p>KYC: <span id="kyc" style="color:#f6465d;">PENDING</span></p>
    </div>

    <div class="card">
        <h3>Deposit Funds</h3>
        <select id="pay-method" onchange="loadAddress()" style="width:100%; padding:10px; margin-bottom:10px; background:#2b3139; color:white;">
            <option value="jazzcash">JazzCash</option>
            <option value="easypaisa">EasyPaisa</option>
            <option value="trc20">USDT (TRC20)</option>
        </select>
        <p style="font-size:0.8rem; color:#848e9c;">Send to: <strong id="addr" class="accent">Loading...</strong></p>
    </div>

    <div class="card">
        <h3>Invite Friends</h3>
        <button onclick="shareLink()">Copy Referral Link</button>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", authDomain: "trade-for-profit-8b160.firebaseapp.com", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", projectId: "trade-for-profit-8b160", storageBucket: "trade-for-profit-8b160.firebasestorage.app", messagingSenderId: "1077014018991", appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
        if(!user) window.location.href = "login.html";
        db.ref('users/' + user.uid).on('value', snap => {
            const d = snap.val();
            document.getElementById('bal').innerText = "$" + (d.balance || 0);
            document.getElementById('kyc').innerText = d.kyc_status;
            window.myCode = d.referral_code;
        });
    });

    function loadAddress() {
        const m = document.getElementById('pay-method').value;
        db.ref('admin_settings/payments/' + m).on('value', s => {
            document.getElementById('addr').innerText = s.val() || "Not Set";
        });
    }

    function shareLink() {
        const link = window.location.origin + "/register.html?ref=" + window.myCode;
        navigator.clipboard.writeText(link);
        alert("Link Copied!");
    }
    loadAddress();
</script>
</body>
  
</html>
