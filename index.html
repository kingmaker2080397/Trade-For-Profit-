<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Terminal | Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #f0b90b; --green: #02c076; --red: #f6465d; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #2b3139; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid #2b3139; }
        .balance-title { font-size: 0.9rem; color: #848e9c; }
        .balance-amount { font-size: 2.2rem; font-weight: bold; color: var(--yellow); margin: 5px 0; }
        .kyc-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; }
        .pending { background: #5a4a1a; color: var(--yellow); }
        .approved { background: #1a5a3a; color: var(--green); }
        
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .menu-item { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; text-decoration: none; color: white; border: 1px solid #2b3139; font-size: 0.9rem; font-weight: 500; }
        
        .deposit-section { margin-top: 20px; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; background: #2b3139; border: 1px solid #474d57; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 15px; background: var(--yellow); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .address-box { background: #000; padding: 10px; border-radius: 5px; border: 1px dashed var(--yellow); text-align: center; margin: 10px 0; font-family: monospace; color: var(--yellow); word-break: break-all; }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-weight:bold; font-size:1.2rem; color:var(--yellow);">G-TERMINAL</span>
        <button onclick="logout()" id="logout-btn" style="background:none; border:none; color:#848e9c; cursor:pointer; display:none;">Logout</button>
        <button onclick="window.location.href='login.html'" id="login-btn" style="background:var(--yellow); border:none; color:black; padding:5px 10px; border-radius:5px; cursor:pointer;">Login</button>
    </div>

    <div class="card">
        <div class="balance-title">Total Balance (USDT)</div>
        <div class="balance-amount" id="user-balance">$0.00</div>
        <div>Status: <span id="user-kyc" class="kyc-badge pending">NOT VERIFIED</span></div>
    </div>

    <div class="grid-menu">
        <a href="#" onclick="checkAuth('trade.html')" class="menu-item" style="border-color: var(--green);">📊 Live Trade</a>
        <a href="#" onclick="checkAuth('kyc.html')" class="menu-item">🆔 Verify KYC</a>
        <a href="#" onclick="checkAuth('withdraw.html')" class="menu-item">💰 Withdraw</a>
        <a href="transfer.html" class="menu-item">🔄 Transfer</a>
    </div>

    <div class="card deposit-section">
        <h3 style="margin-top:0;">Deposit Funds</h3>
        <p style="font-size:0.8rem; color:#848e9c;">Min Deposit: $10 / 3000 PKR</p>
        <select id="method-selector" onchange="updateAdminAddress()">
            <option value="easypaisa">EasyPaisa (PKR)</option>
            <option value="jazzcash">JazzCash (PKR)</option>
            <option value="trc20">USDT (TRC20)</option>
        </select>
        <div class="address-box" id="admin-address">03442585087</div>
        <button class="btn-main" onclick="shareReferral()">Copy Referral Link</button>
    </div>

    <script>
        // 1. Firebase Configuration (Copy from your Firebase Console)
        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            storageBucket: "trade-for-profit-8b160.firebasestorage.app",
            messagingSenderId: "1077014018991",
            appId: "1:1077014018991:web:c41320e2ef10291afd4d5a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // 2. Auth State & Welcome Bonus Logic
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('logout-btn').style.display = 'block';
                document.getElementById('login-btn').style.display = 'none';
                
                const userRef = db.ref('users/' + user.uid);
                userRef.on('value', (snapshot) => {
                    let data = snapshot.val();
                    
                    // Naya User Hai Toh $1 Bonus Set Karo
                    if (!data) {
                        const myRefCode = "GT-" + user.uid.substring(0, 5).toUpperCase();
                        data = {
                            name: user.email.split('@')[0],
                            balance: 1.0, // $1 Welcome Bonus
                            kyc_status: "NOT_VERIFIED",
                            referral_code: myRefCode,
                            control: "NORMAL"
                        };
                        userRef.set(data);
                    }

                    // UI Update
                    document.getElementById('user-balance').innerText = "$" + parseFloat(data.balance || 0).toFixed(2);
                    const kycEl = document.getElementById('user-kyc');
                    kycEl.innerText = data.kyc_status || "NOT_VERIFIED";
                    kycEl.className = "kyc-badge " + (data.kyc_status === 'APPROVED' ? 'approved' : 'pending');
                    window.userReferralCode = data.referral_code;
                });
            } else {
                document.getElementById('logout-btn').style.display = 'none';
                document.getElementById('login-btn').style.display = 'block';
                document.getElementById('user-balance').innerText = "$0.00";
                document.getElementById('user-kyc').innerText = "NOT VERIFIED";
            }
        });

        // 3. Admin Addresses Load Karo
        function updateAdminAddress() {
            const method = document.getElementById('method-selector').value;
            db.ref('admin_settings/payments/' + method).on('value', (snap) => {
                const addr = snap.val();
                document.getElementById('admin-address').innerText = addr || "03442585087";
            });
        }

        // 4. Check Authentication Before Opening Section (Trade Fix)
        function checkAuth(url) {
            const user = auth.currentUser;
            if (user) {
                window.location.href = url;
            } else {
                alert("Please Login first to access this section!");
                window.location.href = "login.html";
            }
        }

        // 5. Referral Link Share
        function shareReferral() {
            if(!window.userReferralCode) return alert("Please Login first!");
            const link = window.location.origin + "/register.html?ref=" + window.userReferralCode;
            navigator.clipboard.writeText(link).then(() => {
                alert("Referral Link Copied: " + link);
            });
        }

        // 6. Logout
        function logout() {
            auth.signOut().then(() => { window.location.reload(); });
        }

        // Initial Load
        updateAdminAddress();
    </script>
</body>
</html>
