<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade For Profit | Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin: 10px; }
        .tab-content { display: none; } .tab-active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #181a20; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #848e9c; cursor: pointer; text-align: center; font-size: 10px; }
        .nav-item.active { color: #f0b90b; }
    </style>
</head>
<body>

    <div id="splash" style="position:fixed; inset:0; background:#0b0e11; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <div class="w-20 h-20 bg-yellow-500 rounded-2xl flex items-center justify-center text-black text-4xl shadow-xl"><i class="fa fa-chart-line"></i></div>
        <h1 class="text-white font-bold text-2xl mt-4 tracking-widest uppercase">TRADE FOR PROFIT</h1>
    </div>

    <div id="app" class="hidden">
        <div id="home" class="tab-content tab-active">
            <div class="p-4 bg-[#181a20] flex justify-between">
                <span class="text-yellow-500 font-bold">BTC / USDT</span>
                <span class="text-green-500 font-bold">$<span id="bal">0.00</span></span>
            </div>
            <div class="h-[50vh] mt-2"><iframe src="https://www.tradingview.com/widgetembed/?symbol=BTCUSD&theme=dark" width="100%" height="100%" frameborder="0"></iframe></div>
            <div class="glass flex gap-3">
                <button onclick="startTrade('win')" class="flex-1 bg-green-600 py-4 rounded-xl font-bold">BUY ↑</button>
                <button onclick="startTrade('loss')" class="flex-1 bg-red-600 py-4 rounded-xl font-bold">SELL ↓</button>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-item active" onclick="showTab('home', this)"><i class="fa fa-chart-line"></i><br>Trade</div>
            <div class="nav-item" onclick="alert('Wallet Coming Soon!')"><i class="fa fa-wallet"></i><br>Wallet</div>
            <div class="nav-item" onclick="window.location.reload()"><i class="fa fa-user"></i><br>Profile</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
        
        const db = getDatabase(initializeApp({ databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com/" }));
        
        setTimeout(() => { document.getElementById('splash').style.display = 'none'; document.getElementById('app').classList.remove('hidden'); }, 2000);

        window.startTrade = (type) => {
            get(ref(db, 'admin/settings/mode')).then(s => {
                const mode = s.val();
                alert(mode === 'win' ? "TRADE PROFIT!" : (mode === 'loss' ? "TRADE LOSS!" : "Processing Trade..."));
            });
        };
        
        window.showTab = (id, el) => {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        };
    </script>
</body>
</html>
