<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Multi-Asset Terminal</title>
    <style>
        :root {
            --bg: #05070a;
            --card: #12151c;
            --accent: #00f2ff;
            --green: #00ff88;
            --red: #ff3e3e;
            --text: #ffffff;
            --text-dim: #848e9c;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .navbar {
            padding: 15px 30px;
            background: var(--card);
            border-bottom: 1px solid #2d333b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .main-container {
            display: grid;
            grid-template-columns: 350px 1fr 300px;
            gap: 15px;
            padding: 15px;
            height: calc(100vh - 80px);
        }

        /* Market Watch Section */
        .market-watch {
            background: var(--card);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            background: #1c2128;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: var(--accent);
            background: var(--card);
            border-bottom: 2px solid var(--accent);
        }

        .asset-list {
            overflow-y: auto;
            flex-grow: 1;
        }

        .asset-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            border-bottom: 1px solid #1c2128;
            transition: 0.2s;
            cursor: pointer;
        }

        .asset-item:hover { background: #1c2128; }

        .price-up { color: var(--green); }
        .price-down { color: var(--red); }

        /* Chart Section */
        .chart-box {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Order Panel */
        .order-panel {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .buy { background: var(--green); color: #000; }
        .sell { background: var(--red); color: #fff; }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #1c2128;
            border: 1px solid #2d333b;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #2d333b; }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="font-size: 1.5rem; font-weight: bold; color: var(--accent);">G-TERMINAL</div>
        <div style="color: var(--green);">● Market Online</div>
    </div>

    <div class="main-container">
        <div class="market-watch">
            <div class="tabs">
                <button class="tab-btn active">CRYPTO</button>
                <button class="tab-btn">FOREX</button>
                <button class="tab-btn">METALS</button>
            </div>
            <div class="asset-list" id="assetList">
                </div>
        </div>

        <div class="chart-box">
            <div style="padding: 10px; background: #1c2128; font-size: 0.9rem;">
                Live Analysis: <span id="activePair">BTCUSDT</span>
            </div>
            <div id="tradingview_widget" style="flex-grow: 1;"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "BINANCE:BTCUSDT",
                    "interval": "D",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": true,
                    "container_id": "tradingview_widget"
                });
            </script>
        </div>

        <div class="order-panel">
            <h3 style="margin-top: 0;">Quick Execution</h3>
            <label>Order Type</label>
            <select style="width: 100%; background: #1c2128; color: white; padding: 10px; border-radius: 5px; border: 1px solid #2d333b;">
                <option>Market Order</option>
                <option>Limit Order</option>
            </select>

            <label style="display: block; margin-top: 15px;">Size (Units)</label>
            <input type="number" value="1.00">

            <div style="margin-top: 10px; font-size: 0.8rem; color: var(--text-dim);">
                Margin: $240.50 | Balance: $10,000
            </div>

            <div class="btn-group">
                <button class="btn buy">BUY</button>
                <button class="btn sell">SELL</button>
            </div>
        </div>
    </div>
