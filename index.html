<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingmaker Trade Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(12px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-nav { color: #eab308; border-top: 2px solid #eab308; }
    </style>
</head>
<body class="bg-black text-white pb-24">

    <div class="p-5 glass sticky top-0 z-50 flex justify-between items-center border-b border-gray-800">
        <div>
            <p class="text-[10px] text-gray-500 uppercase font-bold">Total Assets (PKR)</p>
            <h1 class="text-3xl font-black text-yellow-500 italic">RS <span id="user-balance">0.00</span></h1>
        </div>
        <button onclick="showTab('kyc')" class="bg-red-600 text-[10px] px-3 py-1 rounded-md font-bold">KYC Pending</button>
    </div>

    <div class="p-4">
        
        <div id="trade-tab" class="tab-content active">
            <div class="flex gap-2 mb-4 overflow-x-auto">
                <button class="bg-yellow-600 text-black px-4 py-1 rounded text-xs font-bold">BTC/USDT 1m</button>
                <button class="bg-gray-800 px-4 py-1 rounded text-xs">ETH/USDT 5m</button>
            </div>

            <div id="timer-box" class="hidden bg-blue-900/20 border border-blue-500 p-4 rounded-2xl mb-4 text-center">
                <p class="text-blue-400 text-[10px] uppercase font-bold">Market Closing In</p>
                <h2 id="countdown" class="text-4xl font-mono font-bold">00:60</h2>
            </div>

            <div class="bg-gray-900 p-5 rounded-2xl mb-6 border border-gray-800">
                <p class="text-xs text-gray-500 mb-2 italic">Investment Amount</p>
                <input id="trade-amount" type="number" value="500" class="w-full bg-transparent text-4xl font-bold outline-none border-b border-gray-800 pb-2">
                <div class="flex justify-between mt-4 text-[10px] text-gray-500">
                    <span>Min: 500 PKR</span>
                    <span>Fee: 0%</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="startTrade('Up')" class="bg-green-600 h-44 rounded-3xl font-black text-3xl shadow-lg shadow-green-900/30 active:scale-95 transition">CALL ↑</button>
                <button onclick="startTrade('Down')" class="bg-red-600 h-44 rounded-3xl font-black text-3xl shadow-lg shadow-red-900/30 active:scale-95 transition">PUT ↓</button>
            </div>
        </div>

        <div id="deposit-tab" class="tab-content">
            <h2 class="text-xl font-bold mb-6 italic text-yellow-500 underline">Add Funds</h2>
            
            <div class="space-y-4">
                <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 relative">
                    <p class="text-green-500 font-black mb-2 italic text-sm">USDT (TRC20) DEPOSIT</p>
                    <p class="text-[11px] text-gray-400 break-all bg-black p-3 rounded-lg border border-gray-800">
                        Address: <span id="usdt-addr" class="text-white font-mono">TS9AMMyNMZygVfD2NA
