<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Terminal | Ultra Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #05070a; --card: #1e2329; --yellow: #f0b90b; --green: #02c076; --red: #f6465d; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; padding: 15px; }
        
        .card-main { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #2b3139; margin-bottom: 20px; }
        .balance-amount { font-size: 2.5rem; font-weight: bold; margin: 10px 0; }
        
        .section { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--yellow); }
        h3 { margin-top: 0; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #161a1e; border: 1px solid #2b3139; color: white; border-radius: 10px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; background: var(--yellow); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .address-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; border: 1px dashed #444; text-align: center; color: var(--yellow); font-family: monospace; }
        
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .menu-item { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; text-decoration: none; color: white; border: 1px solid #2b3139; }
        .menu-item i { font-size: 1.2rem; color: var(--yellow); display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="card-main">
        <div style="color: #848e9c;">Available Balance</div>
        <div class="balance-amount" id="user-balance">$0.00</div>
        <span id="user-kyc" style="font-size: 0.8rem; padding: 4px 10px; border-radius: 5px; background: rgba(2,192,118,0.1); color: var(--green);">APPROVED</span>
    </div>

    <div class="grid-menu">
        <div class="menu-item"><i class="fas fa-chart-line"></i>Live Trade</div>
        <div class="menu-item"><i class="fas fa-user-check"></i>Verification</div>
    </div>

    <div class="section">
        <h3><i class="fas fa-plus-circle" style="color:var(--green)"></i> Deposit Funds</h3>
        <select id="method-selector">
            <option value="easypaisa">EasyPaisa (PKR)</option>
            <option value="jazzcash">JazzCash (PKR)</option>
            <option value="trc20">USDT (TRC20)</option>
        </select>
        <div class="address-box" id="admin-address">Loading...</div>
        <input type="number" id="dep-amount" placeholder="Enter Amount ($)">
        <input type="text" id="dep-txid" placeholder="Transaction ID (TRX ID)">
        <button class="btn-main" onclick="submitDeposit()">SUBMIT DEPOSIT</button>
    </div>

    <div class="section" style="border-left-color: var(--green);">
        <h3><i class="fas fa-seedling"></i> Investment Plans</h3>
        <select id="plan-selector">
            <option value="0.10">Starter Plan (10% Daily)</option>
            <option value="0.25">Gold Plan (25% Weekly)</option>
        </select>
        <input type="number" id="inv-amount" placeholder="Investment Amount ($)">
        <button class="btn-main" style="background: var(--green); color: white;" onclick="startInvestment()">START INVESTING</button>
    </div>

    <div class="section" style="border-left-color: #3498db;">
        <h3><i class="fas fa-exchange-alt" style="color:#3498db"></i> Internal Transfer</h3>
        <input type="email" id="target-email" placeholder="Recipient Email">
        <input type="number" id="trans-amount" placeholder="Amount to Transfer ($)">
        <button class="btn-main" style="background: #3498db; color: white;" onclick="transferFunds()">TRANSFER NOW</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            storageBucket: "trade-for-profit-8b160.firebasestorage.app",
            messagingSenderId: "1077014018991",
            appId: "1:1077014018991:web:c41320e2ef10291afd4d5a"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentBalance = 0;
        let userEmail = "";

        // Load User Data & Live Methods
        auth.onAuthStateChanged(user => {
            if (user) {
                userEmail = user.email;
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val();
                    currentBalance = data.balance || 0;
                    document.getElementById('user-balance').innerText = "$" + currentBalance.toFixed(2);
                });

                // Listen to Admin Payment Methods
                db.ref('settings/payment_methods').on('value', snap => {
                    const methods = snap.val();
                    const selector = document.getElementById('method-selector');
                    const addrBox = document.getElementById('admin-address');
                    const updateUI = () => {
                        if(selector.value === "easypaisa") addrBox.innerText = methods.easypaisa;
                        else if(selector.value === "jazzcash") addrBox.innerText = methods.jazzcash;
                        else addrBox.innerText = methods.usdt_address;
                    };
                    selector.onchange = updateUI;
                    updateUI();
                });
            }
        });

        // 1. Submit Deposit
        function submitDeposit() {
            const amt = document.getElementById('dep-amount').value;
            const txid = document.getElementById('dep-txid').value;
            const method = document.getElementById('method-selector').value;
            if(!amt || !txid) return alert("Fill all fields!");

            db.ref('deposits').push({
                uid: auth.currentUser.uid,
                email: userEmail,
                amount: parseFloat(amt),
                txid: txid,
                method: method,
                status: "PENDING",
                timestamp: Date.now()
            }).then(() => alert("Deposit Request Sent! Admin will approve soon."));
        }

        // 2. Start Investment
        function startInvestment() {
            const amt = parseFloat(document.getElementById('inv-amount').value);
            if(amt > currentBalance) return alert("Insufficient Balance!");
            if(amt < 10) return alert("Minimum Investment is $10");

            db.ref('users/' + auth.currentUser.uid).update({
                balance: currentBalance - amt
            }).then(() => {
                alert("Investment Started Successfully!");
            });
        }

        // 3. Transfer Funds
        function transferFunds() {
            const target = document.getElementById('target-email').value;
            const amt = parseFloat(document.getElementById('trans-amount').value);
            if(amt > currentBalance) return alert("Insufficient Balance!");

            // Note: In real app, you should check if target email exists in DB first
            db.ref('users/' + auth.currentUser.uid).update({ balance: currentBalance - amt });
            alert("Funds Transferred to " + target);
        }
    </script>
</body>
                </html>
