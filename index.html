<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade For Profit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-5">

    <div id="app" class="max-w-sm mx-auto mt-10">
        <h1 class="text-yellow-500 font-bold text-2xl mb-5">TRADE FOR PROFIT</h1>
        
        <div id="loginSection">
            <input id="uIn" type="text" placeholder="Enter Name" class="w-full p-3 text-black rounded mb-3">
            <button onclick="reg()" class="w-full bg-yellow-500 text-black font-bold p-3 rounded">START</button>
        </div>

        <div id="tradeSection" class="hidden">
            <p class="text-gray-400">Balance: $<span id="bal">0.00</span></p>
            <div class="grid grid-cols-2 gap-4 mt-5">
                <button onclick="trade('win')" class="bg-green-600 p-5 rounded">BUY</button>
                <button onclick="trade('loss')" class="bg-red-600 p-5 rounded">SELL</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com/" }));

        window.reg = () => {
            const n = document.getElementById('uIn').value;
            if(!n) return;
            localStorage.setItem('trader', n);
            set(ref(db, 'users/' + n), { balance: 100 }).then(() => location.reload());
        };

        const user = localStorage.getItem('trader');
        if(user) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('tradeSection').classList.remove('hidden');
            onValue(ref(db, 'users/' + user + '/balance'), (s) => {
                document.getElementById('bal').innerText = s.val();
            });
        }

        window.trade = (type) => {
            const u = localStorage.getItem('trader');
            alert("Trade started! Admin controls result.");
        };
    </script>
</body>
</html>
