<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Pro - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold text-yellow-500">TRADE PRO</h1>
        <div class="glass px-4 py-1 rounded-full text-green-400 font-mono">$ <span id="balance">1000.00</span></div>
    </div>

    <div class="glass rounded-3xl p-8 mb-6 text-center">
        <p class="text-gray-400 text-sm mb-2">Live Market Price</p>
        <div id="price" class="text-6xl font-bold text-green-500 transition-all duration-200">50.00</div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <button onclick="alert('Deposit via EasyPaisa: 03XXXXXXXXX')" class="glass p-6 rounded-2xl flex flex-col items-center">
            <span class="text-2xl mb-2">💰</span><span>Deposit</span>
        </button>
        <button onclick="alert('Withdrawal Request Sent')" class="glass p-6 rounded-2xl flex flex-col items-center">
            <span class="text-2xl mb-2">🏦</span><span>Withdraw</span>
        </button>
        <button onclick="alert('Referral Link: kingmaker/ref123')" class="glass p-6 rounded-2xl flex flex-col items-center col-span-2">
            <span class="text-2xl mb-2">👥</span><span>Refer & Earn</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'livePrice'), (s) => {
            document.getElementById('price').innerText = s.val();
        });
    </script>
</body>
</html>
