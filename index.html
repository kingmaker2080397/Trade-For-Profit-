<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TFP | Global Trading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        .glass { background: #181a20; border: 1px solid #2b2f36; border-radius: 20px; padding: 15px; margin: 10px; }
        .tab-content { display: none; }
        .tab-active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #181a20; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #2b2f36; z-index: 1000; }
        .nav-item { color: #848e9c; text-align: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: #f0b90b; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        input, select { background: #1e2329 !important; border: 1px solid #2b2f36 !important; color: white !important; width: 100%; padding: 14px; border-radius: 12px; margin-bottom: 12px; outline: none; }
        .coin-btn { background: #2b2f36; color: #848e9c; padding: 8px 16px; border-radius: 10px; font-size: 11px; font-weight: bold; white-space: nowrap; }
        .coin-btn.active { background: #f0b90b; color: black; }
    </style>
</head>
<body>

    <div id="app">
        <div id="home" class="tab-content tab-active">
            <div class="p-4 flex justify-between items-center bg-[#181a20]">
                <h2 id="mTitle" class="text-yellow-500 font-black italic uppercase">BTC / USDT</h2>
                <h2 class="text-green-500 font-black text-lg">$<span id="bal1">0.00</span></h2>
            </div>
            <div class="flex overflow-x-auto gap-2 p-3 bg-[#0b0e11]">
                <button onclick="changeM('BINANCE:BTCUSDT','BTC')" class="coin-btn active">BTC</button>
                <button onclick="changeM('OANDA:XAUUSD','GOLD')" class="coin-btn">GOLD</button>
                <button onclick="changeM('FX:EURUSD','EUR/USD')" class="coin-btn">EUR/USD</button>
            </div>
            <div class="h-[45vh] bg-black">
                <iframe id="tv" src="https://www.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=1&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
            </div>
            <div class="p-4">
                <div class="flex justify-between mb-4 bg-[#181a20] p-3 rounded-xl text-center">
                    <div class="w-1/2 border-r border-gray-800"><p class="text-[9px] text-gray-500 font-bold">PROFIT</p><p class="text-green-500 font-bold">+95%</p></div>
                    <div class="w-1/2"><p class="text-[9px] text-gray-500 font-bold">TIME</p><p id="timer" class="text-yellow-500 font-bold">01:00</p></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="startTrade('BUY')" class="bg-green-600 h-16 rounded-2xl font-black text-xl active:scale-95 transition">BUY</button>
                    <button onclick="startTrade('SELL')" class="bg-red-600 h-16 rounded-2xl font-black text-xl active:scale-95 transition">SELL</button>
                </div>
            </div>
        </div>

        <div id="wallet" class="tab-content p-4">
            <h2 class="text-2xl font-black text-yellow-500 mb-6 italic uppercase">Wallet</h2>
            <div class="glass border-l-4 border-yellow-500">
                <p class="text-gray-500 text-[10px] font-bold uppercase">Available Balance</p>
                <h1 class="text-4xl font-black mt-1">$<span id="bal2">0.00</span></h1>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-4">
                <button onclick="openM('depM')" class="glass text-center py-6"><i class="fa fa-plus-circle text-yellow-500 text-2xl mb-1"></i><p class="text-xs font-bold uppercase">Deposit</p></button>
                <button onclick="openM('withM')" class="glass text-center py-6"><i class="fa fa-minus-circle text-yellow-500 text-2xl mb-1"></i><p class="text-xs font-bold uppercase">Withdraw</p></button>
            </div>
        </div>

        <div id="profile" class="tab-content p-4 text-center">
            <div class="w-20 h-20 bg-yellow-500 rounded-full mx-auto flex items-center justify-center text-black text-3xl mb-4"><i class="fa fa-user-shield"></i></div>
            <h2 id="uNameDisp" class="text-xl font-black uppercase italic">Trader</h2>
            <p id="kyc" class="text-[10px] text-red-500 font-bold mt-1 uppercase">Not Verified</p>
            <div class="glass flex justify-between items-center py-5 mt-6 text-left">
                <div><p class="text-[9px] text-gray-500 font-bold uppercase">Referral Code</p><span id="rCode" class="text-yellow-500 font-black text-lg">---</span></div>
                <button onclick="share()" class="bg-yellow-500 text-black px-4 py-2 rounded-xl font-bold text-xs uppercase">Share</button>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="mt-10 text-red-500 text-[10px] font-bold uppercase opacity-50 underline">Logout</button>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="showTab('home', this)"><i class="fa fa-chart-line text-xl mb-1"></i><p>TRADE</p></div>
            <div class="nav-item" onclick="showTab('wallet', this)"><i class="fa fa-wallet text-xl mb-1"></i><p>WALLET</p></div>
            <div class="nav-item" onclick="showTab('profile', this)"><i class="fa fa-user-circle text-xl mb-1"></i><p>ACCOUNT</p></div>
        </div>
    </div>

    <div id="auth" class="fixed inset-0 bg-[#0b0e11] z-[9999] flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm text-center">
            <h2 id="aTitle" class="text-yellow-500 font-black mb-6 uppercase text-xl italic">Create Account</h2>
            <input id="aEmail" type="email" placeholder="Email Address">
            <input id="aPass" type="password" placeholder="Password">
            <div id="otpS" class="hidden"><input id="aOTP" type="number" placeholder="Enter OTP" class="text-center font-bold border-2 border-yellow-500"></div>
            <div id="regS"><input id="aName" type="text" placeholder="Full Name"><input id="aRef" type="text" placeholder="Referral Code (Optional)"></div>
            <button id="aBtn" onclick="handleAuth()" class="w-full bg-yellow-500 text-black font-black p-4 rounded-2xl uppercase text-xs">Register & Get $1</button>
            <p onclick="toggleAuth()" class="text-[10px] text-yellow-500 mt-4 cursor-pointer font-bold uppercase"><span id="tBtn">Login Now</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue, push } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com/" }));

        let isLogin = false; let genO = null; const emailKey = localStorage.getItem('traderEmail');

        window.toggleAuth = () => {
            isLogin = !isLogin;
            document.getElementById('aTitle').innerText = isLogin ? "User Login" : "Create Account";
            document.getElementById('regS').style.display = isLogin ? 'none' : 'block';
            document.getElementById('aBtn').innerText = isLogin ? "Login Now" : "Register & Get $1";
        };

        window.handleAuth = async () => {
            const email = document.getElementById('aEmail').value.replace(/\./g, '_');
            const pass = document.getElementById('aPass').value;
            if(!email || !pass) return alert("Fill all fields");

            if(isLogin){
                const s = await get(ref(db, 'users/'+email));
                if(s.exists() && s.val().password == pass){ localStorage.setItem('traderEmail', email); location.reload(); }
                else alert("Wrong Login!");
            } else {
                if(!genO){
                    genO = Math.floor(100000 + Math.random() * 900000);
                    alert("Your Registration OTP: " + genO);
                    document.getElementById('otpS').classList.remove('hidden');
                    document.getElementById('aBtn').innerText = "Verify OTP";
                } else {
                    if(document.getElementById('aOTP').value == genO){
                        const name = document.getElementById('aName').value;
                        const myRef = name.substring(0,3).toUpperCase() + Math.floor(1000+Math.random()*9000);
                        await set(ref(db, 'users/'+email), { name: name, password: pass, balance: 1.00, kyc: 'Not Verified', myRef: myRef, refBy: document.getElementById('aRef').value || 'none' });
                        localStorage.setItem('traderEmail', email); location.reload();
                    } else alert("Invalid OTP!");
                }
            }
        };

        if(emailKey){
            document.getElementById('auth').style.display = 'none';
            onValue(ref(db, 'users/'+emailKey), (s) => {
                const d = s.val();
                document.getElementById('bal1').innerText = d.balance.toFixed(2);
                document.getElementById('bal2').innerText = d.balance.toFixed(2);
                document.getElementById('uNameDisp').innerText = d.name;
                document.getElementById('rCode').innerText = d.myRef;
                document.getElementById('kyc').innerText = d.kyc;
                if(d.kyc === 'Verified') document.getElementById('kyc').className = 'text-[10px] text-green-500 font-bold mt-1 uppercase';
            });
        }

        window.changeM = (s, l) => {
            document.getElementById('tv').src = `https://www.tradingview.com/widgetembed/?symbol=${s}&interval=1&theme=dark`;
            document.getElementById('mTitle').innerText = l + " / USDT";
            document.querySelectorAll('.coin-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        };

        let trading = false;
        window.startTrade = async (type) => {
            if(trading) return;
            const sSnap = await get(ref(db, 'users/'+emailKey));
            let bal = sSnap.val().balance; if(bal < 5) return alert("Min Trade $5");
            
            const modeS = await get(ref(db, 'admin/mode'));
            const mode = modeS.val() || 'random';

            trading = true; update(ref(db, 'users/'+emailKey), { balance: bal - 5 });
            let sec = 60; const i = setInterval(() => {
                sec--; document.getElementById('timer').innerText = "00:" + (sec<10?'0':'') + sec;
                if(sec <= 0){
                    clearInterval(i); trading = false; document.getElementById('timer').innerText = "01:00";
                    let win = (mode === 'win') ? true : (mode === 'loss') ? false : (Math.random() > 0.5);
                    if(win){ update(ref(db, 'users/'+emailKey), { balance: (bal-5)+9.50 }); alert("TRADE WIN! +$4.50"); }
                    else alert("TRADE LOSS!");
                }
            }, 1000);
        };

        window.showTab = (id, el) => {
            document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('tab-active'));
            document.getElementById(id).classList.add('tab-active');
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            el.classList.add('active');
        };
        window.openM = (id) => document.getElementById(id).style.display = 'flex';
        window.closeM = (id) => document.getElementById(id).style.display = 'none';
    </script>
</body>
                                                                              </html>
