<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether G-Terminal | Full Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --plasma-core: rgba(0, 255, 242, 0.6);
            --bg-deep: #03050a;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
            --neon-green: #00ff95;
            --neon-red: #ff3c5f;
            --yellow: #f0b90b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 50% 50%, #0a1020 0%, var(--bg-deep) 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white; min-height: 100vh; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }

        /* Top Header */
        .header { margin-top: 20px; letter-spacing: 5px; font-weight: 200; text-transform: uppercase; }
        .header span { color: var(--yellow); font-weight: 800; }

        #kyc-badge {
            margin-top: 10px; font-size: 10px; padding: 5px 15px; border-radius: 20px;
            background: var(--glass); border: 1px solid var(--yellow); color: var(--yellow);
        }

        /* Main Balance Area */
        .plasma-container {
            position: relative; width: 280px; height: 280px;
            display: flex; align-items: center; justify-content: center; margin: 30px 0;
        }
        .plasma-ring {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 1px solid var(--border-glass); animation: rotate 20s linear infinite;
        }
        .balance-box { text-align: center; z-index: 10; }
        .balance-box h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(#fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Action Buttons Grid */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .vapor-btn {
            padding: 15px; background: var(--glass); border: 1px solid var(--border-glass);
            border-radius: 12px; cursor: pointer; text-align: center; font-weight: 800;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .locked { opacity: 0.3; cursor: not-allowed; }

        /* Investment Card */
        .card {
            width: 100%; max-width: 400px; background: var(--glass);
            border: 1px solid var(--border-glass); border-radius: 20px;
            padding: 20px; margin-top: 25px; backdrop-filter: blur(5px);
        }
        .card h3 { color: var(--yellow); margin-bottom: 5px; }
        .card p { font-size: 12px; color: #888; margin-bottom: 15px; }

        /* Trade Button */
        .trade-btn {
            width: 100%; max-width: 400px; padding: 18px; margin-top: 20px;
            background: linear-gradient(90deg, #02c076, #00ff95); color: black;
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer;
            box-shadow: 0 0 20px rgba(2, 192, 118, 0.3);
        }

        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">TRADE FOR <span>PROFIT</span></div>
    <div id="kyc-badge">STATUS: LOADING...</div>

    <div class="plasma-container">
        <div class="plasma-ring"></div>
        <div class="balance-box">
            <small style="color:#888; letter-spacing:2px;">TOTAL ASSETS</small>
            <h1 id="user-bal">$0.00</h1>
        </div>
    </div>

    <div class="btn-grid">
        <div id="dep-btn" class="vapor-btn locked">💳 DEPOSIT</div>
        <div id="with-btn" class="vapor-btn locked">📥 WITHDRAW</div>
    </div>

    <div class="card">
        <h3>STAKING ORBIT</h3>
        <p>Lock assets for 7 days & earn 5% daily rewards.</p>
        <button class="vapor-btn" style="width:100%; color:var(--yellow); border-color:var(--yellow);" onclick="location.href='investment.html'">START EARNING</button>
    </div>

    <button class="trade-btn" onclick="location.href='trade.html'">🚀 OPEN TRADING TERMINAL</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            storageBucket: "trade-for-profit-8b160.firebasestorage.app",
            messagingSenderId: "1077014018991",
            appId: "1:1077014018991:web:24f051595ac36857fd4d5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, 'users/' + user.uid), (snap) => {
                    const data = snap.val();
                    if(data) {
                        document.getElementById('user-bal').innerText = "$" + data.balance.toFixed(2);
                        const status = data.kyc_status || "UNVERIFIED";
                        document.getElementById('kyc-badge').innerText = "KYC: " + status;

                        if(status === "APPROVED") {
                            document.getElementById('dep-btn').classList.remove('locked');
                            document.getElementById('with-btn').classList.remove('locked');
                            document.getElementById('dep-btn').onclick = () => location.href='deposit.html';
                            document.getElementById('with-btn').onclick = () => location.href='withdraw.html';
                        } else {
                            const lockMsg = () => { alert("Please complete KYC verification first!"); location.href='kyc.html'; };
                            document.getElementById('dep-btn').onclick = lockMsg;
                            document.getElementById('with-btn').onclick = lockMsg;
                        }
                    }
                });
            } else {
                document.getElementById('user-bal').innerText = "LOGIN REQ";
            }
        });
    </script>
</body>
</html>
