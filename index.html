<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether G-Terminal | Live Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --plasma-core: rgba(0, 255, 242, 0.6);
            --bg-deep: #03050a;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
            --neon-green: #00ff95;
            --neon-red: #ff3c5f;
            --yellow: #f0b90b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 50% 50%, #0a1020 0%, var(--bg-deep) 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Animated Mesh Background */
        .mesh {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1; z-index: -1;
        }

        .header {
            position: absolute; top: 30px; letter-spacing: 5px;
            font-weight: 200; font-size: 1.2rem; text-transform: uppercase;
        }
        .header span { color: var(--yellow); font-weight: 800; }

        #kyc-badge {
            position: absolute; top: 70px; font-size: 10px;
            padding: 4px 12px; border-radius: 20px;
            background: var(--glass); border: 1px solid var(--yellow);
            color: var(--yellow); letter-spacing: 1px;
        }

        /* Plasma Core Dashboard */
        .plasma-container {
            position: relative; width: 320px; height: 320px;
            display: flex; align-items: center; justify-content: center;
        }

        .plasma-ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 1px solid var(--border-glass);
            box-shadow: 0 0 30px rgba(0, 255, 242, 0.05);
            animation: rotate 20s linear infinite;
        }

        .balance-box { text-align: center; z-index: 10; }
        .balance-box small { color: rgba(255,255,255,0.4); letter-spacing: 4px; font-size: 0.6rem; }
        .balance-box h1 {
            font-size: 2.8rem; font-weight: 800;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Buttons logic */
        .action-container { display: flex; gap: 40px; margin-top: 50px; }
        .vapor-btn {
            width: 150px; height: 55px; background: var(--glass);
            border: 1px solid var(--border-glass); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s; backdrop-filter: blur(10px);
            font-weight: 800; font-size: 0.8rem; letter-spacing: 1px;
        }
        .vapor-btn.locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        .vapor-btn:not(.locked):hover {
            transform: translateY(-5px); border-color: var(--color);
            box-shadow: 0 10px 20px var(--color-semi);
        }

        /* Animations */
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .conduit {
            position: absolute; bottom: 0; width: 100%; height: 60px;
            border-top: 1px solid var(--border-glass);
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(transparent, rgba(0,255,149,0.02));
        }
    </style>
</head>
<body>

    <div class="mesh"></div>
    <div class="header">TRADE FOR <span>PROFIT</span></div>
    <div id="kyc-badge">FETCHING STATUS...</div>

    <div class="plasma-container">
        <div class="plasma-ring"></div>
        <div class="plasma-ring" style="width: 85%; height: 85%; animation-direction: reverse; animation-duration: 10s;"></div>
        <div class="balance-box">
            <small>TOTAL ASSETS</small>
            <h1 id="user-bal">$0.00</h1>
        </div>
    </div>

    <div class="action-container">
        <div id="with-btn" class="vapor-btn locked" style="--color: var(--neon-red); --color-semi: rgba(255,60,95,0.2);">WITHDRAW</div>
        <div id="dep-btn" class="vapor-btn locked" style="--color: var(--neon-green); --color-semi: rgba(0,255,149,0.2);">DEPOSIT</div>
    </div>

    <div class="conduit">
        <p style="font-size: 0.7rem; letter-spacing: 5px; color: var(--neon-green);">LIVE NETWORK ACTIVE</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            storageBucket: "trade-for-profit-8b160.firebasestorage.app",
            messagingSenderId: "1077014018991",
            appId: "1:1077014018991:web:24f051595ac36857fd4d5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // UI Elements
        const balDisplay = document.getElementById('user-bal');
        const kycBadge = document.getElementById('kyc-badge');
        const depBtn = document.getElementById('dep-btn');
        const withBtn = document.getElementById('with-btn');

        // Watch Auth & Data
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const userRef = ref(db, 'users/' + user.uid);
                onValue(userRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        // 1. Update Balance with Animation
                        balDisplay.innerText = `$${data.balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                        
                        // 2. Handle KYC Status
                        const status = data.kyc_status || "UNVERIFIED";
                        kycBadge.innerText = `ACCOUNT: ${status}`;
                        
                        if (status === "APPROVED") {
                            kycBadge.style.borderColor = "var(--neon-green)";
                            kycBadge.style.color = "var(--neon-green)";
                            depBtn.classList.remove('locked');
                            withBtn.classList.remove('locked');
                            
                            depBtn.onclick = () => window.location.href = 'deposit.html';
                            withBtn.onclick = () => window.location.href = 'withdraw.html';
                        } else {
                            depBtn.onclick = () => alert("Complete KYC first!");
                        }
                    }
                });
            } else {
                balDisplay.innerText = "LOGIN REQ";
                kycBadge.innerText = "NOT LOGGED IN";
            }
        });
    </script>
</body>
</html>
