<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Funds | G-Terminal VIP</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0b0e11; 
            --card: #1e2329; 
            --yellow: #fcd535; 
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --input-bg: #2b3139;
            --red: #f6465d;
        }

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; box-sizing: border-box; 
        }

        .box { 
            background: var(--card); padding: 30px; border-radius: 24px; 
            width: 100%; max-width: 420px; border: 1px solid rgba(255,255,255,0.05); 
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-link { color: var(--text-muted); text-decoration: none; font-size: 13px; }

        .bal-card { 
            background: linear-gradient(145deg, #181a20, #0b0e11); 
            padding: 20px; border-radius: 20px; margin-bottom: 20px; 
            border: 1px solid rgba(252, 213, 53, 0.1);
        }
        .bal-card small { color: var(--text-muted); font-size: 10px; font-weight: 700; text-transform: uppercase; }
        #current-bal { font-size: 28px; font-weight: 800; color: var(--yellow); }

        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; margin-left: 5px; }

        input, select { 
            width: 100%; padding: 14px; background: var(--input-bg); 
            border: 1px solid #474d57; color: white; border-radius: 12px; 
            box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--yellow); }

        /* Fees Summary Box */
        .fee-summary {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .fee-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .total-row { border-top: 1px solid #333; margin-top: 8px; padding-top: 8px; font-weight: bold; color: var(--yellow); }

        .btn-withdraw { 
            width: 100%; padding: 16px; background: var(--yellow); 
            color: black; border: none; border-radius: 14px; 
            font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-withdraw:active { transform: scale(0.98); }

        .note { font-size: 11px; color: var(--text-muted); margin-top: 15px; text-align: left; line-height: 1.4; }
    </style>
</head>
<body>

<div class="box">
    <div class="nav-header">
        <a href="index.html" class="back-link">← Cancel</a>
        <span style="font-size: 12px; font-weight: bold; color: var(--text-muted);">SECURITY VERIFIED</span>
    </div>
    
    <h2>Withdrawal</h2>
    
    <div class="bal-card">
        <small>Available Balance</small>
        <div id="current-bal">$0.00</div>
    </div>

    <div class="input-group">
        <label>AMOUNT TO WITHDRAW ($)</label>
        <input type="number" id="w-amount" placeholder="0.00" oninput="calculateFees()">
    </div>

    <div class="input-group">
        <label>PAYMENT METHOD</label>
        <select id="w-method">
            <option value="EasyPaisa">EasyPaisa</option>
            <option value="JazzCash">JazzCash</option>
            <option value="USDT">USDT (TRC20)</option>
        </select>
    </div>

    <div class="input-group">
        <label>ACCOUNT DETAILS</label>
        <input type="text" id="w-account" placeholder="Number or Address">
    </div>

    <div class="fee-summary">
        <div class="fee-row">
            <span>Service Fee (5%)</span>
            <span id="fee-amt" style="color: var(--red);">-$0.00</span>
        </div>
        <div class="fee-row total-row">
            <span>You will receive</span>
            <span id="net-amt">$0.00</span>
        </div>
    </div>
    
    <button class="btn-withdraw" onclick="requestWithdraw()">Submit Request</button>

    <div class="note">
        <b>Processing Info:</b> Fees are automatically deducted from the requested amount. Minimum withdrawal is $10.
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", 
        authDomain: "trade-for-profit-8b160.firebaseapp.com", 
        databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", 
        projectId: "trade-for-profit-8b160", 
        storageBucket: "trade-for-profit-8b160.firebasestorage.app", 
        messagingSenderId: "1077014018991", 
        appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const FEES_PERCENT = 5; // Yahan se fees change kar sakte hain

    function calculateFees() {
        const amt = parseFloat(document.getElementById('w-amount').value) || 0;
        const fee = (amt * FEES_PERCENT) / 100;
        const net = amt - fee;

        document.getElementById('fee-amt').innerText = "-$" + fee.toFixed(2);
        document.getElementById('net-amt').innerText = "$" + (net > 0 ? net.toFixed(2) : "0.00");
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const d = snap.val();
                if (d) {
                    document.getElementById('current-bal').innerText = "$" + parseFloat(d.balance).toFixed(2);
                    window.userBal = d.balance;
                    window.kycStatus = d.kyc_status;
                }
            });
        } else { window.location.href = "login.html"; }
    });

    function requestWithdraw() {
        const amt = parseFloat(document.getElementById('w-amount').value);
        const acc = document.getElementById('w-account').value;
        const meth = document.getElementById('w-method').value;
        const fee = (amt * FEES_PERCENT) / 100;
        const net = amt - fee;

        if (window.kycStatus !== "APPROVED") return alert("KYC Verification Required!");
        if (!amt || amt < 10) return alert("Minimum withdrawal is $10!");
        if (amt > window.userBal) return alert("Insufficient balance!");
        if (!acc) return alert("Enter account details!");

        const requestData = {
            uid: auth.currentUser.uid,
            email: auth.currentUser.email,
            requested_amount: amt,
            fee_deducted: fee,
            net_payout: net, // Admin ko pata chalega kitna bhejna hai
            method: meth,
            account: acc,
            status: "PENDING",
            timestamp: Date.now()
        };

        db.ref('withdrawals').push(requestData).then(() => {
            // Withdrawal submit hote hi user ke balance se poora amount minus karna
            db.ref('users/' + auth.currentUser.uid).update({
                balance: window.userBal - amt
            }).then(() => {
                alert(`Request Sent! $${fee.toFixed(2)} fees deducted. You will receive $${net.toFixed(2)}.`);
                window.location.href = "index.html";
            });
        });
    }
</script>

</body>
</html>
