<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        :root { --bg: #060708; --card: #131722; --yellow: #f0b90b; --green: #00c805; --red: #ff3b30; --text: #d1d4dc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; overflow: hidden; }
        .top-bar { display: flex; justify-content: space-between; padding: 10px; background: var(--card); border-radius: 8px; margin-bottom: 10px; border: 1px solid #2a2e39; }
        #chart-container { height: 380px; width: 100%; background: #131722; border-radius: 12px; position: relative; border: 1px solid #2a2e39; }
        .price-tag { position: absolute; top: 15px; left: 15px; z-index: 10; font-size: 1.8rem; font-weight: bold; font-family: monospace; color: #fff; }
        .controls { background: var(--card); padding: 15px; border-radius: 15px; margin-top: 10px; border: 1px solid #2a2e39; }
        .input-box { background: #1e222d; border: 1px solid #363c4e; color: white; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; margin: 5px 0; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .up { background: var(--green); } .down { background: var(--red); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>Asset: <span id="display-asset" style="color:var(--yellow)">BTC/USDT</span></div>
        <div>Balance: <span id="top-bal" style="color:var(--yellow)">$0.00</span></div>
    </div>

    <div id="chart-container">
        <div class="price-tag" id="price-main">0.00</div>
    </div>

    <div class="controls">
        <div id="timer-txt" style="text-align:center; color:var(--yellow); margin-bottom:5px;">Market Live</div>
        <div style="display: flex; gap: 10px;">
            <select class="input-box" id="asset-list" onchange="changeAsset()" style="flex: 2;">
                <option value="BTC">Bitcoin (BTC)</option>
                <option value="ETH">Ethereum (ETH)</option>
            </select>
            <select class="input-box" id="trade-duration" style="flex: 1;">
                <option value="60">1 Min</option>
            </select>
        </div>
        <input type="number" id="invest-amt" class="input-box" placeholder="Amount ($)">
        <div class="btn-group">
            <button class="btn up" onclick="trade('UP')">UP</button>
            <button class="btn down" onclick="trade('DOWN')">DOWN</button>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", authDomain: "trade-for-profit-8b160.firebaseapp.com", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", projectId: "trade-for-profit-8b160", storageBucket: "trade-for-profit-8b160.firebasestorage.app", messagingSenderId: "1077014018991", appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Chart Initialization logic with check
    const container = document.getElementById('chart-container');
    const chart = LightweightCharts.createChart(container, {
        layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
        grid: { vertLines: { visible: false }, horzLines: { color: '#2a2e39' } },
        timeScale: { timeVisible: true, secondsVisible: true }
    });
    const candleSeries = chart.addCandlestickSeries({ upColor: '#00c805', downColor: '#ff3b30' });

    let currentPrice = 65000.00;
    
    // Test Data to force chart to show something
    const initialData = [];
    let time = Math.floor(Date.now() / 1000) - 100;
    for(let i=0; i<100; i++) {
        initialData.push({ time: time + i, open: 65000, high: 65010, low: 64990, close: 65000 });
    }
    candleSeries.setData(initialData);

    setInterval(() => {
        let open = currentPrice;
        let drift = (Math.random() - 0.5) * 10;
        currentPrice += drift;
        candleSeries.update({
            time: Math.floor(Date.now() / 1000),
            open: open, high: open+5, low: open-5, close: currentPrice
        });
        document.getElementById('price-main').innerText = currentPrice.toFixed(2);
    }, 1000);

    // Asset Change & Trade functions (Shortened for space)
    function changeAsset() { /* Same as before */ }
    function trade(dir) { /* Same as before */ }
</script>
</body>
</html>
