<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Pro Elite - Final Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #fcd535; --green: #0ecb81; --red: #f6465d; --text: #eaecef; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Fake Ticker (Patti) */
        .ticker-wrap { width: 100%; overflow: hidden; background: #181a20; border-bottom: 1px solid #2b2f36; height: 35px; display: flex; align-items: center; }
        .ticker { white-space: nowrap; animation: ticker 25s linear infinite; font-size: 11px; color: var(--yellow); font-weight: bold; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .top-bar { display: flex; justify-content: space-between; padding: 15px; background: var(--card); border-bottom: 1px solid #2b2f36; }
        #chart-container { height: 350px; width: 100%; position: relative; background: #000; }
        
        /* Exact Entry Marker */
        #entry-line { position: absolute; width: 100%; height: 2px; border-top: 2px dashed var(--yellow); display: none; z-index: 100; }
        #entry-label { position: absolute; right: 0; top: -25px; background: var(--yellow); color: #000; padding: 4px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; }

        /* CUSTOM POPUP (Looks like Original Alert) */
        #custom-alert { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 20000; 
        }
        .alert-box { 
            background: white; color: black; padding: 20px; border-radius: 12px; width: 80%; max-width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .alert-btn { 
            margin-top: 15px; background: #007aff; color: white; border: none; padding: 10px 40px; border-radius: 5px; font-weight: bold; cursor: pointer; 
        }

        .controls { background: var(--card); padding: 20px; border-radius: 25px 25px 0 0; margin-top: -15px; border-top: 1px solid #2b2f36; position: relative; z-index: 10; }
        .input-box { background: #2b3139; border: 1px solid #474d57; color: white; padding: 15px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-size: 20px; text-align: center; font-weight: bold; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 20px; border: none; border-radius: 12px; font-weight: 900; font-size: 1.1rem; cursor: pointer; color: white; text-transform: uppercase; }
        .up { background: var(--green); } .down { background: var(--red); }

        .panel { padding: 15px; background: var(--card); border-top: 1px solid #2b2f36; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #2b2f36; font-size: 13px; }
        .flag { width: 22px; height: 15px; margin-right: 10px; vertical-align: middle; }
    </style>
</head>
<body>

<div id="custom-alert">
    <div class="alert-box">
        <p style="font-size: 14px; margin: 0;">The page at "https://kingmaker..." says:</p>
        <p style="font-weight: bold; margin: 10px 0;">Price Syncing... Try in 1s</p>
        <button class="alert-btn" onclick="closePopup()">OK</button>
    </div>
</div>

<div class="ticker-wrap">
    <div class="ticker">
        <span>● Malik_Trade deposited $1,500.00</span> <span>● User_772 withdrew $320.00</span> <span>● Rahul_Vip deposited $2,000.00</span>
    </div>
</div>

<div class="top-bar">
    <div style="font-weight:900; color:var(--yellow); font-size:18px;">BTC/USDT</div>
    <div>Bal: <span id="top-bal" style="color:var(--yellow); font-weight:bold;">$0.00</span></div>
</div>

<div id="chart-container">
    <div id="entry-line"><span id="entry-label">ENTRY @ 0.00</span></div>
    <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=1&theme=dark" style="width: 100%; height: 100%; border: none;"></iframe>
</div>

<div class="controls">
    <div id="status-text" style="text-align:center; color:var(--yellow); font-size:13px; margin-bottom:12px; font-weight:bold;">MARKET LIVE</div>
    <input type="number" id="trade-amt" class="input-box" value="10">
    <div class="btn-group">
        <button class="btn up" onclick="showPopup('UP')">CALL (UP)</button>
        <button class="btn down" onclick="showPopup('DOWN')">PUT (DOWN)</button>
    </div>
</div>

<div class="panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <span style="color:var(--yellow); font-size:11px; font-weight:bold;">GLOBAL RANKING</span>
        <span id="date-now" style="color:var(--yellow); font-size:11px;"></span>
    </div>
    <div id="lb-list">
        <div class="row" style="background: rgba(246, 70, 93, 0.1); padding: 8px; border-radius: 5px;">
            <span><img class="flag" src="https://flagcdn.com/w20/pk.png"> hussain002424 (You)</span>
            <span style="color:var(--red); font-weight:bold;">-$420.50</span>
        </div>
        <div class="row">
            <span><img class="flag" src="https://flagcdn.com/w20/in.png"> Rahul_Vip***</span>
            <span style="color:var(--green); font-weight:bold;">+$3,800.00</span>
        </div>
    </div>
</div>

<div class="panel">
    <div style="color:var(--yellow); font-size:11px; font-weight:bold; margin-bottom:10px;">RECENT TRADES</div>
    <div id="hist-list"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", authDomain: "trade-for-profit-8b160.firebaseapp.com", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", projectId: "trade-for-profit-8b160", storageBucket: "trade-for-profit-8b160.firebasestorage.app", messagingSenderId: "1077014018991", appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let livePrice = 0;
    let pendingDir = "";
    document.getElementById('date-now').innerText = new Date().toLocaleDateString();

    // Background Price Sync (Never stops)
    setInterval(() => {
        fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
        .then(r => r.json()).then(d => { livePrice = parseFloat(d.price); });
    }, 500);

    auth.onAuthStateChanged(u => {
        if(u) {
            db.ref('users/'+u.uid).on('value', s => {
                const d = s.val() || {};
                document.getElementById('top-bal').innerText = "$" + (d.balance || 0).toFixed(2);
                renderHist(d.history);
                if(d.activeTrade) monitorTrade(u.uid, d.activeTrade);
            });
        }
    });

    function showPopup(dir) {
        pendingDir = dir;
        document.getElementById('custom-alert').style.display = 'flex';
    }

    function closePopup() {
        document.getElementById('custom-alert').style.display = 'none';
        executeTrade();
    }

    function executeTrade() {
        const u = auth.currentUser;
        const amt = parseFloat(document.getElementById('trade-amt').value);
        if(livePrice === 0) { alert("Still Syncing..."); return; }

        db.ref('users/'+u.uid).once('value', s => {
            const bal = s.val().balance || 0;
            if(amt > bal) return alert("Low Balance");
            const trade = { dir: pendingDir, amount: amt, entryPrice: livePrice, startTime: Date.now(), status: "running" };
            db.ref('users/'+u.uid).update({ balance: bal - amt, activeTrade: trade });
        });
    }

    function monitorTrade(uid, t) {
        const line = document.getElementById('entry-line');
        const left = 60 - Math.floor((Date.now() - t.startTime)/1000);
        if(left <= 0) {
            line.style.display = "none";
            finishTrade(uid, t);
        } else {
            document.getElementById('status-text').innerText = "TRADE CLOSING: " + left + "s";
            line.style.display = "block";
            document.getElementById('entry-label').innerText = "ENTRY @ " + t.entryPrice;
            setTimeout(() => monitorTrade(uid, t), 1000);
        }
    }

    function finishTrade(uid, t) {
        db.ref('users/'+uid).once('value', s => {
            const win = Math.random() > 0.8;
            const res = win ? (t.amount * 1.85) : 0;
            const h = s.val().history || [];
            h.unshift({ dir: t.dir, amt: t.amount, res: win ? "WIN" : "LOSS", time: new Date().toLocaleTimeString() });
            db.ref('users/'+uid).update({ balance: s.val().balance + res, activeTrade: null, history: h.slice(0, 5) });
        });
    }

    function renderHist(h) {
        const l = document.getElementById('hist-list'); l.innerHTML = "";
        if(!h) return;
        h.forEach(x => {
            l.innerHTML += `<div class="row"><span>${x.dir} | ${x.time}</span><span style="color:${x.res=='WIN'?'var(--green)':'var(--red)'}">${x.res} ($${x.amt})</span></div>`;
        });
    }
</script>
</body>
</html>
