<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #05070a; 
            --card: rgba(30, 35, 41, 0.9); 
            --yellow: #fcd535; 
            --green: #0ecb81; 
            --red: #f6465d; 
            --text: #eaecef; 
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; 
            overflow: hidden; 
        }

        /* 3D Floating Glassmorphism Result Popup */
        #result-popup { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(10px);
            display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 30000; 
        }

        .res-card { 
            padding: 40px 20px; 
            border-radius: 30px; 
            text-align: center; 
            width: 85%; 
            max-width: 320px; 
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 2px solid rgba(255,255,255,0.1);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .res-win { 
            background: linear-gradient(145deg, #0ecb81, #0a9d63); 
            box-shadow: 0 20px 50px rgba(14, 203, 129, 0.4); 
        }

        .res-loss { 
            background: linear-gradient(145deg, #f6465d, #c0392b); 
            box-shadow: 0 20px 50px rgba(246, 70, 93, 0.4); 
        }

        /* Ticker Styling */
        .ticker-wrap { background: #111418; border-bottom: 1px solid #2b2f36; padding: 8px 0; }
        .ticker { color: var(--yellow); font-size: 12px; font-weight: 600; }

        /* Chart Area */
        #chart-container { height: 40vh; border-bottom: 2px solid #1e2329; }

        /* Control Panel UI */
        .controls { 
            background: var(--card); 
            padding: 25px 20px; 
            border-radius: 30px 30px 0 0; 
            margin-top: -20px; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .input-box { 
            background: #161a1e; border: 1px solid #2b3139; color: var(--yellow); 
            padding: 18px; border-radius: 15px; width: 100%; box-sizing: border-box; 
            font-size: 24px; font-weight: 800; margin-bottom: 15px; outline: none;
        }

        .btn { 
            height: 70px; border-radius: 18px; font-weight: 800; font-size: 1.2rem; 
            transition: 0.2s; border: none; cursor: pointer; color: #000;
        }
        .up { background: var(--green); box-shadow: 0 4px 0 #0a9d63; margin-right: 10px; }
        .down { background: var(--red); box-shadow: 0 4px 0 #c0392b; color: #fff; }
        .btn:active { transform: translateY(4px); box-shadow: none; }

        .status-badge {
            background: rgba(252, 213, 53, 0.1);
            color: var(--yellow);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div id="result-popup">
    <div id="res-card" class="res-card">
        <div id="icon-box" style="font-size: 60px; margin-bottom: 10px;">🏆</div>
        <h1 id="res-status" style="margin: 0; font-size: 45px; font-weight: 800;">WIN</h1>
        <p id="res-msg" style="margin: 10px 0; font-weight: 600; opacity: 0.9;">Profit Added to Account</p>
        <button onclick="closeResult()" style="background: #fff; color: #000; border: none; padding: 15px 40px; border-radius: 12px; font-weight: 800; margin-top: 15px; cursor: pointer; width: 100%;">CONTINUE</button>
    </div>
</div>

<div class="top-bar" style="display:flex; justify-content:space-between; padding:15px; background:#181a20;">
    <div style="font-weight:800; color:var(--yellow); font-size:1.1rem;">G-TERMINAL</div>
    <div id="top-bal" style="font-weight:800; color:#fff;">$0.00</div>
</div>

<div id="chart-container">
    <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=1&theme=dark" style="width: 100%; height: 100%; border: none;"></iframe>
</div>

<div class="controls" style="text-align: center;">
    <div id="status-text" class="status-badge">MARKET ANALYZING...</div>
    
    <div style="color:#848e9c; font-size:12px; margin-bottom:5px;">ENTER INVESTMENT AMOUNT</div>
    <input type="number" id="trade-amt" class="input-box" value="10">
    
    <div style="display: flex; width: 100%;">
        <button class="btn up" style="flex:1" onclick="openPopup('UP')">CALL ▲</button>
        <button class="btn down" style="flex:1" onclick="openPopup('DOWN')">PUT ▼</button>
    </div>
</div>
