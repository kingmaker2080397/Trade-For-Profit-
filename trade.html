<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade For Profit - Final Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #fcd535; --green: #0ecb81; --red: #f6465d; --text: #eaecef; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .top-bar { display: flex; justify-content: space-between; padding: 12px; background: var(--card); border-bottom: 1px solid #2b2f36; }
        #chart-container { height: 350px; width: 100%; position: relative; background: #000; }
        
        /* Sync Overlay - Professional look */
        #sync-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(11, 14, 17, 0.9); display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10000; pointer-events: all; 
        }

        .controls { background: var(--card); padding: 20px; border-radius: 25px 25px 0 0; margin-top: -15px; border-top: 1px solid #2b2f36; position: relative; z-index: 5; }
        .input-box { background: #2b3139; border: 1px solid #474d57; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 18px; text-align: center; outline: none; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; color: white; }
        .up { background: var(--green); } .down { background: var(--red); }

        .panel { padding: 15px; background: var(--card); border-top: 1px solid #2b2f36; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2b2f36; font-size: 13px; }
    </style>
</head>
<body>

<div id="sync-overlay">
    <div style="color:var(--yellow); font-size: 22px; font-weight:bold; letter-spacing: 1px;">WAIT 2 SECONDS...</div>
    <div style="font-size:14px; color:#848e9c; margin-top:10px;">Updating Trade Place</div>
</div>

<div class="top-bar">
    <div style="font-weight:bold; color:var(--yellow)">BTC/USDT</div>
    <div>Balance: <span id="top-bal" style="color:var(--yellow)">$0.00</span></div>
</div>

<div id="chart-container">
    <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=1&theme=dark" style="width: 100%; height: 100%; border: none;"></iframe>
</div>

<div class="controls">
    <div id="status-text" style="text-align:center; color:var(--yellow); font-size:13px; margin-bottom:10px; font-weight:bold;">MARKET ACTIVE</div>
    <input type="number" id="trade-amt" class="input-box" value="10">
    <div class="btn-group">
        <button class="btn up" onclick="startSync('UP')">UP</button>
        <button class="btn down" onclick="startSync('DOWN')">DOWN</button>
    </div>
</div>

<div class="panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <span style="color:var(--yellow); font-size:12px; font-weight:bold;">GLOBAL RANKING</span>
        <span id="today-date" style="color:var(--yellow); font-size:12px; font-weight:bold;"></span>
    </div>
    <div id="lb-list"></div>
</div>

<div class="panel">
    <div style="color:var(--yellow); font-size:12px; font-weight:bold; margin-bottom:10px;">RECENT TRADES</div>
    <div id="hist-list"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", authDomain: "trade-for-profit-8b160.firebaseapp.com", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", projectId: "trade-for-profit-8b160", storageBucket: "trade-for-profit-8b160.firebasestorage.app", messagingSenderId: "1077014018991", appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let livePrice = 0;
    
    // Date Setup
    const now = new Date();
    document.getElementById('today-date').innerText = now.toLocaleDateString();

    // Price fetch direct logic
    function fetchPrice() {
        fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
        .then(r => r.json()).then(data => { 
            livePrice = parseFloat(data.price); 
        }).catch(e => console.error("Price Error"));
    }
    setInterval(fetchPrice, 1000);
    fetchPrice(); // Initial fetch

    auth.onAuthStateChanged(u => {
        if(u) {
            db.ref('users/'+u.uid).on('value', s => {
                const d = s.val() || {};
                document.getElementById('top-bal').innerText = "$" + (d.balance || 0).toFixed(2);
                renderLB(u.email, d.name);
                renderHistory(d.history);
            });
        }
    });

    // Button Click -> Wait -> Place Trade
    function startSync(direction) {
        document.getElementById('sync-overlay').style.display = 'flex';
        
        setTimeout(() => {
            document.getElementById('sync-overlay').style.display = 'none';
            executeTrade(direction);
        }, 2000);
    }

    function executeTrade(dir) {
        const u = auth.currentUser;
        const amt = parseFloat(document.getElementById('trade-amt').value);

        if(livePrice === 0) {
            alert("Connection slow, trying again...");
            fetchPrice();
            return;
        }

        db.ref('users/'+u.uid).once('value', s => {
            const bal = s.val().balance || 0;
            if(amt > bal) return alert("Low Balance!");

            const trade = { 
                dir, amount: amt, entryPrice: livePrice, 
                startTime: Date.now(), status: "running" 
            };
            
            db.ref('users/'+u.uid).update({ 
                balance: bal - amt, 
                activeTrade: trade 
            });
        });
    }

    // Leaderboard and History helpers
    function renderLB(email, name) {
        document.getElementById('lb-list').innerHTML = `<div class="row" style="color:var(--red)"><span>#1 🇵🇰 ${name || email.split('@')[0]} (You)</span><span>-$420.50</span></div>`;
    }

    function renderHistory(h) {
        const list = document.getElementById('hist-list');
        list.innerHTML = "";
        if(!h) return list.innerHTML = "<div style='text-align:center; color:gray; font-size:12px;'>No trades yet</div>";
        h.forEach(x => {
            list.innerHTML += `<div class="row"><span>${x.dir} | ${x.time}</span><span style="color:${x.res=='WIN'?'var(--green)':'var(--red)'}">${x.res} ($${x.amt})</span></div>`;
        });
    }
</script>
</body>
</html>
