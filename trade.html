<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Pro - Elite Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #fcd535; --green: #0ecb81; --red: #f6465d; --text: #eaecef; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .ticker-wrap { width: 100%; overflow: hidden; background: #181a20; border-bottom: 1px solid #2b2f36; height: 30px; display: flex; align-items: center; }
        .ticker { white-space: nowrap; animation: ticker 30s linear infinite; font-size: 10px; color: #848e9c; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .top-bar { display: flex; justify-content: space-between; padding: 12px 20px; background: var(--card); }
        #chart-container { height: 400px; background: #000; position: relative; }
        .controls { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: var(--card); border-top: 1px solid #333; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .trade-btn { border: none; padding: 18px; border-radius: 15px; font-weight: 900; color: #fff; cursor: pointer; }
        .btn-up { background: var(--green); } .btn-down { background: var(--red); }
        #result-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .res-card { padding: 40px; border-radius: 28px; text-align: center; width: 80%; max-width: 300px; }
        .res-win { background: var(--green); } .res-loss { background: var(--red); }
        .timer-overlay { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; color: var(--yellow); border: 1px solid var(--yellow); display: none; }
    </style>
</head>
<body>

<div class="ticker-wrap"><div class="ticker"><span>BTC/USDT +2.45%</span> <span>User Malik_77 Withdrew $450</span> <span>ETH/USDT -1.12%</span></div></div>

<div class="top-bar">
    <div style="color:var(--yellow); font-weight:800;">BTC/USDT ⚡</div>
    <div>Wallet: <span id="top-bal" style="font-weight:bold;">$0.00</span></div>
</div>

<div id="chart-container">
    <div class="timer-overlay" id="trade-timer">00:60</div>
    <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3ABTCUSDT&interval=1&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
</div>

<div class="controls">
    <input type="number" id="trade-amount" placeholder="Investment Amount ($)" style="grid-column: span 2; padding: 12px; border-radius: 10px; border: 1px solid #474d57; background: #2b3139; color: white;">
    <button class="trade-btn btn-up" onclick="startTrade()">CALL (UP)</button>
    <button class="trade-btn btn-down" onclick="startTrade()">PUT (DOWN)</button>
</div>

<div id="result-popup">
    <div class="res-card" id="res-card">
        <h1 id="res-status">WIN</h1>
        <p id="res-msg">Profit: +$0.00</p>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; border-radius:10px; border:none; background:#fff; font-weight:bold;">CONTINUE</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", authDomain: "trade-for-profit-8b160.firebaseapp.com", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", projectId: "trade-for-profit-8b160", storageBucket: "trade-for-profit-8b160.firebasestorage.app", messagingSenderId: "1077014018991", appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let userBal = 0;
    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).on('value', s => {
                userBal = s.val().balance;
                document.getElementById('top-bal').innerText = "$" + userBal.toFixed(2);
            });
        } else { window.location.href="login.html"; }
    });

    function startTrade() {
        const amt = parseFloat(document.getElementById('trade-amount').value);
        if(!amt || amt > userBal || amt < 5) return alert("Min trade $5 or Insufficient balance!");

        document.querySelectorAll('.trade-btn').forEach(b => b.disabled = true);
        document.getElementById('trade-timer').style.display = 'block';
        
        let sec = 15; // Fast trade for testing
        const timer = setInterval(() => {
            sec--;
            document.getElementById('trade-timer').innerText = "00:" + (sec < 10 ? "0"+sec : sec);
            if(sec <= 0) { clearInterval(timer); finishTrade(amt); }
        }, 1000);
    }

    function finishTrade(amt) {
        const uid = auth.currentUser.uid;
        Promise.all([db.ref('settings/globalControl').get(), db.ref('users/'+uid).get()]).then(res => {
            const gMode = res[0].val() || "NORMAL";
            const uData = res[1].val();
            const uMode = uData.control || "NORMAL";
            const winRate = uData.winRate || 50;

            let isWin = false;
            // Hierarchy: Global > Individual > WinRate %
            if(gMode === "WIN") isWin = true;
            else if(gMode === "LOSS") isWin = false;
            else if(uMode === "WIN") isWin = true;
            else if(uMode === "LOSS") isWin = false;
            else isWin = (Math.floor(Math.random() * 100) < winRate);

            const profit = isWin ? (amt * 1.85) : 0;
            const newBal = (userBal - amt) + profit;

            db.ref('users/'+uid).update({ balance: newBal, control: "NORMAL" });

            document.getElementById('result-popup').style.display = 'flex';
            document.getElementById('res-card').className = "res-card " + (isWin ? "res-win" : "res-loss");
            document.getElementById('res-status').innerText = isWin ? "WIN" : "LOSS";
            document.getElementById('res-msg').innerText = isWin ? "Profit: +$" + (amt*0.85).toFixed(2) : "Lost: -$" + amt;
        });
    }
</script>
</body>
</html>
