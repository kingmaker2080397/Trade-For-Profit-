<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #f0b90b; --green: #02c076; --red: #f6465d; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; }
        
        /* Chart Box Fix */
        #chart-wrapper {
            height: 350px;
            width: 100%;
            background: #161a1e;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2b3139;
            margin-bottom: 15px;
        }

        .controls { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #2b3139; }
        #timer-display { text-align: center; color: var(--yellow); font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; background: #2b3139; border: 1px solid #474d57; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-group { display: flex; justify-content: space-between; margin-top: 10px; }
        .btn-up { background: var(--green); width: 48%; padding: 15px; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .btn-down { background: var(--red); width: 48%; padding: 15px; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="chart-wrapper">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div id="tradingview_chart" style="height:100%;width:100%"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "BINANCE:BTCUSDT",
                    "interval": "1",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "hide_side_toolbar": true,
                    "allow_symbol_change": true,
                    "container_id": "tradingview_chart"
                });
            </script>
        </div>
    </div>

    <div class="controls">
        <div id="timer-display">Closing in: 60s</div>
        <select id="asset-choice">
            <option value="BINANCE:BTCUSDT">BTC/USDT</option>
            <option value="FX:EURUSD">EUR/USD</option>
            <option value="OANDA:XAUUSD">GOLD</option>
        </select>
        <input type="number" id="trade-amount" placeholder="Amount ($)">
        <div class="btn-group">
            <button class="btn-up" onclick="placeTrade('UP')">CALL (UP)</button>
            <button class="btn-down" onclick="placeTrade('DOWN')">PUT (DOWN)</button>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            storageBucket: "trade-for-profit-8b160.firebasestorage.app",
            messagingSenderId: "1077014018991",
            appId: "1:1077014018991:web:c41320e2ef10291afd4d5a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        function placeTrade(dir) {
            const user = auth.currentUser;
            const amt = parseFloat(document.getElementById('trade-amount').value);
            
            if(!user) return alert("Please Login First!");
            if(!amt || amt < 1) return alert("Enter Amount!");

            db.ref('users/' + user.uid).once('value', snap => {
                const bal = snap.val().balance;
                if(amt > bal) return alert("Insufficient Balance!");

                // Deduct Balance
                db.ref('users/' + user.uid).update({ balance: bal - amt });

                // Start Timer
                let timeLeft = 60;
                const timer = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer-display').innerText = "Closing in: " + timeLeft + "s";
                    if(timeLeft <= 0) {
                        clearInterval(timer);
                        alert("Trade Finished!");
                        location.reload();
                    }
                }, 1000);
            });
        }
    </script>
</body>
</html>
