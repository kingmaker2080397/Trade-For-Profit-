<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Terminal | Professional Trader</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #060708; --card: #131722; --yellow: #f0b90b; --green: #00c805; --red: #ff3b30; --text: #d1d4dc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .top-bar { display: flex; justify-content: space-between; padding: 12px; background: var(--card); border-radius: 8px; margin-bottom: 10px; border: 1px solid #2a2e39; font-size: 0.9rem; }
        .stat-val { color: var(--yellow); font-weight: bold; }

        #chart-container { height: 380px; width: 100%; background: var(--card); border-radius: 12px; position: relative; border: 1px solid #2a2e39; }
        .price-tag { position: absolute; top: 15px; left: 15px; z-index: 10; font-size: 1.8rem; font-weight: 800; font-family: monospace; }
        
        .controls { background: var(--card); padding: 15px; border-radius: 15px; margin-top: 10px; border: 1px solid #2a2e39; }
        .input-box { background: #1e222d; border: 1px solid #363c4e; color: white; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; margin: 5px 0; outline: none; font-size: 1rem; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .up { background: var(--green); box-shadow: 0 4px 0 #008a04; }
        .down { background: var(--red); box-shadow: 0 4px 0 #b32a22; }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .btn:disabled { background: #444; box-shadow: none; cursor: not-allowed; }

        #res-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="res-box">
        <img id="res-img" src="" style="width:120px;">
        <h1 id="res-msg" style="font-size:2.5rem; margin:15px 0;"></h1>
        <h2 id="res-payout" style="color:var(--yellow)"></h2>
        <button onclick="closeRes()" style="margin-top:30px; padding:12px 50px; background:var(--yellow); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">CONTINUE</button>
    </div>

    <div class="top-bar">
        <div>Asset: <span id="display-asset" class="stat-val">BTC/USDT</span></div>
        <div>Balance: <span id="top-bal" class="stat-val">$0.00</span></div>
    </div>

    <div id="chart-container">
        <div class="price-tag" id="price-main">0.00</div>
    </div>

    <div class="controls">
        <div id="timer-txt" style="text-align:center; font-weight:bold; color:var(--yellow); margin-bottom:5px;">Market Live</div>

                <option value="XAU">Gold (XAU)</option>
                <option value="SOL">Solana (SOL)</option>
            </select>
