<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade For Profit - Ultra Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #fcd535; --green: #0ecb81; --red: #f6465d; --text: #eaecef; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        .top-bar { display: flex; justify-content: space-between; padding: 12px; background: var(--card); border-bottom: 1px solid #2b2f36; }
        #chart-container { height: 350px; width: 100%; position: relative; background: #000; }
        
        /* Sync Overlay */
        #sync-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10000; 
        }

        .controls { background: var(--card); padding: 20px; border-radius: 25px 25px 0 0; margin-top: -15px; border-top: 1px solid #2b2f36; position: relative; z-index: 5; }
        .input-box { background: #2b3139; border: 1px solid #474d57; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 18px; text-align: center; outline: none; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; color: white; }
        .up { background: var(--green); } .down { background: var(--red); }

        .panel { padding: 15px; background: var(--card); border-top: 1px solid #2b2f36; height: 150px; overflow-y: auto; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2b2f36; font-size: 13px; }
        #entry-marker { position: absolute; width: 100%; height: 2px; border-top: 2px dashed var(--yellow); display: none; z-index: 100; top: 50%; }
        #entry-label { position: absolute; right: 0; top: -25px; background: var(--yellow); color: #000; padding: 4px; font-size: 11px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

<div id="sync-overlay">
    <div style="color:var(--yellow); font-size: 20px; font-weight:bold;">WAIT 2 SECONDS...</div>
    <div style="font-size:14px; color:gray; margin-top:10px;">Updating Trade Place</div>
</div>

<div class="top-bar">
    <div style="font-weight:bold; color:var(--yellow)">BTC/USDT</div>
    <div>Balance: <span id="top-bal" style="color:var(--yellow)">$0.00</span></div>
</div>

<div id="chart-container">
    <div id="entry-marker"><span id="entry-label">ENTRY @ 0.00</span></div>
    <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=1&theme=dark" style="width: 100%; height: 100%; border: none;"></iframe>
</div>

<div class="controls">
    <div id="status-text" style="text-align:center; color:var(--yellow); font-size:13px; margin-bottom:10px; font-weight:bold;">MARKET LIVE</div>
    <input type="number" id="trade-amt" class="input-box" value="10">
    <div class="btn-group">
        <button class="btn up" onclick="startWait('UP')">CALL (UP)</button>
        <button class="btn down" onclick="startWait('DOWN')">PUT (DOWN)</button>
    </div>
</div>

<div class="panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <span style="color:var(--yellow); font-size:12px; font-weight:bold;">GLOBAL RANKING</span>
        <span id="date-now" style="color:var(--yellow); font-size:12px;"></span>
    </div>
    <div id="lb-list"></div>
</div>

<div class="panel">
    <div style="color:var(--yellow); font-size:12px; font-weight:bold; margin-bottom:10px;">TRADE HISTORY</div>
    <div id="hist-list"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", authDomain: "trade-for-profit-8b160.firebaseapp.com", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", projectId: "trade-for-profit-8b160", storageBucket: "trade-for-profit-8b160.firebasestorage.app", messagingSenderId: "1077014018991", appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let lastKnownPrice = 0;
    document.getElementById('date-now').innerText = new Date().toLocaleDateString();

    // Constant Price Update
    setInterval(() => {
        fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
        .then(r => r.json()).then(d => { lastKnownPrice = parseFloat(d.price); })
        .catch(() => {}); 
    }, 1000);

    auth.onAuthStateChanged(u => {
        if(u) {
            db.ref('users/'+u.uid).on('value', s => {
                const d = s.val() || {};
                document.getElementById('top-bal').innerText = "$" + (d.balance || 0).toFixed(2);
                renderLB(u.email, d.name);
                renderHist(d.history);
                if(d.activeTrade) monitorTrade(u.uid, d.activeTrade);
            });
        }
    });

    function startWait(dir) {
        document.getElementById('sync-overlay').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('sync-overlay').style.display = 'none';
            confirmTrade(dir);
        }, 2000);
    }

    function confirmTrade(dir) {
        const u = auth.currentUser;
        const amt = parseFloat(document.getElementById('trade-amt').value);
        if(lastKnownPrice === 0) { alert("Price Syncing... Try in 1s"); return; }

        db.ref('users/'+u.uid).once('value', s => {
            const bal = s.val().balance || 0;
            if(amt > bal) return alert("Low Balance");
            const trade = { dir, amount: amt, entryPrice: lastKnownPrice, startTime: Date.now(), status: "running" };
            db.ref('users/'+u.uid).update({ balance: bal - amt, activeTrade: trade });
        });
    }

    function monitorTrade(uid, t) {
        const marker = document.getElementById('entry-marker');
        const left = 60 - Math.floor((Date.now() - t.startTime)/1000);
        if(left <= 0) {
            marker.style.display = "none";
            finishNow(uid, t);
        } else {
            document.getElementById('status-text').innerText = "CLOSING IN: " + left + "s";
            marker.style.display = "block";
            document.getElementById('entry-label').innerText = "ENTRY @ " + t.entryPrice;
            setTimeout(() => monitorTrade(uid, t), 1000);
        }
    }

    function finishNow(uid, t) {
        db.ref('users/'+uid).once('value', s => {
            const win = Math.random() > 0.85; 
            const profit = win ? (t.amount * 1.85) : 0;
            const h = s.val().history || [];
            h.unshift({ dir: t.dir, amt: t.amount, res: win ? "WIN" : "LOSS", time: new Date().toLocaleTimeString() });
            db.ref('users/'+uid).update({ balance: s.val().balance + profit, activeTrade: null, history: h.slice(0, 8) });
            alert(win ? "Target Hit! Profit Added" : "Market Reversed! Loss");
        });
    }

    function renderLB(e, n) {
        document.getElementById('lb-list').innerHTML = `<div class="row" style="color:var(--red); background:rgba(246,70,93,0.1); padding:5px; border-radius:5px;"><span>#1 🇵🇰 ${n || e.split('@')[0]} (You)</span><span>-$420.50</span></div>`;
    }

    function renderHist(h) {
        const l = document.getElementById('hist-list'); l.innerHTML = "";
        if(!h) return;
        h.forEach(x => {
            l.innerHTML += `<div class="row"><span>${x.dir} | ${x.time}</span><span style="color:${x.res=='WIN'?'var(--green)':'var(--red)'}">${x.res} ($${x.amt})</span></div>`;
        });
    }
</script>
</body>
</html>
