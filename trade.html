<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade For Profit - Final Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #fcd535; --green: #0ecb81; --red: #f6465d; --text: #eaecef; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .top-bar { display: flex; justify-content: space-between; padding: 12px; background: var(--card); border-bottom: 1px solid #2b2f36; }
        #chart-container { height: 350px; width: 100%; position: relative; background: #000; }
        
        /* Fixed Sync Overlay */
        #sync-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10000; pointer-events: none; /* Allows background processes to run */
        }

        .controls { background: var(--card); padding: 20px; border-radius: 25px 25px 0 0; margin-top: -15px; border-top: 1px solid #2b2f36; position: relative; z-index: 5; }
        .input-box { background: #2b3139; border: 1px solid #474d57; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 18px; text-align: center; outline: none; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; color: white; transition: 0.2s; }
        .up { background: var(--green); } .down { background: var(--red); }
        .btn:active { transform: scale(0.95); opacity: 0.8; }

        .panel { padding: 15px; background: var(--card); border-top: 1px solid #2b2f36; min-height: 100px; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2b2f36; font-size: 13px; }
    </style>
</head>
<body>

<div id="sync-overlay">
    <div style="color:var(--yellow); font-size: 22px; font-weight:bold;">WAIT 2 SECONDS...</div>
    <div id="sync-status" style="font-size:14px; color:gray; margin-top:10px;">Connecting to Server...</div>
</div>

<div class="top-bar">
    <div style="font-weight:bold; color:var(--yellow)">BTC/USDT</div>
    <div>Balance: <span id="top-bal" style="color:var(--yellow)">$0.00</span></div>
</div>

<div id="chart-container">
    <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=1&theme=dark" style="width: 100%; height: 100%; border: none;"></iframe>
</div>

<div class="controls">
    <div id="status-text" style="text-align:center; color:var(--yellow); font-size:13px; margin-bottom:10px; font-weight:bold;">MARKET LIVE</div>
    <input type="number" id="trade-amt" class="input-box" value="10">
    <div class="btn-group">
        <button class="btn up" onclick="handleTradeAction('UP')">CALL (UP)</button>
        <button class="btn down" onclick="handleTradeAction('DOWN')">PUT (DOWN)</button>
    </div>
</div>

<div class="panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <span style="color:var(--yellow); font-size:12px; font-weight:bold;">GLOBAL RANKING</span>
        <span id="display-date" style="color:var(--yellow); font-size:12px; font-weight:bold;"></span>
    </div>
    <div id="lb-list"></div>
</div>

<div class="panel">
    <div style="color:var(--yellow); font-size:12px; font-weight:bold; margin-bottom:10px;">RECENT TRADES</div>
    <div id="hist-list"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", authDomain: "trade-for-profit-8b160.firebaseapp.com", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", projectId: "trade-for-profit-8b160", storageBucket: "trade-for-profit-8b160.firebasestorage.app", messagingSenderId: "1077014018991", appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let currentBTCPrice = 0;
    document.getElementById('display-date').innerText = new Date().toLocaleDateString('en-GB');

    // Super fast price fetch
    function syncPrice() {
        fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
        .then(res => res.json())
        .then(data => { currentBTCPrice = parseFloat(data.price); })
        .catch(() => {});
    }
    setInterval(syncPrice, 500);

    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/'+user.uid).on('value', snap => {
                const val = snap.val() || {};
                document.getElementById('top-bal').innerText = "$" + (val.balance || 0).toFixed(2);
                renderLB(user.email, val.name);
                renderHistory(val.history);
            });
        }
    });

    function handleTradeAction(dir) {
        // Show wait message
        const overlay = document.getElementById('sync-overlay');
        overlay.style.display = 'flex';
        
        setTimeout(() => {
            overlay.style.display = 'none';
            processTrade(dir);
        }, 2000);
    }

    function processTrade(dir) {
        const user = auth.currentUser;
        const amount = parseFloat(document.getElementById('trade-amt').value);
        
        // Use last known price if current fetch is slow
        const tradePrice = currentBTCPrice || 69300.00; 

        db.ref('users/'+user.uid).once('value', snap => {
            const balance = snap.val().balance || 0;
            if(amount > balance) { alert("Insufficient Balance!"); return; }

            const tradeObj = { 
                dir, amount, entryPrice: tradePrice, 
                startTime: Date.now(), status: "running" 
            };
            
            db.ref('users/'+user.uid).update({ 
                balance: balance - amount, 
                activeTrade: tradeObj 
            }).then(() => {
                console.log("Trade Placed Successfully");
            });
        });
    }

    function renderLB(email, name) {
        document.getElementById('lb-list').innerHTML = `
            <div class="row" style="color:var(--red); background:rgba(246,70,93,0.1); padding:8px; border-radius:5px;">
                <span>#1 🇵🇰 ${name || email.split('@')[0]} (You)</span>
                <span>-$420.50</span>
            </div>
        `;
    }

    function renderHistory(history) {
        const list = document.getElementById('hist-list');
        list.innerHTML = "";
        if(!history) return;
        history.slice(0, 5).forEach(item => {
            list.innerHTML += `
                <div class="row">
                    <span>${item.dir} | ${item.time}</span>
                    <span style="color:${item.res=='WIN'?'var(--green)':'var(--red)'}">${item.res} ($${item.amt})</span>
                </div>`;
        });
    }
</script>
</body>
</html>
