<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Staking Orbit</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-yellow: #f0b90b;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: #03050a; color: white; font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        .header { margin: 20px 0; text-align: center; }
        .header h2 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; }
        .header span { color: var(--neon-yellow); font-weight: 800; }

        .staking-card {
            width: 100%; max-width: 400px; background: var(--glass);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 25px; backdrop-filter: blur(15px); text-align: center;
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-item { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid #222; }
        .stat-item small { font-size: 10px; color: #888; display: block; margin-bottom: 5px; }
        .stat-item span { font-weight: 800; color: var(--neon-yellow); }

        input {
            width: 100%; padding: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid #333; border-radius: 12px; color: white;
            font-size: 18px; text-align: center; margin-bottom: 20px;
        }

        .invest-btn {
            width: 100%; padding: 18px; background: var(--neon-yellow);
            border: none; border-radius: 12px; color: black; font-weight: 800;
            cursor: pointer; box-shadow: 0 10px 20px rgba(240, 185, 11, 0.2);
        }

        .back-link { margin-top: 20px; color: #555; text-decoration: none; font-size: 12px; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h2>STAKING <span>ORBIT</span></h2>
    </div>

    <div class="staking-card">
        <div class="stat-grid">
            <div class="stat-item">
                <small>DAILY RETURN</small>
                <span>5.0%</span>
            </div>
            <div class="stat-item">
                <small>LOCK PERIOD</small>
                <span>7 DAYS</span>
            </div>
        </div>

        <p style="font-size: 12px; color: #888; margin-bottom: 15px;">Available Balance: <span id="avail-bal" style="color:white">$0.00</span></p>
        
        <input type="number" id="invest-amount" placeholder="Min $10.00">
        
        <button class="invest-btn" id="start-staking">ACTIVATE STAKING</button>
        
        <a href="index.html" class="back-link">← Return to Terminal</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            appId: "1:1077014018991:web:24f051595ac36857fd4d5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let userBalance = 0;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const userRef = ref(db, 'users/' + user.uid);
                
                // Get Current Balance
                onValue(userRef, (snap) => {
                    const data = snap.val();
                    if(data) {
                        userBalance = data.balance || 0;
                        document.getElementById('avail-bal').innerText = "$" + userBalance.toFixed(2);
                    }
                });

                // Start Staking Logic
                document.getElementById('start-staking').onclick = () => {
                    const amount = parseFloat(document.getElementById('invest-amount').value);

                    if (amount >= 10 && amount <= userBalance) {
                        const newBalance = userBalance - amount;
                        
                        // 1. Deduct Balance
                        update(userRef, { balance: newBalance }).then(() => {
                            
                            // 2. Create Staking Record
                            const stakeRef = push(ref(db, 'investments/' + user.uid));
                            update(stakeRef, {
                                amount: amount,
                                status: "ACTIVE",
                                daily_profit: 0.05,
                                start_date: Date.now(),
                                end_date: Date.now() + (7 * 24 * 60 * 60 * 1000)
                            }).then(() => {
                                alert("Staking Activated Successfully!");
                                window.location.href = 'index.html';
                            });
                        });
                    } else if (amount > userBalance) {
                        alert("Insufficient Balance!");
                    } else {
                        alert("Minimum investment is $10!");
                    }
                };
            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
