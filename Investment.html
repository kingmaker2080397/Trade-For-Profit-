<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Funds | G-Terminal VIP</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0b0e11; 
            --card: #1e2329; 
            --yellow: #fcd535; 
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --input-bg: #2b3139;
            --green: #0ecb81;
        }

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; box-sizing: border-box; 
        }

        .box { 
            background: var(--card); padding: 30px; border-radius: 24px; 
            width: 100%; max-width: 420px; border: 1px solid rgba(255,255,255,0.05); 
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-link { color: var(--text-muted); text-decoration: none; font-size: 13px; }

        h2 { font-size: 24px; font-weight: 800; margin: 0; color: #fff; }
        .subtitle { color: var(--text-muted); font-size: 13px; margin-top: 5px; }

        .method-selector { display: flex; gap: 10px; margin: 20px 0; }
        .method-btn { 
            flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #474d57; 
            background: var(--input-bg); color: #fff; cursor: pointer; font-size: 12px;
            transition: 0.3s;
        }
        .method-btn.active { border-color: var(--yellow); background: rgba(252, 213, 53, 0.1); color: var(--yellow); }

        .address-box {
            background: #000; padding: 15px; border-radius: 12px; border: 1px dashed #474d57;
            margin: 15px 0; display: flex; justify-content: space-between; align-items: center;
        }
        .address-box span { font-size: 13px; color: var(--yellow); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%; }
        .copy-btn { background: var(--yellow); color: #000; border: none; padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }

        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; margin-left: 5px; }

        input { 
            width: 100%; padding: 14px; background: var(--input-bg); 
            border: 1px solid #474d57; color: white; border-radius: 12px; 
            box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--yellow); }

        .file-box {
            border: 2px dashed #474d57; padding: 20px; border-radius: 12px; 
            cursor: pointer; background: rgba(255,255,255,0.02); margin-bottom: 15px;
        }

        .btn-deposit { 
            width: 100%; padding: 16px; background: var(--yellow); 
            color: black; border: none; border-radius: 14px; 
            font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-deposit:active { transform: scale(0.98); }

        .warning { font-size: 11px; color: var(--text-muted); background: rgba(252, 213, 53, 0.05); padding: 10px; border-radius: 10px; margin-top: 15px; border-left: 3px solid var(--yellow); text-align: left; }
    </style>
</head>
<body>

<div class="box">
    <div class="nav-header">
        <a href="index.html" class="back-link">← Cancel</a>
        <span style="font-size: 12px; color: var(--green); font-weight: bold;">AUTO-GATEWAY</span>
    </div>
    
    <h2>Investment</h2>
    <p class="subtitle">Select method and upload proof of payment.</p>

    <div class="method-selector">
        <button class="method-btn active" onclick="setMethod('USDT', 'TNVx1...Xyz789')">USDT (TRC20)</button>
        <button class="method-btn" onclick="setMethod('EasyPaisa', '0312-XXXXXXX')">EasyPaisa</button>
        <button class="method-btn" onclick="setMethod('JazzCash', '0300-XXXXXXX')">JazzCash</button>
    </div>

    <div class="address-box">
        <span id="target-address">TNVx1Jk9a2mPqLzS789uVwXyZ</span>
        <button class="copy-btn" onclick="copyAddr()">COPY</button>
    </div>

    <div class="input-group">
        <label>DEPOSIT AMOUNT ($)</label>
        <input type="number" id="dep-amount" placeholder="Min. $10.00">
    </div>

    <div class="input-group">
        <label>TRANSACTION ID (TID)</label>
        <input type="text" id="dep-tid" placeholder="Paste TXID here">
    </div>

    <div class="input-group">
        <label>PAYMENT SCREENSHOT</label>
        <div class="file-box" onclick="document.getElementById('file-input').click()">
            <span id="file-status" style="font-size: 12px; color: var(--text-muted);">Click to upload screenshot</span>
        </div>
        <input type="file" id="file-input" style="display:none;" onchange="updateFile(this)">
    </div>

    <button class="btn-deposit" onclick="submitDeposit()">Submit Deposit</button>

    <div class="warning">
        <b>Notice:</b> Deposit will be added to your balance after manual verification (10-30 mins).
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", 
        authDomain: "trade-for-profit-8b160.firebaseapp.com", 
        databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", 
        projectId: "trade-for-profit-8b160", 
        storageBucket: "trade-for-profit-8b160.firebasestorage.app", 
        messagingSenderId: "1077014018991", 
        appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentMethod = "USDT";

    function setMethod(name, addr) {
        currentMethod = name;
        document.getElementById('target-address').innerText = addr;
        const btns = document.querySelectorAll('.method-btn');
        btns.forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    function copyAddr() {
        const text = document.getElementById('target-address').innerText;
        navigator.clipboard.writeText(text);
        alert("Address Copied!");
    }

    function updateFile(input) {
        const name = input.files[0] ? input.files[0].name : "Click to upload screenshot";
        document.getElementById('file-status').innerText = name;
        document.getElementById('file-status').style.color = "var(--yellow)";
    }

    function submitDeposit() {
        const user = auth.currentUser;
        const amt = document.getElementById('dep-amount').value;
        const tid = document.getElementById('dep-tid').value;

        if(!amt || !tid) return alert("Please fill all details!");
        if(amt < 10) return alert("Minimum investment is $10!");

        const btn = document.querySelector('.btn-deposit');
        btn.innerText = "Submitting...";
        btn.disabled = true;

        const depositData = {
            uid: user.uid,
            email: user.email,
            amount: parseFloat(amt),
            method: currentMethod,
            txid: tid,
            status: "PENDING",
            timestamp: Date.now()
        };

        db.ref('deposits').push(depositData).then(() => {
            alert("Deposit submitted! Balance will update after verification.");
            window.location.href = "index.html";
        }).catch(err => {
            alert(err.message);
            btn.innerText = "Submit Deposit";
            btn.disabled = false;
        });
    }
</script>

</body>
  </html>
