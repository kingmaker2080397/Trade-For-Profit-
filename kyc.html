<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC Verification | G-Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #f0b90b; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .box { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #2b3139; text-align: center; }
        h2 { color: var(--yellow); margin-bottom: 10px; }
        p { color: #848e9c; font-size: 0.9rem; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #2b3139; border: 1px solid #474d57; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--yellow); }
        .btn-submit { width: 100%; padding: 15px; background: var(--yellow); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 15px; }
        .btn-submit:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="box">
    <h2>KYC Verification</h2>
    <p>Submit your CNIC details to enable withdrawals.</p>
    
    <input type="text" id="cnic-name" placeholder="Full Name (As per CNIC)">
    <input type="text" id="cnic-number" placeholder="CNIC Number (42401-XXXXXXX-X)">
    <input type="text" id="cnic-image" placeholder="Paste CNIC Front Image URL">
    
    <button class="btn-submit" onclick="submitKYC()">Submit Verification</button>
    <br>
    <a href="index.html" style="color: #848e9c; text-decoration: none; font-size: 0.8rem; display: block; margin-top: 15px;">Back to Dashboard</a>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
        authDomain: "trade-for-profit-8b160.firebaseapp.com",
        databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
        projectId: "trade-for-profit-8b160",
        storageBucket: "trade-for-profit-8b160.firebasestorage.app",
        messagingSenderId: "1077014018991",
        appId: "1:1077014018991:web:c41320e2ef10291afd4d5a"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function submitKYC() {
        const user = auth.currentUser;
        if (!user) {
            alert("Please login first!");
            window.location.href = "login.html";
            return;
        }

        const name = document.getElementById('cnic-name').value;
        const cnic = document.getElementById('cnic-number').value;
        const img = document.getElementById('cnic-image').value;

        if (!name || !cnic || !img) {
            alert("Please fill all fields!");
            return;
        }

        // Update Database
        db.ref('users/' + user.uid).update({
            kyc_status: "PENDING",
            kyc_data: {
                name: name,
                cnic: cnic,
                image: img,
                submitted_at: Date.now()
            }
        }).then(() => {
            alert("KYC Submitted Successfully! Admin will review it.");
            window.location.href = "index.html";
        }).catch((error) => {
            alert("Error: " + error.message);
        });
    }
</script>

</body>
</html>
