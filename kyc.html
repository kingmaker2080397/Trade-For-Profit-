<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Terminal | Verify KYC</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --yellow: #f0b90b; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .box { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #2b3139; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #2b3139; border: 1px solid #474d57; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn-submit { width: 100%; padding: 15px; background: var(--yellow); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .status-msg { padding: 20px; border: 1px dashed var(--yellow); border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box" id="kyc-container">
    <h2>Verify KYC</h2>
    <div id="kyc-form">
        <p style="color:#848e9c">Upload CNIC details to enable withdrawals.</p>
        <input type="text" id="name" placeholder="Full Name">
        <input type="text" id="cnic" placeholder="CNIC Number">
        <input type="file" id="file-input" accept="image/*" style="border:none;">
        <button class="btn-submit" onclick="submitKYC()">Submit Verification</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", authDomain: "trade-for-profit-8b160.firebaseapp.com", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", projectId: "trade-for-profit-8b160", storageBucket: "trade-for-profit-8b160.firebasestorage.app", messagingSenderId: "1077014018991", appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    auth.onAuthStateChanged(user => {
        if (user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const d = snap.val();
                if (d && (d.kyc_status === "PENDING" || d.kyc_status === "APPROVED")) {
                    document.getElementById('kyc-container').innerHTML = `
                        <div class="status-msg">
                            <h2 style="color:var(--yellow)">Already Verified</h2>
                            <p>Your KYC status is: <b>${d.kyc_status}</b></p>
                            <p style="font-size:0.8rem">You cannot resubmit while pending or approved.</p>
                            <a href="index.html" style="color:var(--yellow); text-decoration:none; font-weight:bold;">← Back to Dashboard</a>
                        </div>`;
                }
            });
        }
    });

    function submitKYC() {
        const user = auth.currentUser;
        const name = document.getElementById('name').value;
        const cnic = document.getElementById('cnic').value;
        if(!name || !cnic) return alert("Fill all fields!");

        db.ref('users/' + user.uid).update({
            kyc_status: "PENDING",
            kyc_data: { name: name, cnic: cnic, submitted_at: Date.now() }
        }).then(() => { alert("Submitted!"); window.location.reload(); });
    }
</script>
</body>
</html>
