<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Identity Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00d2ff; --neon-green: #00ff95; --glass: rgba(255, 255, 255, 0.03); }
        body { 
            background: #03050a; color: white; font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .kyc-card {
            background: var(--glass); padding: 30px; border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 400px;
            backdrop-filter: blur(15px); text-align: center;
        }
        h2 { letter-spacing: 3px; font-weight: 200; margin-bottom: 10px; }
        h2 span { color: var(--neon-blue); font-weight: 800; }
        p { font-size: 12px; color: #888; margin-bottom: 25px; }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; color: var(--neon-blue); text-transform: uppercase; margin-left: 10px; }
        input, select {
            width: 100%; padding: 14px; margin-top: 5px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid #333;
            border-radius: 12px; color: white; outline: none;
        }
        input:focus { border-color: var(--neon-blue); }

        .submit-btn {
            width: 100%; padding: 15px; margin-top: 20px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border: none; border-radius: 12px; color: white;
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:hover { box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); transform: translateY(-2px); }
        
        #status-msg { margin-top: 15px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="kyc-card">
        <h2>IDENTITY <span>VERIFY</span></h2>
        <p>Complete verification to unlock trading and withdrawals.</p>

        <div class="input-group">
            <label>Full Legal Name</label>
            <input type="text" id="full-name" placeholder="As per ID Card">
        </div>

        <div class="input-group">
            <label>Document Type</label>
            <select id="doc-type">
                <option value="id-card">National ID Card</option>
                <option value="passport">International Passport</option>
                <option value="license">Driver's License</option>
            </select>
        </div>

        <div class="input-group">
            <label>Document Number</label>
            <input type="text" id="doc-number" placeholder="Enter ID number">
        </div>

        <button class="submit-btn" id="kyc-submit">SUBMIT DOCUMENTS</button>
        <div id="status-msg"></div>
        
        <a href="index.html" style="color: #555; text-decoration: none; font-size: 11px; display: block; margin-top: 20px;">Return to Dashboard</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            appId: "1:1077014018991:web:24f051595ac36857fd4d5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const userRef = ref(db, 'users/' + user.uid);
                
                // Check if already submitted
                onValue(userRef, (snap) => {
                    const data = snap.val();
                    if (data && data.kyc_status === "PENDING") {
                        document.getElementById('kyc-submit').disabled = true;
                        document.getElementById('kyc-submit').innerText = "UNDER REVIEW";
                        document.getElementById('status-msg').innerText = "Verification in progress...";
                        document.getElementById('status-msg').style.color = "#f0b90b";
                    }
                });

                // Submit Logic
                document.getElementById('kyc-submit').onclick = () => {
                    const name = document.getElementById('full-name').value;
                    const docNum = document.getElementById('doc-number').value;

                    if(name && docNum) {
                        update(userRef, {
                            full_name: name,
                            document_number: docNum,
                            kyc_status: "PENDING"
                        }).then(() => {
                            alert("KYC Submitted Successfully!");
                            location.reload();
                        });
                    } else {
                        alert("Please fill all fields!");
                    }
                };
            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
