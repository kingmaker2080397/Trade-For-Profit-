<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>KYC | Secure Identity</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { background: #1e2329; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #2b3139; border: 1px solid #444; color: white; border-radius: 8px; }
        .btn { width: 100%; padding: 15px; background: #fcd535; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box" id="kyc-container">
        <h2>🛡️ Identity Verification</h2>
        <p style="color:#848e9c; font-size: 14px;">Submit CNIC details to enable withdrawals.</p>
        <input type="text" id="full-name" placeholder="Full Name">
        <input type="text" id="cnic" placeholder="CNIC Number">
        <div style="border: 2px dashed #444; padding: 20px; border-radius: 10px; margin: 10px 0;">
            <input type="file" id="pic" style="border:none;">
        </div>
        <button class="btn" onclick="submitKYC()">Submit Documents</button>
    </div>

<script>
    firebase.initializeApp({ apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com" });
    const auth = firebase.auth();
    const db = firebase.database();

    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).on('value', s => {
                const d = s.val();
                if(d.kyc_status === "PENDING" || d.kyc_status === "APPROVED") {
                    document.getElementById('kyc-container').innerHTML = `<h2>Status: ${d.kyc_status}</h2><p>Our team is reviewing your data.</p><button class="btn" onclick="location.href='dashboard.html'">Back</button>`;
                }
            });
        }
    });

    function submitKYC() {
        const user = auth.currentUser;
        db.ref('users/' + user.uid).update({
            kyc_status: "PENDING",
            kyc_details: { name: document.getElementById('full-name').value, cnic: document.getElementById('cnic').value }
        }).then(() => alert("Submitted!"));
    }
</script>
</body>
</html>
