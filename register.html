<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create VIP Account | Trade Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0b0e11;
            --card: #1e2329;
            --yellow: #fcd535;
            --yellow-hover: #f0b90b;
            --text-gray: #848e9c;
            --input-bg: #2b3139;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .register-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: var(--yellow);
            margin-bottom: 8px;
            font-weight: 800;
        }

        .header p {
            color: var(--text-gray);
            font-size: 14px;
        }

        .form-card {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-group input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid transparent;
            padding: 14px 16px;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--yellow);
            background: #323942;
        }

        .bonus-tag {
            background: rgba(252, 213, 53, 0.1);
            color: var(--yellow);
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
            border: 1px dashed var(--yellow);
        }

        .reg-btn {
            width: 100%;
            background: var(--yellow);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .reg-btn:hover {
            background: var(--yellow-hover);
        }

        .reg-btn:active {
            transform: scale(0.98);
        }

        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-gray);
        }

        .footer-links a {
            color: var(--yellow);
            text-decoration: none;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .register-container { padding: 15px; }
            .form-card { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="header">
        <h1>Join VIP Trade</h1>
        <p>Start your professional trading journey</p>
    </div>

    <div class="form-card">
        <div class="bonus-tag">🎁 Limited Offer: $1.00 Welcome Bonus</div>
        
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="pass" placeholder="Min. 6 characters">
        </div>

        <button class="reg-btn" onclick="register()">Create Account</button>
    </div>

    <div class="footer-links">
        Already have an account? <a href="login.html">Sign In</a>
    </div>
</div>

<script>
    // Firebase Config (Yahan apni config paste karein)
    const firebaseConfig = { 
        apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU", 
        authDomain: "trade-for-profit-8b160.firebaseapp.com", 
        databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com", 
        projectId: "trade-for-profit-8b160", 
        storageBucket: "trade-for-profit-8b160.firebasestorage.app", 
        messagingSenderId: "1077014018991", 
        appId: "1:1077014018991:web:c41320e2ef10291afd4d5a" 
    };
    firebase.initializeApp(firebaseConfig);

    function register() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        const n = document.getElementById('name').value;
        
        if(!e || !p || !n) {
            alert("Please fill all fields");
            return;
        }

        const btn = document.querySelector('.reg-btn');
        btn.innerText = "Processing...";
        btn.disabled = true;

        firebase.auth().createUserWithEmailAndPassword(e, p).then((res) => {
            const uid = res.user.uid;
            const refCode = "GT-" + uid.substring(0,5).toUpperCase();
            
            firebase.database().ref('users/' + uid).set({
                name: n,
                email: e,
                balance: 1.0,
                kyc_status: "NOT_VERIFIED",
                referral_code: refCode,
                control: "NORMAL",
                joined_at: Date.now()
            }).then(() => {
                alert("Account Created Successfully! $1 Bonus Added.");
                window.location.href = "index.html";
            });
        }).catch(err => {
            alert(err.message);
            btn.innerText = "Create Account";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
