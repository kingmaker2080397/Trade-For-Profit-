<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Secure Deposit</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff95;
            --neon-yellow: #f0b90b;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: #03050a; color: white; font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        .header { margin: 20px 0; text-align: center; }
        .header h2 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; }
        .header span { color: var(--neon-green); font-weight: 800; }

        .container { width: 100%; max-width: 450px; }

        /* Payment Method Card */
        .method-card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 20px; border-radius: 20px; margin-bottom: 20px;
            backdrop-filter: blur(10px); position: relative; overflow: hidden;
        }

        .method-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent-color, var(--neon-green));
        }

        .method-title { font-size: 14px; color: #888; margin-bottom: 10px; text-transform: uppercase; }
        
        .address-box {
            background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px;
            border: 1px dashed #444; display: flex; justify-content: space-between;
            align-items: center; font-family: monospace; font-size: 16px; margin-bottom: 10px;
        }

        .copy-btn {
            background: var(--accent-color, var(--neon-green)); border: none;
            color: black; padding: 5px 12px; border-radius: 6px;
            font-weight: 800; cursor: pointer; font-size: 10px;
        }

        /* Form Styling */
        .input-group { margin-top: 15px; }
        label { font-size: 11px; color: #666; margin-left: 5px; text-transform: uppercase; }
        input {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid #333; border-radius: 10px; color: white; margin-top: 5px;
        }

        .submit-btn {
            width: 100%; padding: 18px; background: var(--neon-green);
            border: none; border-radius: 12px; color: black; font-weight: 800;
            margin-top: 20px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,255,149,0.2);
        }

        .back-link { margin-top: 20px; color: #555; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>DEPOSIT <span>PORTAL</span></h2>
    </div>

    <div class="container">
        
        <div class="method-card" style="--accent-color: #02c076;">
            <div class="method-title">Option 1: EasyPaisa / JazzCash</div>
            <div class="address-box">
                <span id="admin-mobile">Loading...</span>
                <button class="copy-btn" onclick="copyText('admin-mobile')">COPY</button>
            </div>
            <small style="color:#666">Transfer the amount to the number above.</small>
        </div>

        <div class="method-card" style="--accent-color: var(--neon-yellow);">
            <div class="method-title">Option 2: USDT (TRC20)</div>
            <div class="address-box">
                <span id="admin-usdt" style="font-size: 12px;">Loading...</span>
                <button class="copy-btn" onclick="copyText('admin-usdt')">COPY</button>
            </div>
            <small style="color:#666">Send USDT only via TRC20 Network.</small>
        </div>

        <div class="method-card">
            <div class="method-title">Submit Proof</div>
            <div class="input-group">
                <label>Amount (USD)</label>
                <input type="number" id="dep-amount" placeholder="e.g. 50">
            </div>
            <div class="input-group">
                <label>Transaction ID / Hash</label>
                <input type="text" id="dep-trx" placeholder="Enter TRX ID">
            </div>
            <button class="submit-btn" id="submit-dep">CONFIRM DEPOSIT</button>
        </div>

        <center><a href="index.html" class="back-link">← Cancel & Return</a></center>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            appId: "1:1077014018991:web:24f051595ac36857fd4d5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // 1. Fetch Admin Addresses from Settings
        onValue(ref(db, 'settings'), (snap) => {
            const settings = snap.val();
            if(settings) {
                document.getElementById('admin-mobile').innerText = settings.easypaisa || "Not Set";
                document.getElementById('admin-usdt').innerText = settings.usdt_address || "Not Set";
            }
        });

        // 2. Submit Deposit Request
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('submit-dep').onclick = () => {
                    const amount = document.getElementById('dep-amount').value;
                    const trx = document.getElementById('dep-trx').value;

                    if(amount && trx) {
                        const depRef = ref(db, 'deposits/' + user.uid);
                        const newDep = push(depRef);
                        set(newDep, {
                            amount: parseFloat(amount),
                            trx_id: trx,
                            status: "PENDING",
                            timestamp: Date.now(),
                            email: user.email
                        }).then(() => {
                            alert("Deposit request sent! Wait for admin approval.");
                            window.location.href = 'index.html';
                        });
                    } else {
                        alert("Please fill all details!");
                    }
                };
            }
        });

        // Copy Function
        window.copyText = (id) => {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("Copied: " + text);
        };
    </script>
</body>
    </html>
